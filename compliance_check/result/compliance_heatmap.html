itches/lockout devices<br>requiring deliberate action and able to withstand conditions that<br>could cause isolation failure). The PROVISION requires, before<br>energised electrical work commences, that the isolation/disconnection<br>point is clearly marked/labelled, unobstructed for access/egress, and<br>capable of being operated quickly, along with risk assessment,<br>recording, and authorisation/consultation steps. While both concern<br>isolation points for electrical work, the POLICY does not cover<br>several mandatory preconditions in the PROVISION (risk assessment by a<br>competent person and recorded; ensuring the work area is clear;<br>ensuring the isolation point is clearly marked/labelled; ensuring it<br>is capable of being operated quickly; and formal authorisation after<br>consultation). Therefore, the POLICY is not sufficient to demonstrate<br>compliance with the PROVISION.<br><br><b>Remediation:</b> Update the policy/procedure to explicitly require: (1) a competent-<br>person risk assessment before energised electrical work, with the<br>assessment recorded; (2) the work area to be cleared of obstructions<br>to allow easy access/exit; (3) the isolation/disconnection point to be<br>clearly marked/labelled and kept unobstructed for access/exit; (4)<br>confirmation that the isolation/disconnection point can be operated<br>quickly; and (5) formal authorisation of the energised work after<br>consultation with the person with management/control of the workplace.<br>Include the exception conditions where subregulation (1)(c) does not<br>apply.", "", "", "", "", "", "", "", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 190<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.491<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The POLICY requires isolation points to have control mechanisms that<br>prevent inadvertent re-energisation, require deliberate action to<br>operate, and be robust against conditions that could cause isolation<br>failure (e.g., lockable switches/lockout devices). The PROVISION<br>requires operator controls to be located/guarded to prevent<br>unintentional activation and to be able to be locked into the \"off\"<br>position to enable disconnection of all motive power. These<br>requirements are functionally aligned: both address preventing<br>unintended activation/energisation and enabling lockout in the off<br>state. While the POLICY includes additional detail about deliberate<br>action and robustness, the PROVISION\u2019s requirements for guarding<br>against unintentional activation and lockability into off position<br>satisfy the core intent of preventing inadvertent re-energisation via<br>secure isolation/lockout-capable controls.", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 191<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.499<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The texts are functionally related because both address safety<br>controls intended to prevent unintended re-energisation/restart of<br>equipment after a stop/isolation action. The POLICY requires isolation<br>points to have control mechanisms that prevent inadvertent re-<br>energising, require deliberate action to engage/disengage, and<br>withstand conditions that could cause isolation failure (e.g.,<br>lockable switches/lockout devices). The PROVISION requires emergency<br>stop controls (where fitted, and especially where multiple are fitted)<br>to be of the stop-and-lock-off type so the plant cannot be restarted<br>unless the used emergency stop is reset, and that the stop control is<br>prominent/marked/accessible, red, and not adversely affected by<br>electrical/electronic malfunction. While the PROVISION aligns with the<br>POLICY on preventing inadvertent restart and robustness against<br>malfunction, it does not address isolation points or lockout<br>mechanisms at isolation points (e.g., lockable isolators, lockout<br>hasps) and does not explicitly require a deliberate action to<br>engage/disengage an isolation device. Therefore, the PROVISION alone<br>does not fully satisfy the POLICY requirements for isolation points.<br><br><b>Remediation:</b> Add/verify design and procedures for isolation points that include<br>lockable isolation devices or lockout provisions (e.g., built-in<br>lockable isolator switches, lockout for breakers/fuses, safety lockout<br>hasps) requiring deliberate action to operate, and ensure the<br>isolation mechanism is robust against foreseeable conditions that<br>could cause isolation failure. Document these features separately from<br>emergency stop controls.", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 210<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.512<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The POLICY requires isolation points to have control mechanisms that<br>prevent inadvertent re-energisation, require deliberate action to<br>engage/disengage, and be robust (e.g., lockable switches/lockout<br>devices). The PROVISION requires operator controls to be<br>located/guarded to prevent unintentional activation and to be able to<br>be locked into the \"off\" position to enable disconnection of motive<br>power. These requirements are functionally aligned: both aim to<br>prevent unintended energisation/activation and require lockable<br>controls for isolation. While the POLICY additionally mentions<br>robustness/withstanding conditions leading to isolation failure, the<br>PROVISION\u2019s lock-off and prevention of unintentional activation<br>satisfy the core functional intent of preventing inadvertent re-<br>energisation via deliberate, lockable isolation.", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 211<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.507<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The texts are functionally related because both address controls that<br>prevent inadvertent re-energisation/restart of electrical plant<br>through deliberate-action mechanisms and robustness against failure.<br>The PROVISION requires emergency stop controls (where fitted, and<br>especially where multiple are fitted) to be of the \u201cstop and lock-off\u201d<br>type so the plant cannot be restarted until the specific emergency<br>stop is reset, and that the stop control cannot be adversely affected<br>by electrical/electronic malfunction. The POLICY focuses on isolation<br>points needing control mechanisms (e.g., lockable switches/lockout<br>devices) to prevent inadvertent re-energisation and withstand<br>conditions that could cause isolation failure. However, the POLICY<br>does not explicitly require emergency stop controls to be stop-and-<br>lock-off (reset-required) nor does it address<br>prominence/marking/accessibility, red coloration, or immunity to<br>electrical/electronic circuit malfunction. Therefore, the POLICY does<br>not fully satisfy the PROVISION\u2019s specific emergency-stop<br>requirements.<br><br><b>Remediation:</b> Update the policy (or add a specific emergency-stop section) to<br>require: (1) where multiple emergency stops exist, they must be \u201cstop<br>and lock-off\u201d such that restart is impossible until the actuated<br>emergency stop is reset; (2) emergency stop controls are prominent,<br>clearly/durably marked, and immediately accessible to each operator;<br>(3) associated actuators (handle/bar/push button) are red; and (4)<br>emergency stop function is fail-safe/not adversely affected by<br>electrical or electronic circuit malfunction. Ensure procedures and<br>design standards reflect these requirements and verify through<br>inspection/testing.", "", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 222<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.446<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The texts are functionally related because both address preventing<br>hazardous unexpected energisation/start-up of plant and controlling<br>the risk to workers in the immediate vicinity. However, the POLICY<br>focuses on electrical isolation points having control mechanisms to<br>prevent inadvertent re-energisation (e.g., lockable switches/lockout<br>devices requiring deliberate action and robust against failure). The<br>PROVISION requires suitable control measures where plant could start<br>without warning, and specifically requires controlled access to the<br>area via isolating the area and/or interlocked guarding, presence-<br>sensing devices, and permit-to-work systems. The POLICY does not<br>address controlling access to the immediate vicinity, interlocked<br>guards, presence-sensing devices, or permit-to-work systems, and it is<br>limited to electrical isolation mechanisms rather than broader<br>controls for remotely/automatically energised plant. Therefore, the<br>POLICY does not fully meet the PROVISION\u2019s requirements.<br><br><b>Remediation:</b> Expand the POLICY to require, where plant can start without warning,<br>that access to the immediate vicinity is controlled at all times by:<br>(1) isolating the area and/or (2) providing interlocked guards; if<br>residual risk remains, add presence-sensing devices; if risk still<br>remains, implement permit-to-work systems. Also explicitly cover<br>remotely/automatically energised plant (e.g., industrial robots) and<br>prohibit directing/allowing work nearby unless these controls are in<br>place.", "", "", "", "", "<b>Source ID:</b> 7.1<br><b>Provision ID:</b> 40<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.553<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY is functionally related to the PROVISION because it sets<br>requirements for an Activity Risk Assessment and workplace conditions<br>(clear access/egress, unobstructed isolation points) that align with<br>the PROVISION\u2019s duties to ensure safe entry/exit, movement, and<br>adequate space/layout without risk to health and safety. However, the<br>POLICY only addresses obstruction-free access/egress in the electrical<br>work area and access to isolation/disconnection points, plus an<br>authorization/consultation step. It does not address several mandatory<br>workplace-condition elements in the PROVISION, including: (c) safe<br>floors/surfaces; (d) lighting for safe work/movement/evacuation; (e)<br>ventilation; (f) managing extremes of heat/cold; and (g) managing<br>risks when working near essential services (beyond electrical<br>isolation access). Therefore, it does not fully satisfy the<br>PROVISION\u2019s broader workplace layout and environmental condition<br>requirements.<br><br><b>Remediation:</b> Expand the Activity Risk Assessment and associated controls to<br>explicitly cover: (1) workspace adequacy (space to work safely) and<br>safe movement/egress under normal and emergency conditions; (2)<br>floor/surface condition checks (slip/trip, stability, maintenance);<br>(3) lighting adequacy for task performance, movement, and emergency<br>evacuation; (4) ventilation adequacy (including fumes/dust/heat load<br>where relevant); (5) controls for extremes of heat/cold (PPE, breaks,<br>hydration, warming/cooling, monitoring); and (6) risks from working<br>near essential services (identify services, exclusion zones, permits,<br>isolation/lockout where applicable). Document these checks and<br>controls as required steps prior to commencing work.", "", "", "", "", "", "", "<b>Source ID:</b> 7.1<br><b>Provision ID:</b> 149<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.561<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires the PCBU to ensure that unsafe electrical<br>equipment is disconnected/isolated from supply and, once isolated, is<br>not reconnected until repaired/tested safe or is replaced/permanently<br>removed. The policy focuses on pre-work Activity Risk Assessment items<br>(clear access/egress, isolation point labeling/accessibility/quick<br>operation, and authorization/consultation) but does not require that<br>unsafe electrical equipment be disconnected/isolated, nor does it<br>prohibit reconnection until repair/testing, nor require<br>replacement/removal. Therefore it does not satisfy the core control<br>obligations in the provision.<br><br><b>Remediation:</b> Amend the policy to explicitly require that any unsafe electrical<br>equipment be immediately disconnected/isolated from its electricity<br>supply, tagged/secured to prevent reconnection, and not reconnected<br>until repaired or tested and found safe, or alternatively replaced or<br>permanently removed from use. Define criteria/process for determining<br>'unsafe' (reasonable grounds), assign responsibility (PCBU/competent<br>person), and include verification/recordkeeping steps.", "", "", "", "", "", "<b>Source ID:</b> 7.1<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.556<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision prohibits energised electrical work unless one of the<br>listed necessity conditions applies (health/safety necessity, required<br>for proper work, required testing, or no reasonable alternative). The<br>policy text focuses on pre-work Activity Risk Assessment controls<br>(clear access/egress, clearly marked and accessible isolation point,<br>and authorisation after consultation). It does not state the core<br>legal threshold that energised work must not be carried out unless one<br>of the provision\u2019s necessity exceptions applies, nor does it require<br>documenting/justifying that exception. Therefore, while related (both<br>govern conditions around electrical work and isolation/authorisation),<br>the policy does not fully implement the provision\u2019s<br>prohibition/exception test for energised work.<br><br><b>Remediation:</b> Amend the policy/ARA requirements to explicitly: (1) prohibit<br>electrical work on energised equipment by default; (2) require<br>confirmation and documentation that at least one of the provision\u2019s<br>conditions (a)-(d) applies before any energised work proceeds; (3)<br>require consideration and documentation that de-energised work is not<br>reasonably practicable (where relevant); and (4) specify that any<br>energised testing/work permitted under the exceptions is limited to<br>what is necessary and is captured in the authorisation/consultation<br>process.", "", "<b>Source ID:</b> 7.1<br><b>Provision ID:</b> 160<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.547<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY sets pre-work Activity Risk Assessment requirements focused<br>on access/egress, isolation/disconnection point labeling and<br>accessibility, and authorization/consultation. The PROVISION requires<br>that during energised electrical work, the PCBU ensures all persons<br>are prevented from creating electrical risk by inadvertent contact<br>with exposed energised components. The POLICY does not address<br>controls for preventing inadvertent contact with exposed energised<br>parts (e.g., barriers, insulation, exclusion zones, supervision,<br>signage, access control, PPE, or procedures specific to energised<br>work). Therefore it does not fulfill the PROVISION\u2019s obligation.<br><br><b>Remediation:</b> Amend the policy to include specific requirements for energised<br>electrical work that prevent inadvertent contact with exposed<br>energised components, such as: establishing and enforcing exclusion<br>zones and access control; installing insulating<br>barriers/covers/screens; applying lockable physical guards where<br>practicable; using warning signage and spotters where needed;<br>specifying required PPE and insulated tools; ensuring only<br>authorised/competent persons are present; and documenting these<br>controls in the Activity Risk Assessment and work method statement for<br>energised work.", "", "", "", "", "", "<b>Source ID:</b> 7.1<br><b>Provision ID:</b> 166<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.572<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires the PCBU to ensure, so far as reasonably<br>practicable, that no person/plant/thing comes within an unsafe<br>distance of overhead or underground electric lines, and if that is not<br>reasonably practicable, to conduct a risk assessment for the proposed<br>work and implement control measures consistent with the risk<br>assessment and any electricity supply authority requirements. The<br>policy text focuses on activity risk assessment items for electrical<br>work such as keeping the work area and isolation/disconnection point<br>clear, ensuring the isolation point is labelled and operable quickly,<br>and requiring authorization after consultation. It does not address<br>maintaining safe distances from overhead/underground electric lines,<br>does not specify triggers/criteria for when safe distance is not<br>reasonably practicable, and does not require controls consistent with<br>the risk assessment and electricity supply authority requirements.<br>Therefore it does not adequately fulfill the provision\u2019s obligations.<br><br><b>Remediation:</b> Update the Activity Risk Assessment and associated procedure to<br>explicitly: (1) identify overhead and underground electric lines and<br>define/require maintaining prescribed safe approach distances; (2)<br>require a specific risk assessment when safe distances cannot be<br>maintained; (3) mandate implementation of control measures aligned to<br>the risk assessment (e.g., de-energisation, isolation,<br>barriers/exclusion zones, spotters, permits, signage, equipment<br>limits); and (4) require consultation/coordination with the<br>electricity supply authority and compliance with its requirements<br>(including any permits/approvals) where it is responsible for the<br>line.", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 7.2<br><b>Provision ID:</b> 146<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.569<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The texts are functionally related because the POLICY governs when and<br>how electrical workers may undertake energised electrical work, which<br>is a subset of \u201celectrical work\u201d as defined in the PROVISION. A<br>compliance check is necessary to ensure the POLICY aligns with the<br>regulatory scope and exclusions for what constitutes \u201celectrical<br>work.\u201d The POLICY does not define \u201celectrical work\u201d or acknowledge the<br>PROVISION\u2019s explicit exclusions (e.g., plug-and-socket connection,<br>non-electrical component work without electrical risk, replacing<br>fuses/light bulbs where safely performed by non-experts, certain<br>supervised conduit work when wiring is not energised, supervised<br>assistance without contact with energised equipment, and eligibility<br>work other than on energised equipment). Because the POLICY broadly<br>triggers an application process for \u201cenergised electrical work\u201d<br>without clarifying boundaries between regulated electrical work and<br>excluded activities, it risks over-applying the approval requirement<br>to tasks that are not \u201celectrical work\u201d under the PROVISION or are<br>explicitly excluded. This is a misalignment with the regulatory<br>definition/scope and could create unnecessary administrative burden<br>and confusion about when the procedure applies.<br><br><b>Remediation:</b> Amend the POLICY/procedure to (1) incorporate or reference the<br>regulatory definition of \u201celectrical work\u201d and its exclusions; (2)<br>clearly state that the energised electrical work application<br>requirement applies only to tasks that are \u201celectrical work\u201d and<br>involve energised electrical equipment (and are not excluded<br>activities); (3) add decision guidance/examples mapping common tasks<br>to whether they are excluded vs. in-scope; and (4) ensure internal<br>forms and training reflect these scope limits so approvals are not<br>required for excluded activities.", "<b>Source ID:</b> 7.2<br><b>Provision ID:</b> 147<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.558<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The provision imposes a general duty on the PCBU to manage risks to<br>health and safety associated with electrical risks at the workplace<br>(per WHS risk management requirements). The policy establishes a<br>governance and risk-control process specifically for energised<br>electrical work, requiring prior application, management endorsement<br>and senior approval, and requiring evidence of competency/licensing,<br>justification under WHS Regulation exemptions, and documented risk<br>assessments/SWIs. These measures are consistent with managing<br>electrical risks and therefore functionally relate to the provision.<br>While the provision is broader than energised work alone, the policy<br>content provided aligns with and supports compliance for the energised<br>electrical work scenario it covers.", "", "", "", "", "<b>Source ID:</b> 7.2<br><b>Provision ID:</b> 154<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.559<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision imposes a primary duty on the PCBU to ensure electrical<br>work is not carried out while equipment is energised (i.e., energised<br>work is prohibited unless an applicable exception under the Division<br>applies). The policy establishes an approval and visibility process<br>for undertaking energised electrical work and references WHS<br>Regulations s157 exemptions, but it does not explicitly state the<br>overarching requirement that energised electrical work must not be<br>performed and is only permitted where the legal exemption/exception<br>criteria are met and de-energisation is not reasonably practicable (or<br>other applicable exception). By framing energised work as something<br>that can be permitted via internal approval without clearly anchoring<br>it to the legal prohibition and exception threshold, the policy does<br>not fully ensure compliance with the provision\u2019s requirement to<br>prevent energised work.<br><br><b>Remediation:</b> Amend the policy to explicitly state that electrical work must be<br>performed de-energised and that energised electrical work is<br>prohibited except where the WHS legal exception criteria are<br>satisfied. Require documented justification that de-energisation is<br>not reasonably practicable (or other applicable exception), and make<br>approval contingent on verifying those criteria, including controls to<br>ensure energised work does not occur outside approved exceptions.", "<b>Source ID:</b> 7.2<br><b>Provision ID:</b> 155<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.614<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY governs the internal approval process for undertaking<br>energised electrical work (application, endorsements, competency<br>verification, and risk assessment attachments). The PROVISION imposes<br>operational safety duties on the PCBU that must occur before and<br>during electrical work: (1) ensure equipment is tested by a competent<br>person to determine whether it is energised before electrical work is<br>carried out; and (2) ensure exposed parts are treated as energised<br>until isolated and proven de-energised, and that high-voltage exposed<br>parts are earthed after de-energisation. The POLICY references WHS<br>Regulation 157 exemptions and discusses planning for de-energised vs<br>energised work, competency, and risk assessments, but it does not<br>explicitly require pre-work testing to determine energisation status,<br>does not mandate treating exposed parts as energised until isolation<br>and confirmation, and does not require earthing of high-voltage<br>exposed parts after de-energisation. Therefore, it does not fully<br>address the specific controls required by the PROVISION.<br><br><b>Remediation:</b> Update the policy/application requirements to explicitly mandate: (1)<br>testing of electrical equipment by a competent person before<br>electrical work to determine whether it is energised (and reference<br>the required testing method/process, e.g., per Reg 161); (2) a rule<br>that all exposed parts are treated as energised until isolated and<br>confirmed de-energised; and (3) for high-voltage work, earthing of<br>exposed parts after de-energisation. Ensure these items are captured<br>as mandatory checklist fields in the application form and/or SWIs/risk<br>assessments, with evidence/records required.", "", "<b>Source ID:</b> 7.2<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.632<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY establishes an internal approval and documentation process<br>for undertaking energised electrical work and references that the work<br>must be justified and meet the WHS Regulations s157 exemptions. The<br>PROVISION (WHS Regs r157) imposes a substantive legal requirement that<br>energised electrical work must not be carried out unless one of the<br>necessity/no-alternative conditions in (1)(a)-(d) applies. While the<br>POLICY indicates that energised work must be justified and meet the<br>exemptions, it does not explicitly require the application/approval<br>process to confirm and record which specific r157(1) condition applies<br>(a, b, c, or d), nor does it clearly prohibit energised work unless<br>one of those conditions is met. Therefore, the POLICY is only<br>partially aligned and does not fully operationalize the PROVISION\u2019s<br>threshold test as a mandatory gate.<br><br><b>Remediation:</b> Amend the application/approval requirements to explicitly: (1)<br>prohibit energised electrical work unless at least one WHS Reg<br>r157(1)(a)-(d) criterion is satisfied; (2) require the applicant to<br>nominate the applicable criterion (a/b/c/d) and provide documented<br>justification/evidence; (3) require approvers (line manager, Group<br>Leader, BU Director) to verify and sign off that the nominated r157<br>criterion is met before approval; and (4) ensure testing under r155 is<br>explicitly captured where r157(1)(c) is relied upon.", "<b>Source ID:</b> 7.2<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.647<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY establishes an internal approval/application process for<br>undertaking energised electrical work and requires attachments such as<br>risk assessments and competency verification. This is functionally<br>related to the PROVISION, which imposes mandatory preconditions before<br>energised electrical work commences (risk assessment by a competent<br>person and recorded; area and isolation point access/egress<br>requirements; and authorisation after consultation with the person<br>with management/control of the workplace). The POLICY partially aligns<br>with the PROVISION by requiring risk assessments/SWIs to be completed<br>and attached, and by requiring management endorsement/approval (line<br>manager, Group Leader, BU Director), which supports an authorisation<br>concept. However, it does not explicitly require that: (1) the work<br>area is clear of obstructions to allow easy access and exit; (2) the<br>isolation/disconnection point is clearly marked/labelled, unobstructed<br>for access/exit, and capable of being operated quickly; (3)<br>authorisation occurs after consulting with the person with management<br>or control of the workplace (the policy specifies internal management<br>approvals but not the specific consultation requirement); and (4) the<br>risk assessment is conducted by a competent person and recorded (it<br>requires risk assessments but does not explicitly state competent-<br>person conduct and recording, though attachments imply recording).<br>Because several explicit pre-commencement controls in the PROVISION<br>are not addressed, the POLICY is not fully compliant as written.<br><br><b>Remediation:</b> Update the POLICY/application requirements to explicitly mandate,<br>before energised work starts: (a) a recorded risk assessment conducted<br>by a competent person; (b) confirmation the work area is clear of<br>obstructions for safe access/egress; (c) confirmation the<br>isolation/disconnection point is clearly labelled/marked,<br>unobstructed, readily accessible for exit, and operable quickly<br>(including noting the exception where applicable); and (d) documented<br>authorisation after consultation with the person with management or<br>control of the workplace (e.g., workplace controller/facility<br>manager), with evidence captured in the application/permit.", "<b>Source ID:</b> 7.2<br><b>Provision ID:</b> 160<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.572<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY establishes an internal approval and competency/risk-<br>assessment process for undertaking energised electrical work<br>(application, endorsements, evidence of competency, and risk<br>assessments). The PROVISION imposes an operational safety duty during<br>energised electrical work: the PCBU must ensure all persons are<br>prevented from creating an electrical risk by inadvertently contacting<br>exposed energised components. While the POLICY supports safer<br>energised work through governance and planning, it does not explicitly<br>require or describe the specific control outcome mandated by the<br>PROVISION (preventing inadvertent contact with exposed energised<br>components), nor does it mandate physical/administrative controls<br>(e.g., barriers, insulation, exclusion zones, supervision) to achieve<br>that prevention during the work.<br><br><b>Remediation:</b> Amend the policy/application requirements to explicitly require<br>controls that prevent inadvertent contact with exposed energised<br>components during energised work, such as: documented<br>isolation/exclusion zones; barriers/guards/covers or insulating<br>mats/blankets; lockable enclosures where practicable; signage and<br>access control to restrict non-essential persons; use of insulated<br>tools/PPE appropriate to the task; a safety observer/spotter where<br>required; and verification in the risk assessment/SWI that these<br>controls are implemented and maintained for the duration of the work.", "<b>Source ID:</b> 7.2<br><b>Provision ID:</b> 161<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.634<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY establishes an internal approval and documentation process<br>for undertaking energised electrical work (application, endorsements,<br>attachments such as risk assessments/SWIs and competency<br>verification). This is functionally related to the PROVISION, which<br>imposes mandatory conditions on how energised electrical work must be<br>carried out (competent person with suitable/tested/maintained<br>tools/PPE, work in accordance with a compliant safe work method<br>statement, and use of a safety observer unless an exception applies).<br>However, the POLICY does not explicitly require: (1) that<br>tools/testing equipment/PPE are suitable, properly tested, and<br>maintained in good working order; (2) that the work is carried out in<br>accordance with a safe work method statement meeting the specific<br>content requirements (identify work, hazards/risks, controls, and<br>implementation/monitoring/review); (3) that a safety observer is<br>present for energised work, including the observer\u2019s competence and<br>12-month rescue/resuscitation assessment, nor does it clearly document<br>the limited exception for testing with a risk assessment showing no<br>serious risk. The POLICY\u2019s references to Activity Risk Assessments and<br>SWIs partially align with the SWMS concept but do not ensure all SWMS<br>elements required by the PROVISION are met.<br><br><b>Remediation:</b> Update the POLICY/application requirements to explicitly mandate: (a)<br>confirmation and records that tools, testing equipment and PPE are<br>suitable for the task, have been properly tested, and are maintained<br>in good working order, and that workers use them properly; (b) a Safe<br>Work Method Statement (or equivalent document) that includes all<br>elements in subregulation (3) and is required for all energised<br>electrical work; (c) a safety observer requirement for energised work,<br>including observer competency and documented assessment within the<br>last 12 months for rescue/resuscitation, plus clear criteria and<br>documentation for the testing-only exception (risk assessment<br>demonstrating no serious risk). Ensure the application form captures<br>these items and requires evidence/attachments where appropriate.", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 7.3<br><b>Provision ID:</b> 147<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.591<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The provision imposes a general duty on the PCBU to manage risks to<br>health and safety associated with electrical risks at the workplace in<br>accordance with Part 3.1. The policy sets specific risk controls for<br>energised electrical work (competent person with suitable/maintained<br>tools, testing equipment and PPE; work performed under a Safe Work<br>Instruction; use of a competent safety observer with<br>rescue/resuscitation capability unless testing-only with no serious<br>risk per risk assessment). These measures constitute a structured<br>approach to identifying and controlling electrical risks and align<br>with the requirement to manage electrical risks.", "", "", "", "", "", "<b>Source ID:</b> 7.3<br><b>Provision ID:</b> 155<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.680<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires the PCBU to ensure that before electrical work<br>is carried out on electrical equipment, the equipment is tested by a<br>competent person to determine whether it is energised, and that<br>exposed parts are treated as energised until isolated and determined<br>not energised (and high-voltage exposed parts earthed after de-<br>energising). The policy focuses on requirements for performing<br>energised electrical work (competent person, SWI, safety observer with<br>an exception for testing-only work). It does not explicitly require<br>pre-work testing to determine energisation status, does not state that<br>exposed parts must be treated as energised until isolation and<br>confirmation, and does not address earthing of high-voltage exposed<br>parts after de-energising. Therefore, it does not fully meet the<br>provision\u2019s obligations.<br><br><b>Remediation:</b> Amend the policy to explicitly require that, before electrical work on<br>electrical equipment begins, a competent person tests the equipment to<br>determine whether it is energised (with testing performed in<br>accordance with applicable procedures/regs). Add requirements that (1)<br>all exposed parts are treated as energised until isolated and<br>confirmed de-energised, and (2) any high-voltage exposed parts are<br>earthed after being de-energised. Ensure these steps are incorporated<br>into the Safe Work Instruction and training/competency expectations.", "", "", "<b>Source ID:</b> 7.3<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.692<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY governs how energised electrical work must be performed<br>(competent person with suitable tools/PPE, ed from creating an electrical<br>risk by inadvertently contacting an exposed energised component. The<br>policy focuses on who may perform energised work (competent person<br>with suitable tools/PPE), use of a Safe Work Instruction, and<br>(generally) having a competent safety observer, with an exception for<br>testing where a risk assessment shows no serious risk. However, it<br>does not explicitly require controls to prevent all persons (including<br>bystanders/other workers) from inadvertent contact with exposed<br>energised components (e.g., barriers, exclusion zones,<br>insulation/covering, access control, signage, guarding). The presence<br>of a safety observer and PPE may reduce risk but does not, on its<br>face, ensure prevention of inadvertent contact by all persons as<br>required by the provision.<br><br><b>Remediation:</b> Amend the policy/SWI requirements to explicitly mandate controls that<br>prevent inadvertent contact with exposed energised components by any<br>person during energised work, such as: establishing and enforcing<br>exclusion zones; barricading/guarding and insulating or shrouding<br>exposed live parts; access control/permit-to-work and supervision;<br>warning signage; and verification that these controls are in place<br>before and during the task (including when the safety observer<br>exception applies).", "<b>Source ID:</b> 7.3<br><b>Provision ID:</b> 161<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.840<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY is clearly intended to implement the same obligations as<br>the PROVISION for energised electrical work (competent person with<br>suitable/tested/maintained tools/PPE; documented safe work document;<br>safety observer with specified competence; testing-only exception<br>based on risk assessment). However, it is not fully compliant because:<br>(1) The PROVISION requires the work be carried out in accordance with<br>a \"safe work method statement\" (SWMS) with specific required contents<br>(identify work; specify hazards/risks; describe control measures;<br>describe implementation/monitoring/review). The POLICY instead refers<br>to a \"Safe Work Instruction\" and does not state the mandatory SWMS<br>content requirements. (2) The PROVISION imposes an additional duty to<br>ensure, so far as reasonably practicable, that the worker uses<br>tools/testing equipment/PPE properly; the POLICY does not include this<br>obligation. (3) The testing-only exception in the PROVISION requires<br>that the PCBU has conducted a risk assessment under regulation<br>158(1)(a); the POLICY mentions a risk assessment but does not specify<br>that it must be conducted by/for the PCBU under the referenced<br>regulation (or an equivalent formal requirement), creating a potential<br>gap in accountability and process.<br><br><b>Remediation:</b> Update the POLICY to: (1) require a Safe Work Method Statement (SWMS)<br>for energised electrical work (or explicitly define the Safe Work<br>Instruction as meeting SWMS requirements) and include the minimum SWMS<br>elements: identification of the work, hazards/risks, control measures,<br>and how controls will be implemented/monitored/reviewed; (2) add an<br>explicit requirement that, so far as reasonably practicable, the<br>business ensures workers use tools/testing equipment/PPE properly; (3)<br>tighten the testing-only safety observer exception to require a<br>documented risk assessment conducted by the PCBU (and reference the<br>applicable regulation/process) demonstrating no serious risk.", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 7.4<br><b>Provision ID:</b> 146<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.534<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The texts are functionally related because the POLICY governs controls<br>for \u201cenergised electrical work\u201d and \u201celectrical work,\u2 k<br>to determine energisation status (with reference to applicable testing<br>method requirements); (2) a rule that all exposed parts must be<br>treated as energised until isolated and verified de-energised; and (3)<br>for high-voltage work, a step requiring exposed parts to be earthed<br>after de-energising. Ensure SWI review triggers include changes to<br>testing/isolation/earthing controls.", "", "<b>Source ID:</b> 7.4<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.553<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires the PCBU to ensure energised electrical work is<br>not carried out unless one of the listed necessity conditions applies<br>(health and safety necessity, necessity to perform the work properly,<br>testing under reg 155, or no reasonable alternative). The policy<br>focuses on requiring a Safe Work Instruction (SWI) for energised<br>electrical work and specifies SWI content and review requirements, but<br>it does not state or enforce the threshold prohibition/permission<br>criteria for when energised work may be performed (i.e., it does not<br>require de-energisation by default or require documenting/justifying<br>that one of the subregulation (1) conditions is met before<br>proceeding). Therefore, while related, the policy does not fully<br>implement the provision\u2019s core obligation.<br><br><b>Remediation:</b> Amend the policy/SWI requirements to explicitly prohibit energised<br>electrical work unless one of the WHS Reg conditions is satisfied, and<br>require the SWI (or an attached risk assessment/authorisation) to<br>document which condition applies (1)(a)-(d), including justification<br>that there is no reasonable alternative where relevant. Include an<br>approval/authorisation gate that verifies the applicable condition<br>before work starts, and ensure testing is aligned to reg 155 where<br>applicable.", "<b>Source ID:</b> 7.4<br><b>Provision ID:</b> 158<br p-work and resume-only-when-compliant<br>requirement when deviations occur. Therefore, it does not fully<br>satisfy the PROVISION\u2019s operational enforcement requirements.<br><br><b>Remediation:</b> Amend the POLICY/SWI framework to explicitly require: (1) documented<br>arrangements to ensure high risk construction work is performed in<br>accordance with the applicable SWMS (or SWI as the equivalent),<br>including supervision/verification and worker<br>briefing/acknowledgement; and (2) a mandatory stop-work process when<br>work is not being performed in accordance with the SWMS/SWI, with<br>clear authority to stop work and a requirement that work only resumes<br>once brought back into compliance with the SWMS/SWI.", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 7.5<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.549<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires the PCBU to ensure energised electrical work is<br>not carried out unless one of the necessity conditions in (1)(a)-(d)<br>is met (including testing under (c)). The policy focuses on requiring<br>a safety observer for energised work (with a limited exception for<br>testing where a risk assessment shows an observer is not required),<br>but it does not state or require that energised work may only proceed<br>when one of the regulatory necessity criteria (health and safety<br>necessity, necessary to perform properly, testing required under reg<br>155, or no reasonable alternative) is satisfied. Because the policy<br>permits energised work subject to observer/risk-assessment controls<br>without explicitly restricting it to the regulation\u2019s allowed<br>circumstances, it does not fully implement the provision\u2019s threshold<br>prohibition/permission structure.<br><br><b>Remediation:</b> Amend the policy to explicitly prohibit energised electrical work<br>unless at least one of the conditions ach high-voltage<br>exposed part after de-energising. Include clear responsibilities,<br>step-by-step verification/isolation/earthing processes, and references<br>to the relevant testing method requirements.", "<b>Source ID:</b> 7.6<br><b>Provision ID:</b> 156<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.593<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY text provides guidance on managing electrical risks during<br>energised electrical work (e.g., hazards from conductive materials,<br>safe work positioning, and use of barriers/signage). The PROVISION<br>imposes a specific duty: when equipment is de-energised for electrical<br>work, it must be prevented from being inadvertently re-energised<br>(i.e., isolation/lockout-tagout type controls). The POLICY does not<br>address preventing inadvertent re-energisation of de-energised<br>equipment, so it does not demonstrate compliance with the PROVISION\u2019s<br>requirement.<br><br><b>Remediation:</b> Add/implement controls and procedures to ensure de-energised<br>electrical equipment cannot be inadvertently re-energised during work,<br>such as documented isolation procedures, lockout/tagout, securing<br>isolation points, verification of de-energisation, control of<br>keys/access, signage specific to isolation, and supervision/auditing<br>to ensure the controls are followed.", "<b>Source ID:</b> 7.6<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.636<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY text is guidance about managing electrical risks when<br>carrying out energised electrical work (e.g., indirect electrical<br>hazards, safe work positioning, and use of safety barriers/signage).<br>The PROVISION imposes a primary legal obligation: energised electrical<br>work must not be carried out unless one of the listed necessity<br>conditions applies (health and safety necessity, work requires<br>energisa nt conducted/recorded by a competent person; clearing<br>obstructions for access/exit; marking/labeling and operability of<br>isolation point; formal authorisation/consultation). Therefore, the<br>POLICY as written does not demonstrate coverage of the PROVISION\u2019s<br>required controls and cannot be considered compliant with it.<br><br><b>Remediation:</b> Update the policy/procedure for energised electrical work to<br>explicitly require: (1) a pre-work risk assessment conducted by a<br>competent person and recorded; (2) the work area to be cleared of<br>obstructions to allow easy access and exit; (3) the<br>isolation/disconnection point to be clearly marked/labelled,<br>unobstructed for access/exit, and capable of quick operation (and<br>document the exception conditions where applicable); and (4) formal<br>authorisation of the work after consultation with the person with<br>management/control of the workplace. Ensure these requirements are<br>implemented via checklists/permits and training.", "<b>Source ID:</b> 7.6<br><b>Provision ID:</b> 160<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.653<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The provision imposes a duty to ensure that, during energised<br>electrical work, all persons are prevented from creating an electrical<br>risk by inadvertently contacting exposed energised components. The<br>policy text (Section 6.3 guidance) addresses measures directly aligned<br>with this duty, including work positioning to minimise inadvertent<br>contact and the use of safety barriers and signs when work is carried<br>out. These controls are functionally aimed at preventing inadvertent<br>contact with exposed energised parts, satisfying the core requirement<br>of the provision.", "<b>Source ID:</b> 7.6<br><b>Provision ID:</b> 161<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.614<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY text is guidance intended to support compliance when<br>carrying out energised electrical work, addressing hazards indirectly<br>caused by electricity (e.g., conductive materials), work positioning<br>to minimise inadvertent contact with exposed energised parts, and the<br>need for safety barriers and signs. The PROVISION imposes specific<br>mandatory requirements on energised electrical work: it must be<br>performed by a competent person with suitable/tested/maintained tools<br>and PPE; in accordance with a safe work method statement (SWMS)<br>meeting detailed content requirements; and (subject to exceptions)<br>with a competent safety observer assessed within the last 12 months<br>for rescue/resuscitation. The POLICY does not explicitly require or<br>evidence these mandated elements (competent person criteria,<br>tested/maintained tools/PPE, SWMS preparation and required contents,<br>safety observer presence/competency/assessment, or the risk assessment<br>basis for any observer exemption). Therefore, while related, the<br>POLICY as written is insufficient to demonstrate compliance with the<br>PROVISION.<br><br><b>Remediation:</b> Update the policy/procedure for energised electrical work to<br>explicitly require: (1) work only by a competent person; (2) use of<br>tools/testing equipment/PPE that are suitable, properly tested, and<br>maintained; (3) a SWMS prepared for the work that identifies the work,<br>hazards/risks, control measures, and how controls are<br>implemented/monitored/reviewed; (4) a safety observer present unless<br>the work is testing-only and a documented risk assessment shows no<br>serious risk; (5) safety observer competency and documented assessment<br>within the last 12 months for rescue and resuscitation; and (6) a<br>requirement (so far as reasonably practicable) that workers properly<br>use the tools/testing equipment/PPE.", "", "", "", "", "<b>Source ID:</b> 7.6<br><b>Provision ID:</b> 166<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.633<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision imposes a duty to ensure, so far as reasonably<br>practicable, that persons/plant/things do not come within an unsafe<br>distance of overhead or underground electric lines, and if that is not<br>reasonably practicable, to conduct a risk assessment and implement<br>control measures consistent with the assessment and any electricity<br>supply authority requirements. The policy text discusses guidance for<br>managing electrical risks during energised electrical work, including<br>indirect hazards (conductive materials), work positioning to avoid<br>inadvertent contact with exposed energised parts, and erection of<br>safety barriers and signs. While these topics are related to<br>electrical risk controls, the policy does not explicitly address<br>maintaining safe distances from overhead/underground electric lines,<br>does not state the 'so far as reasonably practicable' requirement, and<br>does not include the mandated fallback process (risk assessment and<br>controls aligned to the assessment and supply authority requirements)<br>when safe distance cannot be ensured. Therefore, the policy is not<br>sufficient to demonstrate compliance with the specific obligations in<br>the provision.<br><br><b>Remediation:</b> Update the policy/procedure to explicitly require: (1) maintaining<br>prescribed/defined safe (unsafe) approach distances from overhead and<br>underground electric lines for all persons, plant and things, so far<br>as reasonably practicable; (2) where safe distance is not reasonably<br>practicable, conducting a documented risk assessment for the proposed<br>work; (3) implementing and documenting control measures consistent<br>with the risk assessment; and (4) consulting and complying with any<br>applicable electricity supply authority requirements for the relevant<br>line (including permits, isolation, de-energisation, spotters,<br>exclusion zones, and signage/barriers as applicable).", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 7.7<br><b>Provision ID:</b> 147<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.553<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The provision imposes a general duty on the PCBU to manage risks to<br>health and safety associated with electrical risks (including testing)<br>in accordance with WHS risk management requirements. The policy<br>directly addresses managing electrical risks during testing and fault-<br>finding by requiring de-energised methods where possible, specifying<br>controls for energised testing (barriers, authorised access,<br>insulated/rated tools and probes, PPE, safety observer based on risk<br>assessment, ongoing hazard review), ensuring equipment<br>suitability/maintenance/calibration, requiring worker<br>competence/training, and restoring equipment to a safe condition.<br>These measures constitute practical risk controls consistent with<br>managing electrical risks under Part 3.1.", "", "", "<b>Source ID:</b> 7.7<br><b>Provision ID:</b> 150<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.614<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The PROVISION requires the PCBU to ensure certain electrical equipment<br>(plug-in equipment used in harsh/damaging environments) is regularly<br>inspected and tested by a competent person, and to keep specified<br>testing records (name, date, outcome, next test due) until the next<br>test or disposal. The POLICY focuses on safe methods and controls for<br>electrical testing and fault-finding (especially energised work),<br>including instrument standards, PPE, barriers, authorised access, and<br>worker competence. However, it does not establish a program for<br>regular inspection/testing of plug-in equipment in specified<br>environments, does not state inspection/testing frequency/trigger<br>criteria, and does not require keeping the mandated testing records or<br>tagging with the required fields. Therefore it does not fulfill the<br>core obligations of the PROVISION.<br><br><b>Remediation:</b> Add a section covering in-scope equipment (plug-in equipment used in<br>environments likely to cause damage), require regular inspection and<br>testing by a competent person (including defined intervals or a risk-<br>based schedule), require pre-use inspection of new/unused equipment<br>for obvious damage, and implement recordkeeping that captures: tester<br>name, test date, outcome, and next test due date (e.g., via compliant<br>tags and/or a register) retained until next test or disposal. Also<br>reference the prohibition on using unsafe equipment and link to the<br>organization\u2019s process for removing/isolating failed items.", "", "", "<b>Source ID:</b> 7.7<br><b>Provision ID:</b> 155<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.663<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires the PCBU to ensure that, before electrical work<br>is carried out on electrical equipment, the equipment is tested by a<br>competent person to determine whether it is energised. It also<br>requires exposed parts to be treated as energised until isolated and<br>proven de-energised, and requires each high-voltage exposed part to be<br>earthed after being de-energised. The policy is broadly about testing<br>and fault-finding and includes requirements for competent/trained<br>workers and safe testing practices, but it does not explicitly mandate<br>a pre-work test to determine whether equipment is energised before any<br>electrical work begins. It also does not clearly state the legal rule<br>that exposed parts must be treated as energised until isolated and<br>proven de-energised, nor does it include the specific requirement to<br>earth each high-voltage exposed part after de-energisation. Therefore,<br>it does not fully satisfy the provision\u2019s specific obligations.<br><br><b>Remediation:</b> Amend the policy to explicitly require that before any electrical work<br>on electrical equipment begins, a competent person must test the<br>equipment to determine whether it is energised (and document/verify<br>this step as part of the work process). Add an explicit rule that all<br>exposed parts are to be treated as energised until isolated and proven<br>de-energised. Add a specific requirement that each high-voltage<br>exposed part must be earthed after being de-energised, including<br>procedural guidance (e.g., approved earthing devices, sequence,<br>verification) consistent with applicable regulations/standards.", "", "<b>Source ID:</b> 7.7<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.580<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision prohibits energised electrical work unless one of the<br>listed necessity conditions applies (health/safety necessity,<br>necessary to perform properly, necessary for testing under reg 155, or<br>no reasonable alternative). The policy focuses on how to conduct<br>testing and fault-finding safely (controls, barriers, authorised<br>access, suitable instruments/PPE, competency, restoration,<br>coordination), and it states that de-energised methods should be<br>considered before energised methods are adopted. However, it does not<br>explicitly require that energised work must not be carried out unless<br>one of the provision\u2019s necessity criteria is met, nor does it require<br>documenting/justifying that criterion (e.g., that there is no<br>reasonable alternative). Therefore, while it supports safe execution,<br>it does not fully implement the legal threshold/permissioning<br>condition for when energised work is allowed.<br><br><b>Remediation:</b> Amend the policy to explicitly prohibit energised electrical work<br>unless at least one of the permitted conditions is satisfied<br>(health/safety necessity, necessary to perform properly, nece ical equipment, including tools/test<br>equipment/PPE suitability and maintenance, competency, and use of<br>safety observers\u2014topics directly regulated by the PROVISION.  However,<br>the POLICY does not fully satisfy the PROVISION\u2019s mandatory elements:<br>1) Safe Work Method Statement (SWMS): The PROVISION requires energised<br>electrical work to be carried out in accordance with a SWMS prepared<br>for the work, and specifies minimum SWMS content (identify work,<br>hazards/risks, controls, and how controls are<br>implemented/monitored/reviewed). The POLICY discusses risk assessment<br>and procedures but does not explicitly require a SWMS for energised<br>electrical work nor include the required SWMS content requirements. 2)<br>Safety observer requirement: The PROVISION makes a safety observer<br>mandatory for energised electrical work, except where the work is only<br>testing and a specific risk assessment shows no serious risk. The<br>POLICY states \u201cUse a safety observer, if required by the risk<br>assessment,\u201d which is weaker than the default mandatory requirement<br>and does not clearly reflect the limited exception. 3) Safety observer<br>competence/rescue & resuscitation currency: The PROVISION requires the<br>safety observer to be competent and assessed within the previous 12<br>months as competent to rescue and resuscitate. The POLICY mentions a<br>safety observer may be required but does not specify these<br>competence/assessment requirements. 4) Ensuring proper use of<br>tools/PPE: The POLICY requires ensuring workers have suitable, tested,<br>maintained tools/PPE and provides training/instruction on PPE use, but<br>it does not clearly impose the PCBU duty to ensure (so far as<br>reasonably practicable) that tools/testing equipment/PPE are used<br>properly (beyond PPE training).<br><br><b>Remediation:</b> Amend the POLICY to explicitly require that all energised electrical<br>work is performed in accordance with a SWMS prepared for the work, and<br>specify SWMS minimum contents (work identification; hazards/risks;<br>control measures; implementation/monitoring/review).  Revise the<br>safety observer section to align with the regulation: require a safety<br>observer for energised electrical work by default, and only allow the<br>exception where (i) the work consists only of testing and (ii) a<br>documented risk assessment shows no serious risk.  Add explicit safety<br>observer qualification requirements: the observer must be competent<br>and have been assessed within the last 12 months as competent to<br>rescue and resuscitate.  Add an explicit duty/process for the<br>PCBU/supervisor to ensure, so far as reasonably practicable, that<br>workers properly use tools, testing equipment and PPE (e.g.,<br>supervision, pre-start checks, audits/spot checks, enforcement).", "", "", "", "<b>Source ID:</b> 7.7<br><b>Provision ID:</b> 165<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.545<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision imposes a specific obligation on the person with<br>management or control of a workplace to (1) ensure residual current<br>devices (RCDs) are tested regularly by a competent person to confirm<br>effective operation, and (2) keep records of all RCD testing (except<br>daily testing) until the next test or permanent removal. The policy<br>text addresses general electrical testing and fault-finding practices,<br>competence, instrument standards, PPE, and safety controls, but it<br>does not specifically require regular RCD testing, does not define an<br>RCD testing regime, and does not require retention of RCD test records<br>as specified. Therefore, the policy does not demonstrate compliance<br>with the provision\u2019s RCD testing and recordkeeping requirements.<br><br><b>Remediation:</b> Amend the policy/procedure to explicitly require: (1) regular testing<br>of all workplace RCDs by a competent person (define frequency<br>consistent ve actions (return/modify/certify) if<br>unsafe. These controls are functionally aligned with ensuring<br>equipment within the provision\u2019s scope is safe and standards-compliant<br>prior to commissioning. The policy does not conflict with the<br>provision\u2019s definition and is broadly consistent with applying<br>compliance checks to equipment that meets the defined criteria.", "", "", "<b>Source ID:</b> 8.1<br><b>Provision ID:</b> 147<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.499<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The provision requires a PCBU to manage risks to health and safety<br>associated with electrical risks at the workplace. The policy<br>establishes controls to manage electrical risk specifically for<br>electrical equipment procurement and commissioning: ensuring equipment<br>meets applicable Australian Standards (or recognised equivalents)<br>before commissioning, inspecting newly acquired (especially<br>internationally purchased) equipment, engaging an electrician where<br>doubt exists, and returning or modifying/certifying unsafe equipment.<br>These measures are consistent with risk management for electrical<br>equipment and align with managing electrical risks associated with<br>design/construction/installation and related lifecycle considerations<br>referenced in the provision.", "", "<b>Source ID:</b> 8.1<br><b>Provision ID:</b> 149<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.527<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The policy addresses ensuring electrical equipment meets Australian<br>Standards before commissioning, inspecting newly acquired equipment<br>(especially international purchases), and<br>returning/modifying/certifying equipment if it is electrically unsafe.<br>The provision requires that any unsafe electrical equipment at the<br>workplace is disconnected/isolated from supply and, once disconnected,<br>is not reconnected until repaired or tested and found safe, or is<br>replaced/permanently removed. The policy does not explicitly require<br>immediate disconnection/isolation of unsafe equipment, nor does it<br>prohibit reconnection until repair/testing confirms safety, nor does<br>it require replacement/permanent removal as an alternative control.<br>Therefore it does not fully meet the operational control requirements<br>of the provision for handling unsafe equipment at the workplace.<br><br><b>Remediation:</b> Update the policy/procedure to explicitly require that any electrical<br>equipment suspected or believed on reasonable grounds to be unsafe is<br>immediately disconnected/isolated from the electricity supply,<br>tagged/secured to prevent use, and not reconnected until it has been<br>repaired or tested and found safe by a competent person; alternatively<br>require replacement or permanent removal from use. Include clear<br>responsibilities, steps for isolation/lockout-tagout, and<br>documentation/verification requirements.", "<b>Source ID:</b> 8.1<br><b>Provision ID:</b> 150<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.569<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY addresses ensuring purchased electrical equipment meets<br>Australian Standards before commissioning, inspecting newly acquired<br>equipment (especially imported), engaging an electrician if in doubt,<br>and returning/modifying unsafe equipment. The PROVISION requires (1)<br>regular inspection and testing by a competent person for socket-outlet<br>supplied equipment used in harsh/damaging environments; (2) for<br>new/unused equipment, inspection for obvious damage before use; and<br>(3)-(4) keeping specified testing records until next test/removal. The<br>POLICY partially aligns with subregulation (2)(b) by requiring<br>inspection of newly acquired equipment and not using/rectifying unsafe<br>equipment, but it does not establish a program for regular<br>inspection/testing in applicable environments (subregulation (1)),<br>does not require testing by a competent person, and does not require<br>maintaining testing records with the specified details (subregulations<br>(3)-(4)). Therefore it does not fully satisfy the PROVISION.<br><br><b>Remediation:</b> Add requirements to the policy/procedure to: (1) identify electrical<br>equipment that is socket-outlet supplied and used in environments<br>likely to cause damage (moisture/heat/vibration/mechanical<br>damage/chemicals/dust) and ensure it is regularly inspected and tested<br>by a competent person at defined intervals; (2) ensure new/unused<br>equipment is inspected for obvious damage before first use (explicitly<br>stated); (3) keep testing records until the next test or until the<br>equipment is removed/disposed, including tester name, test date,<br>outcome, and next test due date; and (4) allow/require tagging of<br>equipment to evidence testing and next due date.", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 8.1<br><b>Provision ID:</b> 163<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.549<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision imposes a specific legal obligation on a PCBU carrying<br>out construction work to comply with AS/NZS 3012:2019 for electrical<br>installations on construction and demolition sites. The policy<br>addresses ensuring purchased electrical equipment meets applicable<br>Australian Standards (e.g., AS/NZS 3820) and inspection/certification<br>of equipment, which is related to electrical safety but does not<br>require or reference compliance with AS/NZS 3012:2019, nor does it<br>establish controls to ensure construction-site electrical<br>installations meet that standard. Therefore, the policy does not fully<br>satisfy the provision\u2019s specific requirement.<br><br><b>Remediation:</b> Update the policy (or add a construction-work electrical installations<br>procedure) to explicitly require compliance with AS/NZS 3012:2019 for<br>construction and demolition sites, including responsibilities,<br>verification/inspection/testing regimes, and documentation to<br>demonstrate compliance with AS/NZS 3012:2019 as applied under the<br>Regulations.", "<b>Source ID:</b> 8.1<br><b>Provision ID:</b> 164<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.499<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY addresses procurement/commissioning safety by requiring<br>electrical equipment to meet Australian Standards (e.g., AS/NZS 3820),<br>inspection of newly acquired (especially imported) equipment, and<br>returning/modifying unsafe equipment. The PROVISION imposes an<br>operational control requirement in specified higher-risk use<br>circumstances: the PCBU must minimise electrical risk from socket-<br>outlet supply by using an appropriate residual current device (RCD),<br>generally with \u226430 mA trip current for socket outlets \u226420 A, subject<br>to stated exceptions. The POLICY does not mention RCD use, the<br>specific triggering circumstances<br>(moisture/heat/vibration/movement/amusement devices), the 30 mA<br>requirement, or the exceptions. Therefore, while related to electrical<br>safety, the POLICY does not fulfill the PROVISION\u2019s specific<br>obligation to ensure appropriate RCD protection in the listed<br>circumstances.<br><br><b>Remediation:</b> Amend the policy/procedure to require that, in the circumstances<br>listed in the regulation (harsh environments, equipment moved between<br>locations, frequently moved equipment, amusement devices), electrical<br>equipment supplied via socket outlets must be protected by an<br>appropriate RCD, and specify that for socket outlets \u226420 A the RCD<br>trip current must be \u226430 mA. Include the regulation\u2019s exceptions (\u226450<br>VAC, DC, isolating transformer equivalent protection, non-earthed<br>isolated generator equivalent protection) and assign responsibility<br>for verifying/maintaining RCD protection (e.g., electrician<br>verification, periodic testing/inspection).", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 8.2<br><b>Provision ID:</b> 146<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.569<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision defines what constitutes 'electrical work' and lists<br>exclusions where work is not considered electrical work (e.g.,<br>replacing a fuse/light bulb, non-electrical component work without<br>electrical risk, plug-and-socket connection). The policy requires that<br>modifications/repairs/replacements to electrical equipment be carried<br>out only by a competent person and that, after completion, the<br>equipment must be electrically tested, tagged, and certified prior to<br>commissioning. This policy applies broadly to modifications such as<br>repairing wiring or replacing faulty parts, without acknowledging the<br>provision\u2019s exclusions where certain tasks may be safely performed by<br>non-experts and may not constitute electrical work. Therefore, the<br>policy imposes stricter requirements than the provision and may be<br>inconsistent with the regulatory definition/exclusions, creating a<br>potential overreach and misclassification of non-electrical work as<br>electrical work.<br><br><b>Remediation:</b> Amend the policy to align with the provision\u2019s definition and<br>exclusions by: (1) explicitly defining 'electrical work' consistent<br>with the provision; (2) carving out excluded tasks (e.g., replacing<br>fuses/light bulbs, non-electrical component work without electrical<br>risk, plug-and-socket connection) from the 'competent person' and<br>testing/tagging/certification requirements where appropriate; and (3)<br>specifying that testing/tagging/certification applies when the<br>activity is electrical work or otherwise creates electrical risk, and<br>clarify supervision/competency requirements consistent with<br>licensed/registered worker supervision where required.", "", "", "<b>Source ID:</b> 8.2<br><b>Provision ID:</b> 149<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.563<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires that unsafe electrical equipment be<br>disconnected/isolated and not reconnected until it is repaired or<br>tested and found safe, or else replaced/removed. The policy addresses<br>who may perform modifications/repairs (competent person) and requires<br>post-work electrical testing/tagging/certification before<br>commissioning, which partially aligns with the 'tested and found safe'<br>concept. However, the policy does not explicitly require (1)<br>identifying/handling 'unsafe electrical equipment' as defined by<br>reasonable grounds, (2) immediate disconnection/isolation of unsafe<br>equipment, or (3) prohibiting reconnection until repaired or tested<br>safe, or replacement/removal. Therefore it does not fully satisfy the<br>provision\u2019s control requirements.<br><br><b>Remediation:</b> Update the policy to explicitly require that any electrical equipment<br>suspected/known to be unsafe is immediately disconnected/isolated from<br>supply, prevented from being reconnected, and only returned to service<br>after repair or testing confirms it is safe; otherwise it must be<br>replaced or permanently removed from use. Include criteria/process for<br>determining 'reasonable grounds' of unsafety and controls<br>(lockout/tagout, signage, access restriction) to prevent reconnection.", "<b>Source ID:</b> 8.2<br><b>Provision ID:</b> 150<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.636<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY addresses electrical work on equipment<br>(repairs/modifications) by a competent person and requires post-work<br>electrical testing, tagging, and certification before commissioning.<br>The PROVISION r ry preconditions before electrical work on<br>energised electrical equipment commences, including a recorded risk<br>assessment conducted by a competent person, ensuring clear<br>access/egress and isolation point accessibility/labeling/operability,<br>and formal authorisation after consultation. The POLICY partially<br>aligns with the competency concept but does not address the<br>PROVISION\u2019s required pre-work controls (risk assessment and recording,<br>site/access conditions, isolation point requirements, and<br>authorisation/consultation). Therefore, the POLICY does not fully<br>satisfy the PROVISION\u2019s obligations.<br><br><b>Remediation:</b> Update the policy/procedure for energised electrical work to require,<br>before commencement: (1) a recorded risk assessment conducted by a<br>competent person; (2) the work area is cleared of obstructions to<br>allow easy access and exit; (3) the isolation/disconnection point is<br>clearly marked/labelled, unobstructed, and operable quickly (or<br>document applicability of the stated exception); and (4) formal<br>authorisation of the work after consultation with the person with<br>management/control of the workplace. Retain existing requirements for<br>competent persons and post-work testing/tagging/certification.", "", "<b>Source ID:</b> 8.2<br><b>Provision ID:</b> 161<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.617<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY addresses electrical equipment modifications/repairs by<br>requiring a competent person and post-work electrical<br>testing/tagging/certification before commissioning. The PROVISION<br>imposes additional and more specific duties for electrical work on<br>energised electrical equipment: it must be performed by a competent<br>person with suitable/tested/maintained tools, testing equipment and<br>PPE; in accordance with a safe work method statement (SWMS) meeting<br>specified content requirements; and (subject ng/removing cords, managing<br>chemicals/radiation, e-waste stream, residual energy) but does not<br>explicitly require disconnection/isolating from supply, controls to<br>prevent reconnection, or the required outcomes of repair/test-and-<br>verify-safe versus replacement/permanent removal from use. Because<br>these mandatory controls are not stated, the policy does not fully<br>meet the provision.<br><br><b>Remediation:</b> Update the policy to explicitly require that any unsafe electrical<br>equipment is immediately disconnected/isolated from its electricity<br>supply, tagged/secured to prevent reconnection, and either (1) not<br>reconnected until repaired or tested and confirmed safe, or (2)<br>replaced or permanently removed from use (including disposal).<br>Define/align criteria for 'unsafe' (reasonable grounds) and include<br>procedural steps and responsibilities for isolation, tagging, and<br>verification.", "<b>Source ID:</b> 8.3<br><b>Provision ID:</b> 150<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.510<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY addresses making electrical equipment safe prior to<br>disposal (e.g., removing cords, managing chemicals/radiation sources,<br>residual energy, using e-waste streams). The PROVISION imposes<br>obligations to (1) regularly inspect and test certain electrical<br>equipment used in damaging environments, (2) inspect new/unused<br>equipment for obvious damage before use, and (3) keep specified<br>testing records until the equipment is next tested or removed/disposed<br>of. While both concern electrical equipment safety and disposal, the<br>POLICY does not cover the required inspection/testing regime, does not<br>address the conditions triggering mandatory testing, and does not<br>require keeping testing records with the specified content until<br>disposal/removal. Therefore, it does not demonstrate compliance with<br>the PROVISION.<br><br><b>Remediation:</b> Update
