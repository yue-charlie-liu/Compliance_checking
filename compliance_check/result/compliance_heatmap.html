    <script>
        const hoverTexts = ["", "", "", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 144<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.476<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY describes key electrical risks (electric shock,<br>fire/arcing/explosion, toxic gases) and is intended to guide safety<br>management around electrical hazards. The PROVISION defines what<br>counts as \u201celectrical equipment\u201d for the purposes of a regulatory<br>Part, including equipment above extra-low voltage and equipment in<br>explosive/fire-risk atmospheres, and excludes certain vehicle<br>propulsion-related equipment. These are functionally related because<br>the definition determines the scope of what equipment the electrical-<br>risk controls should apply to. However, the POLICY does not align with<br>the PROVISION\u2019s scope: it does not reference the extra-low voltage<br>threshold, does not address the specific inclusion of cathodic<br>protection systems, and does not acknowledge the vehicle propulsion<br>exclusion. As written, the POLICY could be applied too broadly or miss<br>regulated categories, so a compliance/scope alignment check fails.<br><br><b>Remediation:</b> Update the POLICY to explicitly align scope with the regulatory<br>definition by: (1) defining \u201celectrical equipment\u201d consistent with the<br>PROVISION (including the > extra-low voltage threshold and inclusion<br>of equipment in fire/explosion-risk atmospheres); (2) explicitly<br>including active impressed current cathodic protection systems (AS<br>2832.1:2015) where applicable; (3) stating the exclusion for motor<br>car/motorcycle propulsion-unit equipment where relevant; and (4)<br>clarifying how the listed risks and controls apply within that defined<br>scope.", "", "", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 147<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.556<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision imposes a duty on a PCBU to manage risks to health and<br>safety associated with electrical risks at the workplace in accordance<br>with Part 3.1. The policy text describes common electrical risks<br>(shock, fire/arcing/explosion, toxic gases) but does not state any<br>requirement or process to manage those risks, does not assign<br>responsibility to the PCBU, and does not reference compliance with<br>Part 3.1 (e.g., hazard identification, risk assessment, implementation<br>of controls, review/monitoring). Therefore, the policy is<br>informational and does not fulfill the management obligation in the<br>provision.<br><br><b>Remediation:</b> Update the policy to include a risk management framework for<br>electrical risks aligned to Part 3.1: (1) assign responsibility to the<br>PCBU and relevant roles; (2) require identification of electrical<br>hazards across design, installation, operation, maintenance and<br>testing; (3) require risk assessment where needed; (4) specify control<br>measures using the hierarchy of controls (e.g., de-<br>energisation/lockout-tagout, RCDs, isolation, guarding,<br>inspection/testing, competency/training, PPE); (5) include procedures<br>for high-risk scenarios (moisture/dust, explosive atmospheres); (6)<br>require consultation, documentation, and periodic review/audit of<br>controls and incidents.", "", "", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 150<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.465<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY text identifies key electrical risks (shock,<br>fire/arcing/explosion, toxic gases) but does not set out the specific<br>controls required by the PROVISION. The PROVISION imposes concrete<br>obligations on a PCBU to (1) ensure regular inspection and testing by<br>a competent person for socket-supplied equipment used in damaging<br>environments (moisture, heat, vibration, mechanical damage, corrosive<br>chemicals, dust), (2) for new/unused equipment, inspect for obvious<br>damage before use, and (3)-(4) keep specified testing records (tester<br>name, date, outcome, next test date; tag acceptable). The POLICY does<br>not mention inspection/testing frequency, competent person<br>requirement, pre-use inspection for new equipment, or recordkeeping<br>requirements. Therefore, it does not demonstrate compliance with the<br>PROVISION.<br><br><b>Remediation:</b> Update the policy/procedure to explicitly require: (1) regular<br>inspection and testing by a competent person for socket-outlet<br>supplied equipment used in the specified harsh/damaging environments;<br>(2) pre-use inspection for obvious damage for new/unused equipment;<br>(3) retention of testing records until next test or removal/disposal;<br>and (4) records to include tester name, test date, outcome, and next<br>test due date (e.g., via equipment tags).", "", "", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 155<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.483<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY identifies key electrical risks (shock,<br>fire/arcing/explosion, toxic gases) but does not specify the required<br>control measures mandated by the PROVISION: (1) testing electrical<br>equipment by a competent person to confirm whether it is energised<br>before electrical work; (2)(a) treating exposed parts as energised<br>until isolated and confirmed de-energised; and (2)(b) earthing each<br>high-voltage exposed part after de-energising. Because these<br>procedural obligations are not stated in the POLICY, the POLICY does<br>not demonstrate compliance with the PROVISION.<br><br><b>Remediation:</b> Update the policy/procedure to explicitly require: (1) pre-work<br>testing of electrical equipment by a competent person to determine<br>energisation status; (2) treating all exposed parts as energised until<br>isolated and verified de-energised; (3) earthing high-voltage exposed<br>parts after de-energising; and reference or align with the applicable<br>testing and verification method requirements (e.g., procedures<br>consistent with the cited regulations).", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 156<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.463<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY identifies key electrical risks (shock,<br>fire/arcing/explosion, toxic gases) but does not include a control or<br>requirement to prevent inadvertent re-energisation of de-energised<br>electrical equipment during electrical work. The PROVISION imposes a<br>specific duty on the business/operator to ensure de-energised<br>equipment is not inadvertently re-energised while work is being<br>carried out. Because the POLICY is only a hazard/risk statement and<br>lacks this mandated control, it does not fulfill the obligation.<br><br><b>Remediation:</b> Update the policy (or add a linked procedure) to require controls that<br>prevent inadvertent re-energisation during electrical work, such as<br>lockout/tagout (LOTO), isolation verification, securing isolation<br>points, signage, controlled access, and a permit-to-work/authorisation<br>process, with clear responsibilities and monitoring.", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.460<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY text identifies key electrical risks (shock,<br>fire/arcing/explosion, toxic gases) but does not set any control<br>requirement about when energised electrical work may or may not be<br>performed. The PROVISION imposes a specific obligation on the<br>business/operator to ensure energised electrical work is not carried<br>out unless one of the listed exceptions applies (necessity for health<br>and safety, necessity for proper work, testing under reg 155, or no<br>reasonable alternative). Because the POLICY does not include this<br>prohibition/exception framework or an equivalent rule requiring de-<br>energisation by default, it does not demonstrate compliance with the<br>PROVISION.<br><br><b>Remediation:</b> Update the policy to explicitly require that electrical work on<br>energised equipment must not be carried out unless one of the<br>permitted conditions applies (health and safety necessity, necessary<br>for proper work, required testing under reg 155, or no reasonable<br>alternative). Add a documented decision/authorisation process to<br>justify and record which exception applies before energised work<br>proceeds, and clarify that testing may be included where allowed.", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.514<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY text identifies common electrical risks (shock,<br>fire/arcing/explosion, toxic gases) but does not set out the specific<br>preconditions required before commencing electrical work on energised<br>electrical equipment. The PROVISION requires, before such work starts:<br>(a) a competent-person risk assessment that is recorded; (b) the work<br>area is clear of obstructions for access/exit; (c) the<br>isolation/disconnection point is clearly marked, unobstructed, and<br>operable quickly (subject to a limited exception); and (d)<br>authorisation after consultation with the person with<br>management/control of the workplace. The POLICY does not mention<br>conducting/recording a risk assessment, ensuring clear access/egress,<br>marking/clearing/quick operation of isolation points, or formal<br>authorisation/consultation. Therefore, the POLICY does not demonstrate<br>compliance with the PROVISION\u2019s procedural requirements.<br><br><b>Remediation:</b> Update the policy/procedure for energised electrical work to<br>explicitly require: (1) a risk assessment conducted by a competent<br>person and recorded before work starts; (2) the work area is cleared<br>of obstructions to allow easy access and exit; (3) the<br>isolation/disconnection point is clearly labelled/marked,<br>unobstructed, and capable of quick operation (and document the<br>exception conditions where applicable); and (4) formal authorisation<br>of the work after consultation with the person with management/control<br>of the workplace. Include roles/responsibilities, checklists/forms for<br>recording the assessment and authorisation, and verification steps<br>before commencement.", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 160<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.512<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY text describes electrical risks (shock,<br>fire/arcing/explosion, toxic gases) but does not state a control<br>requirement to prevent inadvertent contact with exposed energised<br>components during energised electrical work. The PROVISION imposes a<br>specific duty on the business/operator to ensure persons are prevented<br>from creating electrical risk by inadvertently contacting exposed<br>energised components while energised work is being carried out.<br>Because the POLICY is only descriptive and lacks this mandated<br>preventive measure, it does not demonstrate compliance with the<br>PROVISION.<br><br><b>Remediation:</b> Add explicit requirements and controls for energised electrical work,<br>including measures to prevent inadvertent contact with exposed<br>energised components (e.g., prohibition/justification process for<br>energised work, isolation where practicable,<br>barriers/insulation/covers, exclusion zones, access control,<br>supervision, PPE, tools, and procedures such as permits and testing).", "", "", "", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 164<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.456<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY text identifies key electrical risks (electric shock,<br>fire/arcing/explosion, toxic gases) but does not specify any control<br>measures. The PROVISION requires that, in specified higher-risk<br>circumstances (e.g., exposure to moisture/dust/heat/vibration,<br>frequent movement, movement between locations, amusement devices), the<br>PCBU must minimise electrical risk from socket-outlet supply by using<br>an appropriate residual current device (RCD), with a \u226430 mA trip<br>current for socket outlets \u226420 A, unless an explicit exemption applies<br>(\u226450 VAC, DC, isolating transformer equivalent protection, or non-<br>earthed isolated generator equivalent protection). Because the POLICY<br>does not include these RCD requirements, thresholds, applicability<br>conditions, or exemptions, it does not demonstrate compliance with the<br>PROVISION.<br><br><b>Remediation:</b> Update the policy/procedure to require use of an appropriate RCD when<br>electrical equipment is supplied via socket outlets in the<br>circumstances listed<br>(moisture/dust/heat/vibration/corrosives/mechanical damage<br>environments; moved between locations; frequently moved; amusement<br>devices). Specify that for socket outlets \u226420 A the RCD must trip at<br>\u226430 mA. Document and control any exemptions (\u226450 VAC, DC, isolating<br>transformer, isolated generator) by requiring verification that<br>equivalent protection is provided. Add implementation details<br>(responsibility, inspection/testing/maintenance of RCDs, and<br>recordkeeping) to evidence the risk is minimised so far as reasonably<br>practicable.", "", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 166<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.492<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY text identifies general electrical risks (shock,<br>fire/arcing/explosion, toxic gases) but does not set out operational<br>requirements to manage a specific high-risk scenario addressed by the<br>PROVISION: preventing persons/plant/things coming within an unsafe<br>distance of overhead or underground electric lines, or (if not<br>reasonably practicable) conducting a risk assessment and implementing<br>controls consistent with that assessment and any electricity supply<br>authority requirements. Because the POLICY lacks explicit commitments<br>to maintain safe approach distances to electric lines and lacks the<br>required fallback process (risk assessment + authority-aligned<br>controls), it does not demonstrate compliance with the PROVISION.<br><br><b>Remediation:</b> Amend the policy to include explicit requirements to: (1) ensure, so<br>far as reasonably practicable, that no person/plant/thing comes within<br>an unsafe distance of overhead or underground electric lines; (2)<br>where safe distance is not reasonably practicable, require a<br>documented risk assessment for the proposed work and implementation of<br>control measures consistent with the assessment; (3) incorporate and<br>comply with any applicable electricity supply authority requirements<br>(e.g., consultation, permits, isolation/de-energisation, spotters,<br>barriers, exclusion zones); and (4) reference applicable electricity<br>safety legislation and define roles, responsibilities, and<br>verification (training, supervision, and monitoring).", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 2.2<br><b>Provision ID:</b> 146<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.830<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY text states that Section 146 defines \u201celectrical work\u201d and<br>then lists only the inclusive definition (connecting/disconnecting<br>supply wiring; installing/removing/adding/testing/replacing/repairing/<br>altering/maintaining electrical equipment or an installation). The<br>PROVISION text contains the same inclusive definition in subsection<br>(1) but also includes explicit exclusions in subsection (2) (e.g.,<br>plug-and-socket connection, non-electrical component work without<br>electrical risk, replacing fuses/light bulbs, certain<br>manufacturing/duct work under conditions, mounting equipment not<br>related to connection, supervised assistance, and eligibility work).<br>Because the POLICY purports to define the term but omits the<br>exclusions that are part of the operative definition in the PROVISION,<br>it is incomplete and could misclassify excluded activities as<br>\u201celectrical work,\u201d creating a compliance/interpretation gap.<br><br><b>Remediation:</b> Update the POLICY definition to incorporate (or explicitly reference)<br>the exclusions in Section 146(2), including the listed carve-outs and<br>any stated conditions (e.g., supervision, de-energised wiring, not<br>intended to be earthed). Alternatively, revise the POLICY to quote<br>Section 146 in full or add a clear cross-reference stating that the<br>definition is subject to the exclusions in subsection (2).", "<b>Source ID:</b> 2.2<br><b>Provision ID:</b> 147<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.621<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY text defines the scope of \u201celectrical work\u201d (activities<br>such as connecting/disconnecting supply wiring and installing,<br>testing, repairing, maintaining electrical equipment/installations).<br>The PROVISION imposes a duty on a PCBU to manage risks associated with<br>electrical risks at the workplace in accordance with Part 3.1,<br>including risks arising from design, installation, maintenance and<br>testing of electrical equipment/installations. These are functionally<br>related because the defined \u201celectrical work\u201d activities are key<br>sources of electrical risks that must be managed. However, the POLICY<br>only provides a definition and does not state any requirement to<br>manage electrical risks, reference Part 3.1 risk management, or<br>specify controls/processes. Therefore it does not demonstrate<br>fulfillment of the PROVISION\u2019s obligation.<br><br><b>Remediation:</b> Amend the POLICY to include an explicit requirement that the PCBU must<br>manage risks to health and safety associated with electrical risks<br>arising from electrical work (as defined), in accordance with WHS<br>Regulation Part 3.1. Add a risk management process (identify hazards,<br>assess risks, implement and maintain controls, review controls) and<br>clarify applicability to design, construction, installation,<br>protection, maintenance and testing activities for electrical<br>equipment/installations.", "", "<b>Source ID:</b> 2.2<br><b>Provision ID:</b> 149<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.609<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY defines what constitutes \u201celectrical work\u201d (e.g.,<br>disconnecting supply wiring, testing, repairing, maintaining<br>electrical equipment). The PROVISION imposes a duty on the PCBU to<br>ensure unsafe electrical equipment is disconnected/isolated and not<br>reconnected until repaired or tested and found safe, or<br>replaced/removed. Meeting the PROVISION will typically require actions<br>that fall within the POLICY\u2019s definition of electrical work<br>(disconnecting, testing, repairing). However, the POLICY text is only<br>definitional and does not state any requirement that unsafe equipment<br>must be disconnected/isolated or controlled from reconnection, nor<br>does it assign responsibility or conditions for reconnection.<br>Therefore, the POLICY does not demonstrate compliance with the<br>PROVISION\u2019s obligations.<br><br><b>Remediation:</b> Add explicit requirements and procedures to ensure unsafe electrical<br>equipment is: (1) promptly disconnected/isolated from supply; (2)<br>tagged/secured to prevent reconnection; (3) not reconnected until<br>repaired or tested and verified safe by a competent/licensed person as<br>applicable; and (4) otherwise replaced or permanently removed. Define<br>criteria for 'reasonable grounds' of unsafety, assign responsibilities<br>(PCBU/supervisors/workers), and include recordkeeping for isolation,<br>testing/repair, and return-to-service.", "", "", "", "", "", "", "<b>Source ID:</b> 2.2<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.627<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY TEXT defines the scope of what constitutes \u201celectrical<br>work\u201d (i.e., connecting/disconnecting supply wiring and<br>installing/removing/testing/repairing/maintaining electrical equipment<br>or installations). The PROVISION TEXT imposes specific preconditions<br>that a PCBU must ensure before electrical work on energised electrical<br>equipment commences (risk assessment by a competent person and<br>recorded, clear access/egress, isolation point marked/accessible/quick<br>to operate, and authorisation after consultation). Because the<br>provision\u2019s obligations apply to a subset of the policy-defined<br>activity (electrical work, specifically when performed energised),<br>they are functionally related and a compliance check is necessary.<br>However, the POLICY TEXT contains only a definition and does not<br>address or evidence any of the required controls or processes in the<br>PROVISION TEXT. Therefore, based on the provided texts alone, the<br>requirements in (1)(a)-(d) and (2) are not met/covered, so it is non-<br>compliant.<br><br><b>Remediation:</b> Implement and document a procedure for energised electrical work that,<br>before work starts, ensures: (1) a competent person conducts and<br>records a risk assessment; (2) the work area is cleared to allow easy<br>access and exit; (3) the isolation/disconnection point is clearly<br>marked/labelled, unobstructed for access/egress, and can be operated<br>quickly (or document applicability of the exception in (3)); and (4)<br>formal authorisation is given after consultation with the person with<br>management/control of the workplace. Maintain records demonstrating<br>these steps were completed for each job.", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 2.3<br><b>Provision ID:</b> 144<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.680<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY is defining what is (and is not) \u201celectrical work\u201d by<br>carving out extra-low voltage equipment except for two specific cases<br>(explosive/fire-risk atmospheres and active impressed current cathodic<br>protection). The PROVISION, however, defines \u201celectrical equipment\u201d<br>(not \u201celectrical work\u201d) and includes equipment > extra-low voltage as<br>well as the same two special cases, and also provides an explicit<br>exclusion for certain vehicle (motor car/motorcycle) propulsion-<br>related equipment. Because the POLICY is using a definition-style<br>statement that overlaps with the PROVISION\u2019s scope and exceptions, a<br>compliance alignment check is necessary. The POLICY is not<br>compliant/aligned because it (1) omits the PROVISION\u2019s broader<br>inclusion of equipment used/operated at voltages greater than extra-<br>low voltage, (2) does not incorporate the PROVISION\u2019s explicit<br>vehicle-related exclusion, and (3) conflates/does not clearly<br>distinguish the statutory term being defined (electrical equipment)<br>versus the operational term it is addressing (electrical work),<br>creating a risk of misclassification against the regulatory<br>definitions.<br><br><b>Remediation:</b> Revise the POLICY to clearly distinguish between the regulatory<br>definition of \u201celectrical equipment\u201d and the definition/scope of<br>\u201celectrical work,\u201d and ensure alignment with the PROVISION by: (a)<br>incorporating the > extra-low voltage criteria where relevant; (b)<br>explicitly addressing the vehicle (motor car/motorcycle) propulsion-<br>related exclusion if applicable in your jurisdiction; and (c) cross-<br>referencing the exact WHS Regulation provisions/definitions being<br>implemented (and updating Appendix 1 references accordingly) to avoid<br>definitional gaps or conflicts.", "<b>Source ID:</b> 2.3<br><b>Provision ID:</b> 145<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.584<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY defines what is and is not \u201celectrical work\u201d (including<br>exceptions for extra-low voltage equipment) and references WHS<br>Regulations s146. The PROVISION defines \u201celectrical installation,\u201d<br>which is a key term used to determine whether equipment is part of an<br>installation (e.g., permanently connected vs plug-and-socket) and<br>therefore affects whether work may be classified as electrical work. A<br>compliance check is necessary because the POLICY uses the term<br>\u201celectrical installation\u201d but does not incorporate or align with the<br>regulatory definition provided in the PROVISION. Specifically, the<br>POLICY does not clarify what constitutes an \u201celectrical installation,\u201d<br>including the important distinction that plug-and-socket connected<br>equipment is not permanently connected, and that supply authority<br>works are not relevant to determining electrical connection. This<br>omission can lead to misclassification of work scope and incorrect<br>application of the extra-low voltage exclusion and its exceptions.<br><br><b>Remediation:</b> Update the POLICY (or the referenced Appendix 1) to explicitly adopt<br>or cross-reference the WHS regulatory definition of \u201celectrical<br>installation,\u201d including: (1) the requirement for permanent electrical<br>connection; (2) that plug-and-socket connected equipment is not<br>permanently connected; and (3) that connection via supply authority<br>works is not considered when determining electrical connection. Ensure<br>the \u201celectrical installation\u201d term is used consistently with this<br>definition wherever the extra-low voltage exclusion and hazardous-area<br>exception are applied.", "<b>Source ID:</b> 2.3<br><b>Provision ID:</b> 146<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.756<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY is defining what is and is not \u201celectrical work\u201d for CSIRO<br>purposes and explicitly references WHS Regulations s146, which is the<br>same subject as the PROVISION\u2019s definition and exclusions for<br>\u201celectrical work.\u201d Therefore a compliance check is required. The<br>POLICY\u2019s exclusion is materially narrower/different than the<br>PROVISION\u2019s exclusions: it states electrical work does not include<br>work on extra-low voltage equipment except in hazardous atmospheres or<br>cathodic protection systems. The PROVISION, however, excludes a<br>broader set of activities (e.g., plug-and-socket connection, non-<br>electrical component work without electrical risk, replacing certain<br>components like fuses/light bulbs, manufacturing processes, certain<br>duct/conduit work under conditions, mounting equipment not related to<br>connection, supervised assisting, and eligibility training work). By<br>not incorporating or aligning with these statutory exclusions, the<br>POLICY risks misclassifying activities as \u201celectrical work\u201d (or<br>failing to clearly recognize statutory carve-outs), creating<br>inconsistency with the regulatory definition it cites.<br><br><b>Remediation:</b> Amend the POLICY (and/or Appendix 1) to explicitly align with the WHS<br>Regulations s146 definition and all applicable exclusions in the<br>PROVISION. At minimum: (1) restate the full regulatory definition of<br>\u201celectrical work\u201d and the complete list of exclusions; (2) clarify<br>that CSIRO may impose stricter internal controls, but must not<br>redefine the legal meaning\u2014use language such as \u201cfor CSIRO control<br>purposes we treat the following as electrical work\u201d while<br>acknowledging the statutory exclusions; (3) ensure Appendix 1<br>comprehensively maps each regulatory exclusion and any CSIRO-specific<br>additions, with clear rationale and cross-references.", "<b>Source ID:</b> 2.3<br><b>Provision ID:</b> 147<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.579<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision imposes a duty on the PCBU to manage risks to health and<br>safety associated with electrical risks at the workplace in accordance<br>with Part 3.1. The policy text instead defines what is and is not<br>considered \u201celectrical work,\u201d focusing on exclusions for extra-low<br>voltage equipment with limited exceptions, and references an appendix<br>listing activities considered electrical work. It does not state a<br>requirement or process to manage electrical risks (e.g., hazard<br>identification, risk assessment, control measures, maintenance/testing<br>controls) nor does it reference compliance with Part 3.1 risk<br>management requirements. Therefore, it does not demonstrate<br>fulfillment of the broader duty to manage electrical risks.<br><br><b>Remediation:</b> Amend the policy/procedure to explicitly require management of<br>electrical risks in accordance with WHS risk management (Part 3.1),<br>including: identifying electrical hazards/risks (covering equipment<br>and installations), assessing risks where required, implementing and<br>maintaining controls (e.g., isolation/LOTO, inspection/testing, RCDs,<br>competent persons, exclusion zones), and reviewing controls. Clarify<br>that the duty applies regardless of whether an activity is classified<br>as \u201celectrical work,\u201d and cross-reference the organization\u2019s risk<br>management procedure and relevant electrical safety controls.", "<b>Source ID:</b> 2.3<br><b>Provision ng by a competent person to determine if it is<br>energised, treating exposed parts as energised until isolated and<br>proven de-energised, and earthing high-voltage exposed parts after de-<br>energising. Because the POLICY is setting the scope of activities that<br>constitute electrical work, it is functionally related to when the<br>PROVISION\u2019s obligations apply. However, the POLICY does not state or<br>require the mandated pre-work testing by a competent person, the<br>\u201ctreat as energised until isolated and proven de-energised\u201d rule, or<br>the earthing requirement for high-voltage exposed parts. Therefore, it<br>does not demonstrate alignment with the PROVISION\u2019s obligations.<br><br><b>Remediation:</b> Update the Electrical Safety Procedure (and/or Appendix 1) to<br>explicitly require that before any electrical work on electrical<br>equipment: (1) the equipment is tested by a competent person to<br>determine whether it is energised; (2) exposed parts are treated as<br>energised until isolated and confirmed de-energised; and (3) high-<br>voltage exposed parts are earthed after being de-energised. Include<br>references to the applicable testing method requirements (e.g., per<br>the relevant regulations/standard operating steps) and clarify<br>applicability across the defined scope of \u201celectrical work.\u201d", "", "", "<b>Source ID:</b> 2.3<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.581<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY text defines/excludes what counts as \u201celectrical work\u201d<br>(particularly extra-low voltage work) and points to an appendix<br>listing activities considered electrical work under WHS Regs s146. The<br>PROVISION imposes specific preconditions that a PCBU must ensure<br>before commencing electrical work on energised electrical equipment<br>(risk assessment by a competent person and recorded, area clear,<br>isolation point marked ns; ensuring proper use of<br>equipment). Because the POLICY is part of determining scope of<br>\u201celectrical work\u201d within the organisation, it is functionally related<br>to whether and when the PROVISION\u2019s controls must be applied. However,<br>the POLICY does not include or reference the required controls for<br>energised electrical work (competency/tools/PPE requirements, SWMS<br>requirements, safety observer requirements, risk assessment<br>exception). It only addresses classification/scope, so it does not<br>demonstrate compliance with the PROVISION\u2019s operational obligations.<br><br><b>Remediation:</b> Update the Electrical Safety Procedure (and/or the referenced Appendix<br>1) to explicitly require that any energised electrical work is<br>performed in accordance with the PROVISION: (1) only by a competent<br>person with suitable, tested and maintained tools/testing<br>equipment/PPE; (2) under a SWMS that includes identification of the<br>work, hazards/risks, controls, and implementation/monitoring/review;<br>(3) with a competent safety observer assessed within the last 12<br>months for rescue/resuscitation, unless the work is testing only and a<br>documented risk assessment shows no serious risk; and (4) include a<br>requirement that the PCBU ensures, so far as reasonably practicable,<br>proper use of tools/testing equipment/PPE. Also ensure the scope<br>definition (extra-low voltage exclusions and exceptions) is aligned to<br>when these controls must be triggered.", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 3<br><b>Provision ID:</b> 147<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.714<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The POLICY is functionally related to the PROVISION because it is<br>intended to implement the duty to manage risks to health and safety<br>associated with electrical risks at the workplace. The POLICY requires<br>an Activity Risk Assessment prior to electrical work/activities<br>involving electrical hazards and requires Safe Work Instructions for<br>recurring and energised electrical work, aligning with the PROVISION\u2019s<br>requirement to manage electrical risks (including those arising from<br>design, construction, installation, protection, maintenance and<br>testing). While the POLICY references WHS Regulation s147 and provides<br>guidance sources (Code of Practice) rather than explicitly stating 'in<br>accordance with Part 3.1', its controls (risk assessment and work<br>instructions) are consistent with risk management obligations under<br>Part 3.1.", "", "", "<b>Source ID:</b> 3<br><b>Provision ID:</b> 150<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.612<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY establishes a general requirement to manage electrical<br>risks via Activity Risk Assessments and Safe Work Instructions,<br>referencing WHS Regulation s147 (risk management) and the Code of<br>Practice. The PROVISION imposes specific, mandatory duties to (1)<br>regularly inspect and test certain socket-outlet supplied electrical<br>equipment used in harsh/damaging environments by a competent person,<br>(2) inspect new/unused equipment for obvious damage before use, and<br>(3) keep detailed testing records until next test or disposal. The<br>POLICY does not explicitly require periodic inspection/testing of in-<br>scope equipment, does not specify competency requirements for testers,<br>does not require pre-use inspection for new equipment, and does not<br>require retention/content of testing records (including next test due<br>date or tagging). Therefore, the POLICY does not demonstrably fulfill<br>the PROVISION\u2019s specific obligations.<br><br><b>Remediation:</b> Amend the Electrical Safety Procedure to explicitly require: (1) a<br>program of regular inspection and testing by a competent person for<br>socket-outlet supplied equipment used in environments likely to cause<br>damage (moisture/heat/vibration/mechanical damage/chemicals/dust); (2)<br>pre-use inspection for obvious damage for new/unused equipment; (3)<br>recordkeeping for each test until the next test or disposal, including<br>tester name, test date, outcome, and next test due date; and (4)<br>allow/require tagging as the record (or equivalent system). Define<br>inspection/testing intervals and responsibilities, and integrate these<br>requirements into ARA/SWI processes.", "", "", "<b>Source ID:</b> 3<br><b>Provision ID:</b> 155<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.627<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY is about managing electrical risks via Activity Risk<br>Assessments and Safe Work Instructions, which is functionally related<br>to the PROVISION\u2019s requirements for safe electrical work practices.<br>However, the PROVISION imposes specific mandatory controls before and<br>during electrical work: (1) testing electrical equipment by a<br>competent person to determine if it is energised before work starts;<br>(2)(a) treating exposed parts as energised until isolated and proven<br>de-energised; and (2)(b) earthing each high-voltage exposed part after<br>de-energising. The POLICY text provided does not explicitly require<br>pre-work testing by a competent person, does not state the 'treat as<br>energised until isolated and proven de-energised' rule, and does not<br>require earthing of high-voltage exposed parts after de-energising.<br>Therefore, the POLICY does not demonstrate compliance with the<br>specific obligations in the PROVISION.<br><br><b>Remediation:</b> Update the Electrical Safety Procedure/SWI requirements to explicitly<br>mandate: (1) before any electrical work on equipment, testing by a<br>competent person to confirm whether the equipment is energised (with<br>reference to applicable testing method requirements); (2) a rule that<br>all exposed parts are treated as energised until isolated and verified<br>de-energised; and (3) for high-voltage work, earthing of exposed parts<br>after de-energising. Ensure these steps are embedded in SWIs/permit-<br>to-work/ARA templates and training/competency requirements.", "", "<b>Source ID:</b> 3<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.619<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY is functionally related because it addresses risk<br>management requirements for electrical work, including energised<br>electrical work, which is directly governed by the PROVISION<br>restricting when energised electrical work may be performed. However,<br>the POLICY does not state the core legal requirement that energised<br>electrical work must not be carried out unless one of the specified<br>necessity conditions applies (health and safety necessity, necessity<br>for proper work, testing under reg 155, or no reasonable alternative).<br>Instead, it focuses on completing an Activity Risk Assessment and Safe<br>Work Instruction, which are process controls but do not implement the<br>prohibition/permission threshold required by the PROVISION.<br><br><b>Remediation:</b> Amend the procedure to explicitly prohibit energised electrical work<br>except where one of the permitted conditions applies (as per<br>(1)(a)-(d)), and require documented justification that at least one<br>condition is met before authorisation. Include a decision/approval<br>step in the ARA/SWI for energised work that records which condition<br>applies (including reg 155 testing where relevant) and confirms there<br>is no reasonable alternative (e.g., isolation/de-energisation) where<br>applicable.", "<b>Source ID:</b> 3<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.696<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY requires an Activity Risk Assessment (ARA) before<b ty during energised electrical<br>work: the PCBU must ensure all persons are prevented from creating an<br>electrical risk by inadvertent contact with exposed energised<br>components. The policy text focuses on completing an Activity Risk<br>Assessment and Safe Work Instructions for recurring and energised<br>electrical work, and generally references managing electrical risks.<br>However, it does not explicitly require controls to prevent<br>inadvertent contact with exposed energised components (e.g., barriers,<br>insulation, exclusion zones, access control, supervision) nor does it<br>state an outcome requirement to prevent persons from creating<br>electrical risk during energised work. Therefore, the policy does not<br>demonstrably meet the specific obligation in the provision.<br><br><b>Remediation:</b> Amend the Electrical Safety Procedure/SWI requirements for energised<br>electrical work to explicitly mandate controls that prevent<br>inadvertent contact with exposed energised components, such as:<br>establishing exclusion zones and access control; installing physical<br>barriers/guards or insulating covers; ensuring exposed live parts are<br>shrouded/insulated where practicable; signage and spotter/supervision<br>where needed; and verifying these controls are implemented and<br>maintained for the duration of energised work. Include a clear<br>responsibility statement that the PCBU must ensure persons are<br>prevented from creating electrical risk during energised work, and<br>require the ARA/SWI to document and verify these measures.", "<b>Source ID:</b> 3<br><b>Provision ID:</b> 161<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.634<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY is functionally related to the PROVISION because it sets<br>requirements for managing electrical risks and specifically references<br>requirements for energised electrical work (e.g., requiring an<br>Activity Risk Assessment and a Safe Wo st be carried out by a competent person and references<br>training/qualifications, it does not fully meet the PROVISION\u2019s<br>requirements for energised work.<br><br><b>Remediation:</b> Update the policy/procedure for energised electrical work to<br>explicitly require: (a) use of suitable tools, testing equipment and<br>PPE that are properly tested and maintained; (b) preparation and use<br>of a SWMS that identifies the work, hazards/risks, control measures,<br>and implementation/monitoring/review steps; (c) a competent safety<br>observer present with documented rescue/resuscitation competency<br>assessment within the last 12 months, unless the testing-only + risk<br>assessment shows no serious risk; and (d) supervisory/verification<br>measures to ensure workers properly use tools/testing equipment/PPE so<br>far as reasonably practicable.", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 4.3<br><b>Provision ID:</b> 146<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.590<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The texts are functionally related because the provision defines what<br>constitutes \u201celectrical work\u201d and what is excluded, which determines<br>when licensing/competency controls are applicable. The policy<br>establishes an internal control requiring a practical electrical<br>competency assessment (within the past 5 years) before an electrical<br>worker performs electrical work where a local licence is not required,<br>and it explicitly states the assessment does not authorise work that<br>requires a licence. This aligns with the provision\u2019s framework by<br>applying competency requirements to electrical work (as defined) while<br>not attempting to override jurisdictional licensing requirements or<br>expand authorisation beyond what regulators permit. The policy is not<br>inconsistent with the provision\u2019s exclusions; rather, it sets a<br>stricter internal requirement for certain work even where licensing<br>may not be mandated.", "<b>Source ID:</b> 4.3<br><b>Provision ID:</b> 147<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.509<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The provision requires the PCBU to manage risks to health and safety<br>associated with electrical risks at the workplace. The policy<br>establishes a control measure to manage electrical risk by requiring<br>electrical workers (where a licence is not required) to complete and<br>pass a practical electrical competency assessment, demonstrate safe<br>work practices aligned with the CSIRO Electrical Safety Procedure, and<br>maintain currency within the past 5 years. It also clarifies that the<br>assessment does not substitute for legally required electrical<br>licensing, supporting compliance with regulatory expectations. While<br>the provision is broader than competency assessment alone, the policy<br>content is consistent with and supports the obligation to manage<br>electrical risks.", "", "", "<b>Source ID:</b> 4.3<br><b>Provision ID:</b> 150<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.578<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY addresses electrical worker competency assessments<br>(skills/authorisation to perform certain electrical work on non-fixed<br>equipment when a licence is not required). The PROVISION imposes a<br>duty on the business/undertaking to ensure certain electrical<br>equipment is regularly inspected and tested by a competent person, and<br>to keep specified testing records. While both concern electrical<br>safety and competence, the POLICY does not establish (or evidence) a<br>program for regular inspection/testing of equipment under specified<br>harsh conditions, does not require keeping testing records until next<br>test/removal, and does not specify record contents (tester name, date,<br>outcome, next test date) or tagging. Therefore, the POLICY does not<br>fulfill the PROVISION\u2019s inspection/testing and recordkeeping<br>obligations.<br><br><b>Remediation:</b> Add requirements to the policy/procedure to: (1) identify in-scope<br>equipment (plug-in equipment used in environments likely to cause<br>damage: moisture/heat/vibration/mechanical damage/corrosives/dust);<br>(2) mandate regular inspection and testing intervals based on<br>risk/conditions; (3) ensure testing is performed by a 'competent<br>person' (define competence for testing separately from the 5-year<br>worker competency assessment, if needed); (4) require pre-use<br>inspection for new/unused equipment for obvious damage; (5) maintain<br>testing records until next test or disposal/removal, including tester<br>name, test date, outcome, and next due date; and (6) allow/use tagging<br>as a record mechanism.", "", "", "<b>Source ID:</b> 4.3<br><b>Provision ID:</b> 155<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.585<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires the PCBU to ensure that, before electrical work<br>is carried out on electrical equipment, the equipment is tested by a<br>competent person to determine whether it is energised, and that<br>exposed parts are treated as energised until isolated and proven de-<br>energised (and high-voltage exposed parts earthed after de-<br>energising). The policy instead focuses on worker competency<br>assessments (and licensing boundaries) and does not state any<br>requirement to test equipment for energisation prior to work, does not<br>require that testing be performed by a competent person for that<br>purpose, and does not include the exposed-parts treated-as-energised<br>and HV earthing requirements. Therefore, the policy does not fulfill<br>the specific operational safety obligations in the provision.<br><br><b>Remediation:</b> Amend the policy/guideline to explicitly require that before any<br>electrical work on electrical equipment, the equipment must be tested<br>for energisation by a competent person (in accordance with the<br>applicable testing method requirements), require that exposed parts be<br>treated as energised until isolated and proven de-energised, and<br>require that high-voltage exposed parts be earthed after being de-<br>energised. Define/align 'competent person' and reference the relevant<br>procedures/regulations for how testing and isolation are to be<br>performed.", "", "", "<b>Source ID:</b> 4.3<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.590<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires specific preconditions before energised<br>electrical work commences: a recorded risk assessment conducted by a<br>competent person, ensuring the work area and isolation/disconnection<br>point are clear/labelled/operable, and formal authorisation after<br>consultation with workplace management/control. The policy instead<br>focuses on requiring an electrical competency assessment (where a<br>licence is not required) and its validity period/template. It does not<br>address energised electrical work controls, does not require a risk<br>assessment (recorded or otherwise), does not specify access/egress and<br>isolation point requirements, and does not require<br>authorisation/consultation prior to commencing energised work.<br>Therefore, the policy does not fulfill the provision\u2019s obligations.<br><br><b>Remediation:</b> Update the policy/procedure for energised electrical work to<br>explicitly require: (1) a risk assessment for the proposed energised<br>work, conducted by a competent person and recorded; (2) verification<br>that the work area is clear of obstructions for access/exit; (3)<br>verification that the isolation/disconnection point is clearly<br>labelled, unobstructed, and quickly operable (or document<br>applicability of the stated exception); and (4) formal authorisation<br>to proceed after consultation with the person with management/control<br>of the workplace. Include roles, documentation templates/records, and<br>a pre-start checklist to evidence compliance.", "", "<b>Source ID:</b> 4.3<br><b>Provision ID:</b> 161<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.609<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY establishes a requirement for electrical workers to<br>complete a practical electrical competency assessment (within the past<br>5 years) when a local electrical licence is not required, focused on<br>work on non-fixed electrical equipment and safe work practices. The<br>PROVISION imposes specific duties on a PCBU for electrical work on<br>energised electrical equipment: it must be carried out by a competent<br>person with suitable/tested/maintained tools and PPE, in accordance<br>with a safe work method statement (SWMS), and with a qualified safety<br>observer (unless an exception applies), plus ensuring proper use of<br>tools/PPE and requiring the safety observer to have been assessed<br>within the previous 12 months for rescue/resuscitation. The POLICY<br>does not address energised electrical work controls (SWMS, safety<br>observer, tool/PPE testing/maintenance, 12-month rescue/resuscitation<br>assessment), and its 5-year assessment interval is not aligned to the<br>PROVISION\u2019s 12-month requirement for safety observer<br>rescue/resuscitation competence. Therefore, while related (both<br>concern electrical work competence/safety), the POLICY does not cover<br>key mandatory elements of the PROVISION and is not sufficient to<br>demonstrate compliance.<br><br><b>Remediation:</b> Update the policy/guideline to explicitly require, for energised<br>electrical work: (1) work is performed by a competent person with<br>suitable, properly tested, and well-maintained tools/testing<br>equipment/PPE; (2) a SWMS is prepared and followed meeting the<br>specified content requirements t devices/passenger ropeways<br>that: (1) mandates maintenance/inspection/testing be performed by a<br>competent person; (2) requires compliance with designer/manufacturer<br>recommendations or an approved maintenance manual prepared by a<br>competent person; (3) requires that any detailed inspection including<br>an electrical installation be performed by a person qualified to<br>inspect electrical installations or performed with documented<br>assistance from such a qualified person; and (4) clarifies that<br>internal competency assessments do not substitute for legally required<br>electrical installation inspection qualifications/licences.", "", "", "", "", "", "", "", "<b>Source ID:</b> 4.4<br><b>Provision ID:</b> 146<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.567<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY establishes an internal process for verifying electrical<br>competency (licences/qualifications/training/experience, risk<br>understanding, manager/ESO review, documentation, and<br>conditions/limitations including controls for energised work). The<br>PROVISION defines what constitutes \u201celectrical work\u201d and enumerates<br>specific exclusions (tasks that are not electrical work) and<br>conditions under which certain excluded activities may occur (e.g.,<br>supervised work on ducts/conduits when wiring is not energised;<br>assisting a licensed worker under direct supervision with no contact<br>with energised equipment; eligibility work other than on energised<br>equipment). The POLICY does not define \u201celectrical work\u201d or explicitly<br>incorporate the PROVISION\u2019s scope and exclusions. As written, the<br>POLICY applies broadly to \u201celectrical work in CSIRO\u201d and could be<br>interpreted to require verification/approval for activities that the<br>PROVISION explicitly excludes from \u201celectrical work\u201d (e.g., plugging<br>in equipment, replacing a light bulb/fuse, non-electrical component<br>work with no electrical risk). Conversely, the POLICY also does not<br>explicitly address the PROVISION\u2019s conditional exclusions (direct<br>supervision/no contact with energised equipment for assistants;<br>supervision requirements for certain conduit/duct work; eligibility<br>work limitations), meaning the internal controls are not clearly<br>aligned to the regulatory boundary of what is and is not \u201celectrical<br>work\u201d and the conditions attached to excluded activities. Therefore,<br>while the POLICY supports safe practice, it is not compliant as a<br>mapping to the PROVISION because it fails to reflect the statutory<br>definition and exclusions that determine when the policy process must<br>apply and what supervision/energisation constraints apply to certain<br>activities.<br><br><b>Remediation:</b> Amend the POLICY to (1) adopt or reference the jurisdictional<br>definition of \u201celectrical work\u201d and explicitly list (or reference) the<br>exclusions in the PROVISION; (2) clarify when the<br>verification/approval process is required versus when tasks fall<br>outside \u201celectrical work\u201d (while still allowing separate risk-based<br>controls for non-electrical-work tasks if desired); (3) explicitly<br>incorporate the PROVISION\u2019s conditional requirements for excluded<br>activities (e.g., direct supervision and no contact with energised<br>equipment for assistants; supervision and de-energised wiring<br>conditions for ducts/conduits/troughs work; eligibility work limited<br>to non-energised equipment); and (4) ensure the energised-work<br>permission process is clearly limited to circumstances where energised<br>electrical work is legally permitted and performed by appropriately<br>licensed/authorised persons.", "<b>Source ID:</b> 4.4<br><b>Provision ID:</b> 147<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.529<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The PROVISION requires the PCB rwise, and does not address earthing of high-<br>voltage exposed parts after de-energising. Therefore, the POLICY does<br>not fully implement the specific controls required by the PROVISION.<br><br><b>Remediation:</b> Update the POLICY (and associated verification form/SWI requirements)<br>to explicitly require: (1) testing by a competent person before<br>electrical work to determine whether equipment is energised; (2) a<br>rule that all exposed parts are treated as energised until isolated<br>and confirmed de-energised by test; and (3) for high-voltage work,<br>earthing of exposed parts after de-energising. Cross-reference the<br>required testing method/procedure (e.g., applicable internal procedure<br>aligned to regulatory testing requirements) and ensure these steps are<br>embedded in mandatory SWIs/ARAs and manager approval checks.", "", "<b>Source ID:</b> 4.4<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.524<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision prohibits energised electrical work unless one of the<br>specified necessity conditions applies (health/safety necessity, work<br>requires energisation to be done properly, testing required under reg<br>155, or no reasonable alternative). The policy establishes a<br>competency verification and approval process and requires an<br>application/permission process for energised work, but it does not<br>explicitly incorporate the provision\u2019s threshold test (i.e., requiring<br>documented justification that one of the legal necessity grounds<br>applies before energised work is permitted). It also frames energised<br>work permission primarily around holding an appropriate licence and<br>obtaining internal permission, which is not sufficient to meet the<br>regulatory precondition that energised work must be avoided unless<br>necessary under the listed criteria.<br><br><b>Remediation:</b> Amend the policy and associated forms/approval workflow to explicitly<br>require and document that energised work is only approved when at<br>least one of the provision\u2019s conditions is met (health/safety<br>necessity; necessary for proper work; testing required under reg 155;<br>or no reasonable alternative). Add mandatory fields/checklist for the<br>specific justification category, evidence of why de-energised work is<br>not reasonably practicable, and manager/ESO sign-off confirming the<br>legal criterion is satisfied before permission is granted.", "<b>Source ID:</b> 4.4<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.597<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY is functionally related to the PROVISION because it governs<br>competency verification, risk assessment documentation, and<br>approval/permission processes for electrical work, including energised<br>work. However, the PROVISION imposes specific preconditions that must<br>be ensured before energised electrical work commences: (1)(a) a risk<br>assessment conducted; (2) that risk assessment must be conducted by a<br>competent person and recorded; (1)(b) work area clear of obstructions<br>for access/exit; (1)(c) isolation/disconnection point clearly<br>marked/labelled, unobstructed, and operable quickly; and (1)(d)<br>authorisation after consulting with the person with management or<br>control of the workplace. The POLICY partially addresses (1)(a)/(2) by<br>requiring Activity Risk Assessments/SWIs to be completed, documented,<br>and provided, and by requiring approval/permission for energised work.<br>It also partially addresses authorisation via line manager/ESO review<br>and approval. However, it does not explicitly require that the<br>energised-work risk assessment be conducted by a competent person (as<br>distinct from the worker) and explicitly recorded for the energised<br>task, nor does it include the specific site-condition checks required<br>by (1)(b) and (1)(c) cess for energised work, but it does not<br>explicitly require that tools/testing equipment/PPE used for energised<br>work are suitable, properly tested, and maintained in good working<br>order, nor that the PCBU ensures (so far as reasonably practicable)<br>proper use of such equipment. (2) It requires Activity Risk<br>Assessments and SWIs, but does not explicitly require a Safe Work<br>Method Statement for energised electrical work, nor does it specify<br>the required SWMS elements (identify work; hazards/risks; control<br>measures; implementation/monitoring/review). (3) It does not require a<br>safety observer for energised work, does not specify observer<br>competency requirements, and does not include the 12-month<br>rescue/resuscitation assessment requirement or the limited testing +<br>risk assessment exception. Therefore, the POLICY only partially aligns<br>and is not compliant with the PROVISION.<br><br><b>Remediation:</b> Update the POLICY and associated forms/processes to explicitly<br>require, for energised electrical work: (a) work is performed by a<br>competent person using tools/testing equipment/PPE that are suitable,<br>properly tested, and maintained; and the PCBU ensures (so far as<br>reasonably practicable) proper use; (b) a SWMS is prepared and used,<br>with mandatory content matching the regulation (work identification;<br>hazards/risks; controls; implementation/monitoring/review); (c) a<br>safety observer is present unless the testing-only + risk assessment<br>shows no serious risk, and require the observer to be competent and<br>assessed within the previous 12 months as competent to rescue and<br>resuscitate; (d) incorporate checks/evidence fields in the<br>verification/approval workflow for SWMS, equipment test/maintenance<br>status, PPE/tool suitability, and safety observer<br>qualifications/recency.", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 5.1<br><b>Provision ID:</b> 146<br><b>Status: es consistent with the<br>exclusions (e.g., supervised assistants, non-expert replacements) and<br>provide examples to prevent misclassification.", "", "", "<b>Source ID:</b> 5.1<br><b>Provision ID:</b> 149<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.635<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires the PCBU to ensure unsafe electrical equipment<br>is disconnected/isolated from supply and, once isolated, is not<br>reconnected until repaired or tested and found safe, or else<br>replaced/permanently removed. The policy focuses on prohibiting<br>energized work, requiring de-energised work where possible, 'test for<br>dead', treating exposed parts as energised until isolated and proven<br>de-energised, earthing high voltage parts after de-energising,<br>preventing inadvertent re-energisation during work, and verifying<br>installations are safe to energise after<br>construction/alteration/repair. However, it does not explicitly<br>address the specific obligation to manage 'unsafe electrical<br>equipment' by (1) disconnecting/isolating it upon being unsafe, and<br>(2) prohibiting reconnection until repaired or tested and found safe,<br>or replaced/removed. The policy\u2019s testing/verification language is<br>related but does not clearly cover the required controls for unsafe<br>equipment status and reconnection prohibition.<br><br><b>Remediation:</b> Add an explicit section on unsafe electrical equipment requiring: (1)<br>immediate disconnection/isolation when there are reasonable grounds to<br>believe equipment is unsafe; (2) tagging/lockout and controls to<br>prevent reconnection; (3) prohibition on reconnection until the<br>equipment is repaired or tested and confirmed safe by a competent<br>person; and (4) replacement or permanent removal from service if not<br>repaired/tested safe. Define 'unsafe' consistent with the regulation<br>(reasonable grounds) and include responsibilities, records, and<br>escala
