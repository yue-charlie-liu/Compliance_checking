l repaired or tested and found safe, or is<br>replaced/permanently removed. The policy does not explicitly require<br>immediate disconnection/isolation of unsafe equipment, nor does it<br>prohibit reconnection until repair/testing confirms safety, nor does<br>it require replacement/permanent removal as an alternative control.<br>Therefore it does not fully meet the operational control requirements<br>of the provision for handling unsafe equipment at the workplace.<br><br><b>Remediation:</b> Update the policy/procedure to explicitly require that any electrical<br>equipment suspected or believed on reasonable grounds to be unsafe is<br>immediately disconnected/isolated from the electricity supply,<br>tagged/secured to prevent use, and not reconnected until it has been<br>repaired or tested and found safe by a competent person; alternatively<br>require replacement or permanent removal from use. Include clear<br>responsibilities, steps for isolation/lockout-tagout, and<br>documentation/verification requirements.", "<b>Source ID:</b> 8.1<br><b>Provision ID:</b> 150<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.569<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY addresses ensuring purchased electrical equipment meets<br>Australian Standards before commissioning, inspecting newly acquired<br>equipment (especially imported), engaging an electrician if in doubt,<br>and returning/modifying unsafe equipment. The PROVISION requires (1)<br>regular inspection and testing by a competent person for socket-outlet<br>supplied equipment used in harsh/damaging environments; (2) for<br>new/unused equipment, inspection for obvious damage before use; and<br>(3)-(4) keeping specified testing records until next test/removal. The<br>POLICY partially aligns with subregulation (2)(b) by requiring<br>inspection of newly acquired equipment and not using/rectifying unsafe<br>equipment, but it does not establish a program for regular<br>inspection/testing in applicable environments (subregulation (1)),<br>does not require testing by a competent person, and does not require<br>maintaining testing records with the specified details (subregulations<br>(3)-(4)). Therefore it does not fully satisfy the PROVISION.<br><br><b>Remediation:</b> Add requirements to the policy/procedure to: (1) identify electrical<br>equipment that is socket-outlet supplied and used in environments<br>likely to cause damage (moisture/heat/vibration/mechanical<br>damage/chemicals/dust) and ensure it is regularly inspected and tested<br>by a competent person at defined intervals; (2) ensure new/unused<br>equipment is inspected for obvious damage before first use (explicitly<br>stated); (3) keep testing records until the next test or until the<br>equipment is removed/disposed, including tester name, test date,<br>outcome, and next test due date; and (4) allow/require tagging of<br>equipment to evidence testing and next due date.", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 8.1<br><b>Provision ID:</b> 163<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.549<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision imposes a specific legal obligation on a PCBU carrying<br>out construction work to comply with AS/NZS 3012:2019 for electrical<br>installations on construction and demolition sites. The policy<br>addresses ensuring purchased electrical equipment meets applicable<br>Australian Standards (e.g., AS/NZS 3820) and inspection/certification<br>of equipment, which is related to electrical safety but does not<br>require or reference compliance with AS/NZS 3012:2019, nor does it<br>establish controls to ensure construction-site electrical<br>installations meet that standard. Therefore, the policy does not fully<br>satisfy the provision\u2019s specific requirement.<br><br><b>Remediation:</b> Update the policy (or add a construction-work electrical installations<br>procedure) to explicitly require compliance with AS/NZS 3012:2019 for<br>construction and demolition sites, including responsibilities,<br>verification/inspection/testing regimes, and documentation to<br>demonstrate compliance with AS/NZS 3012:2019 as applied under the<br>Regulations.", "<b>Source ID:</b> 8.1<br><b>Provision ID:</b> 164<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.499<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY addresses procurement/commissioning safety by requiring<br>electrical equipment to meet Australian Standards (e.g., AS/NZS 3820),<br>inspection of newly acquired (especially imported) equipment, and<br>returning/modifying unsafe equipment. The PROVISION imposes an<br>operational control requirement in specified higher-risk use<br>circumstances: the PCBU must minimise electrical risk from socket-<br>outlet supply by using an appropriate residual current device (RCD),<br>generally with \u226430 mA trip current for socket outlets \u226420 A, subject<br>to stated exceptions. The POLICY does not mention RCD use, the<br>specific triggering circumstances<br>(moisture/heat/vibration/movement/amusement devices), the 30 mA<br>requirement, or the exceptions. Therefore, while related to electrical<br>safety, the POLICY does not fulfill the PROVISION\u2019s specific<br>obligation to ensure appropriate RCD protection in the listed<br>circumstances.<br><br><b>Remediation:</b> Amend the policy/procedure to require that, in the circumstances<br>listed in the regulation (harsh environments, equipment moved between<br>locations, frequently moved equipment, amusement devices), electrical<br>equipment supplied via socket outlets must be protected by an<br>appropriate RCD, and specify that for socket outlets \u226420 A the RCD<br>trip current must be \u226430 mA. Include the regulation\u2019s exceptions (\u226450<br>VAC, DC, isolating transformer equivalent protection, non-earthed<br>isolated generator equivalent protection) and assign responsibility<br>for verifying/maintaining RCD protection (e.g., electrician<br>verification, periodic testing/inspection).", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 8.2<br><b>Provision ID:</b> 146<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.569<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision defines what constitutes 'electrical work' and lists<br>exclusions where work is not considered electrical work (e.g.,<br>replacing a fuse/light bulb, non-electrical component work without<br>electrical risk, plug-and-socket connection). The policy requires that<br>modifications/repairs/replacements to electrical equipment be carried<br>out only by a competent person and that, after completion, the<br>equipment must be electrically tested, tagged, and certified prior to<br>commissioning. This policy applies broadly to modifications such as<br>repairing wiring or replacing faulty parts, without acknowledging the<br>provision\u2019s exclusions where certain tasks may be safely performed by<br>non-experts and may not constitute electrical work. Therefore, the<br>policy imposes stricter requirements than the provision and may be<br>inconsistent with the regulatory definition/exclusions, creating a<br>potential overreach and misclassification of non-electrical work as<br>electrical work.<br><br><b>Remediation:</b> Amend the policy to align with the provision\u2019s definition and<br>exclusions by: (1) explicitly defining 'electrical work' consistent<br>with the provision; (2) carving out excluded tasks (e.g., replacing<br>fuses/light bulbs, non-electrical component work without electrical<br>risk, plug-and-socket connection) from the 'competent person' and<br>testing/tagging/certification requirements where appropriate; and (3)<br>specifying that testing/tagging/certification applies when the<br>activity is electrical work or otherwise creates electrical risk, and<br>clarify supervision/competency requirements consistent with<br>licensed/registered worker supervision where required.", "", "", "<b>Source ID:</b> 8.2<br><b>Provision ID:</b> 149<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.563<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires that unsafe electrical equipment be<br>disconnected/isolated and not reconnected until it is repaired or<br>tested and found safe, or else replaced/removed. The policy addresses<br>who may perform modifications/repairs (competent person) and requires<br>post-work electrical testing/tagging/certification before<br>commissioning, which partially aligns with the 'tested and found safe'<br>concept. However, the policy does not explicitly require (1)<br>identifying/handling 'unsafe electrical equipment' as defined by<br>reasonable grounds, (2) immediate disconnection/isolation of unsafe<br>equipment, or (3) prohibiting reconnection until repaired or tested<br>safe, or replacement/removal. Therefore it does not fully satisfy the<br>provision\u2019s control requirements.<br><br><b>Remediation:</b> Update the policy to explicitly require that any electrical equipment<br>suspected/known to be unsafe is immediately disconnected/isolated from<br>supply, prevented from being reconnected, and only returned to service<br>after repair or testing confirms it is safe; otherwise it must be<br>replaced or permanently removed from use. Include criteria/process for<br>determining 'reasonable grounds' of unsafety and controls<br>(lockout/tagout, signage, access restriction) to prevent reconnection.", "<b>Source ID:</b> 8.2<br><b>Provision ID:</b> 150<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.636<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY addresses electrical work on equipment<br>(repairs/modifications) by a competent person and requires post-work<br>electrical testing, tagging, and certification before commissioning.<br>The PR ne by a competent person and requires<br>testing/tagging/certification only upon completion prior to<br>commissioning. It does not require pre-work testing to confirm de-<br>energised status, nor does it address treating exposed parts as<br>energised until isolation/testing, or earthing high-voltage exposed<br>parts after de-energising. Therefore the policy does not meet the<br>provision\u2019s pre-work safety testing and handling requirements.<br><br><b>Remediation:</b> Update the policy to require that, before any electrical work begins,<br>a competent person tests the equipment to confirm whether it is<br>energised (and documents the result). Add requirements that exposed<br>parts are treated as energised until isolated and proven de-energised,<br>and that any high-voltage exposed parts are earthed after de-<br>energising. Reference or align procedures with the applicable testing<br>method requirements (e.g., per the relevant regulations/standards) and<br>ensure worker training and records support these steps.", "<b>Source ID:</b> 8.2<br><b>Provision ID:</b> 156<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.546<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires ensuring de-energised electrical equipment is<br>not inadvertently re-energised while electrical work is being carried<br>out (i.e., isolation/lockout controls during the work). The policy<br>addresses who may perform modifications (competent person) and post-<br>work testing/tagging/certification prior to commissioning, but it does<br>not state any requirement or controls to prevent inadvertent re-<br>energisation during the work. Therefore, the policy does not cover the<br>provision\u2019s core obligation.<br><br><b>Remediation:</b> Amend the policy/procedure to require isolation controls during<br>electrical work, such as: de-energise and isolate the equipment; apply<br>lockout/tagout (LOTO) or equivalent securing of isolators; verify<br>isolation s mandatory preconditions before electrical work on<br>energised electrical equipment commences, including a recorded risk<br>assessment conducted by a competent person, ensuring clear<br>access/egress and isolation point accessibility/labeling/operability,<br>and formal authorisation after consultation. The POLICY partially<br>aligns with the competency concept but does not address the<br>PROVISION\u2019s required pre-work controls (risk assessment and recording,<br>site/access conditions, isolation point requirements, and<br>authorisation/consultation). Therefore, the POLICY does not fully<br>satisfy the PROVISION\u2019s obligations.<br><br><b>Remediation:</b> Update the policy/procedure for energised electrical work to require,<br>before commencement: (1) a recorded risk assessment conducted by a<br>competent person; (2) the work area is cleared of obstructions to<br>allow easy access and exit; (3) the isolation/disconnection point is<br>clearly marked/labelled, unobstructed, and operable quickly (or<br>document applicability of the stated exception); and (4) formal<br>authorisation of the work after consultation with the person with<br>management/control of the workplace. Retain existing requirements for<br>competent persons and post-work testing/tagging/certification.", "", "<b>Source ID:</b> 8.2<br><b>Provision ID:</b> 161<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.617<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY addresses electrical equipment modifications/repairs by<br>requiring a competent person and post-work electrical<br>testing/tagging/certification before commissioning. The PROVISION<br>imposes additional and more specific duties for electrical work on<br>energised electrical equipment: it must be performed by a competent<br>person with suitable/tested/maintained tools, testing equipment and<br>PPE; in accordance with a safe work method statement (SWMS) meeting<br>specified content requirements; and erson with management or control of the plant<br>to ensure these activities occur; the policy does not explicitly<br>assign this responsibility.<br><br><b>Remediation:</b> Update the policy to: (1) explicitly require maintenance, inspection<br>and testing to be performed in accordance with manufacturer<br>recommendations, or if unavailable, per a competent person\u2019s<br>recommendations, with an annual inspection minimum where compliance<br>with those recommendations is not reasonably practicable; and (2)<br>clearly assign responsibility to the person with management or control<br>of the plant to ensure these activities are carried out.", "", "<b>Source ID:</b> 8.2<br><b>Provision ID:</b> 240<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.570<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY sets requirements for electrical modifications to<br>equipment: (1) work must be done by a competent person, and (2) after<br>completion the equipment must be electrically tested, tagged, and<br>certified before commissioning. The PROVISION requires the person with<br>management/control of an amusement device or passenger ropeway to<br>ensure maintenance/inspection/testing is carried out by a competent<br>person and in accordance with manufacturer/designer recommendations or<br>a competent-person-prepared maintenance manual. It also adds a<br>specific competency requirement for detailed inspections involving<br>electrical installations (must be qualified or assisted by a qualified<br>person). While the POLICY aligns with the 'competent person' concept<br>and includes post-work testing, it does not address the PROVISION\u2019s<br>additional requirements: ensuring work is performed in accordance with<br>manufacturer/designer recommendations or an approved maintenance<br>manual, and ensuring electrical-installation inspection is performed<br>by a qualified person (or assisted by one). Therefore, the POLICY is<br>not fully compliant with the PROVISION.<br><br><b>Remediation:</b> Amend the POLICY to: (1) explicitly require<br>maintenance/inspection/testing to be performed in accordance with the<br>designer/manufacturer recommendations or an approved maintenance<br>manual prepared by a competent person; and (2) specify that any<br>detailed inspection involving an electrical installation must be<br>performed by a person qualified to inspect electrical installations,<br>or by a competent person assisted by such a qualified person. Retain<br>the existing requirements for competent persons and post-work<br>electrical testing/tagging/certification prior to commissioning.", "", "", "", "", "", "", "", "<b>Source ID:</b> 8.3<br><b>Provision ID:</b> 146<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.470<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY requires electrical equipment to be made safe before<br>disposal (e.g., cutting/removing cords, managing residual energy such<br>as capacitors, and addressing chemicals/radiation sources). The<br>PROVISION defines what constitutes \u201celectrical work\u201d (e.g.,<br>disconnecting supply wiring, removing/maintaining electrical<br>equipment) and lists exclusions for non-electrical tasks or simple<br>replacements. Actions contemplated by the POLICY\u2014such as<br>cutting/removing an electrical cord, disconnecting wiring, or<br>otherwise modifying equipment to prevent further use\u2014may constitute<br>\u201celectrical work\u201d under the PROVISION unless they fall within an<br>exclusion. The POLICY does not specify that such tasks must be<br>performed by a licensed/registered electrical worker (or under<br>required supervision), nor does it distinguish between tasks that are<br>electrical work versus excluded tasks. Therefore, the POLICY is not<br>aligned with the PROVISION\u2019s regulatory boundary conditions for who<br>may perform electrical work and under what supervision.<br><br><b>Remediation:</b> Update the POLICY to: (1) explicitly identify that cord<br>removal/cutting, disconnection of supply wiring, and any internal<br>discharge/isolation activities may be \u201celectrical work\u201d; (2) require<br>these activities to be performed only by appropriately<br>licensed/registered electrical workers or under the supervision<br>conditions permitted by the jurisdiction; (3) clarify which disposal-<br>prep tasks are non-electrical (and permissible for non-electricians)<br>versus electrical work; and (4) add a procedural control (e.g., pre-<br>disposal electrical risk assessment and sign-off by a<br>licensed/registered electrical worker where electrical work is<br>involved).", "<b>Source ID:</b> 8.3<br><b>Provision ID:</b> 147<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.488<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The provision requires the PCBU to manage risks to health and safety<br>associated with electrical risks at the workplace. The policy<br>addresses managing electrical risks specifically in the context of<br>disposing of electrical equipment by requiring equipment to be made<br>safe before disposal and prompting consideration of key electrical and<br>related hazards (e.g., disabling further use by removing/cutting<br>cords, managing chemicals/radiation sources, residual energy in<br>capacitors, and appropriate e-waste disposal). This constitutes a<br>risk-management approach aligned with the duty to manage electrical<br>risks.", "", "<b>Source ID:</b> 8.3<br><b>Provision ID:</b> 149<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.546<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires the PCBU to ensure unsafe electrical equipment<br>is disconnected/isolated from the electricity supply and, once<br>disconnected, is not reconnected until repaired/tested safe or is<br>replaced/permanently removed from use. The policy focuses on making<br>equipment safe before disposal (e.             text: ["", "", "", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 144<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.476<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY describes key electrical risks (electric shock,<br>fire/arcing/explosion, toxic gases) and is intended to guide safety<br>management around electrical hazards. The PROVISION defines what<br>counts as \u201celectrical equipment\u201d for the purposes of a regulatory<br>Part, including equipment above extra-low voltage and equipment in<br>explosive/fire-risk atmospheres, and excludes certain vehicle<br>propulsion-related equipment. These are functionally related because<br>the definition determines the scope of what equipment the electrical-<br>risk controls should apply to. However, the POLICY does not align with<br>the PROVISION\u2019s scope: it does not reference the extra-low voltage<br>threshold, does not address the specific inclusion of cathodic<br>protection systems, and does not acknowledge the vehicle propulsion<br>exclusion. As written, the POLICY could be applied too broadly or miss<br>regulated categories, so a compliance/scope alignment check fails.<br><br><b>Remediation:</b> Update the POLICY to explicitly align scope with the regulatory<br>definition by: (1) defining \u201celectrical equipment\u201d consistent with the<br>PROVISION (including the > extra-low voltage threshold and inclusion<br>of equipment in fire/explosion-risk atmospheres); (2) explicitly<br>including active impressed current cathodic protection systems (AS<br>2832.1:2015) where applicable; (3) stating the exclusion for motor<br>car/motorcycle propulsion-unit equipment where relevant; and (4)<br>clarifying how the listed risks and controls apply within that defined<br>scope.", "", "", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 147<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.556<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision imposes a duty on a PCBU to manage risks to health and<br>safety associated with electrical risks at the workplace in accordance<br>with Part 3.1. The policy text describes common electrical risks<br>(shock, fire/arcing/explosion, toxic gases) but does not state any<br>requirement or process to manage those risks, does not assign<br>responsibility to the PCBU, and does not reference compliance with<br>Part 3.1 (e.g., hazard identification, risk assessment, implementation<br>of controls, review/monitoring). Therefore, the policy is<br>informational and does not fulfill the management obligation in the<br>provision.<br><br><b>Remediation:</b> Update the policy to include a risk management framework for<br>electrical risks aligned to Part 3.1: (1) assign responsibility to the<br>PCBU and relevant roles; (2) require identification of electrical<br>hazards across design, installation, operation, maintenance and<br>testing; (3) require risk assessment where needed; (4) specify control<br>measures using the hierarchy of controls (e.g., de-<br>energisation/lockout-tagout, RCDs, isolation, guarding,<br>inspection/testing, competency/training, PPE); (5) include procedures<br>for high-risk scenarios (moisture/dust, explosive atmospheres); (6)<br>require consultation, documentation, and periodic review/audit of<br>controls and incidents.", "", "", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 150<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.465<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY text identifies key electrical risks (shock,<br>fire/arcing/explosion, toxic gases) but does not set out the specific<br>controls required by the PROVISION. The PROVISION imposes concrete<br>obligations on a PCBU to (1) ensure regular inspection and testing by<br>a competent person for socket-supplied equipment used in damaging<br>environments (moisture, heat, vibration, mechanical damage, corrosive<br>chemicals, dust), (2) for new/unused equipment, inspect for obvious<br>damage before use, and (3)-(4) keep specified testing records (tester<br>name, date, outcome, next test date; tag acceptable). The POLICY does<br>not mention inspection/testing frequency, competent person<br>requirement, pre-use inspection for new equipment, or recordkeeping<br>requirements. Therefore, it does not demonstrate compliance with the<br>PROVISION.<br><br><b>Remediation:</b> Update the policy/procedure to explicitly require: (1) regular<br>inspection and testing by a competent person for socket-outlet<br>supplied equipment used in the specified harsh/damaging environments;<br>(2) pre-use inspection for obvious damage for new/unused equipment;<br>(3) retention of testing records until next test or removal/disposal;<br>and (4) records to include tester name, test date, outcome, and next<br>test due date (e.g., via equipment tags).", "", "", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 155<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.483<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY identifies key electrical risks (shock,<br>fire/arcing/explosion, toxic gases) but does not specify the required<br>control measures mandated by the PROVISION: (1) testing electrical<br>equipment by a competent person to confirm whether it is energised<br>before electrical work; (2)(a) treating exposed parts as energised<br>until isolated and confirmed de-energised; and (2)(b) earthing each<br>high-voltage exposed part after de-energising. Because these<br>procedural obligations are not stated in the POLICY, the POLICY does<br>not demonstrate compliance with the PROVISION.<br><br><b>Remediation:</b> Update the policy/procedure to explicitly require: (1) pre-work<br>testing of electrical equipment by a competent person to determine<br>energisation status; (2) treating all exposed parts as energised until<br>isolated and verified de-energised; (3) earthing high-voltage exposed<br>parts after de-energising; and reference or align with the applicable<br>testing and verification method requirements (e.g., procedures<br>consistent with the cited regulations).", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 156<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.463<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY identifies key electrical risks (shock,<br>fire/arcing/explosion, toxic gases) but does not include a control or<br>requirement to prevent inadvertent re-energisation of de-energised<br>electrical equipment during electrical work. The PROVISION imposes a<br>specific duty on the business/operator to ensure de-energised<br>equipment is not inadvertently re-energised while work is being<br>carried out. Because the POLICY is only a hazard/risk statement and<br>lacks this mandated control, it does not fulfill the obligation.<br><br><b>Remediation:</b> Update the policy (or add a linked procedure) to require controls that<br>prevent inadvertent re-energisation during electrical work, such as<br>lockout/tagout (LOTO), isolation verification, securing isolation<br>points, signage, controlled access, and a permit-to-work/authorisation<br>process, with clear responsibilities and monitoring.", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.460<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY text identifies key electrical risks (shock,<br>fire/arcing/explosion, toxic gases) but does not set any control<br>requirement about when energised electrical work may or may not be<br>performed. The PROVISION imposes a specific obligation on the<br>business/operator to ensure energised electrical work is not carried<br>out unless one of the listed exceptions applies (necessity for health<br>and safety, necessity for proper work, testing under reg 155, or no<br>reasonable alternative). Because the POLICY does not include this<br>prohibition/exception framework or an equivalent rule requiring de-<br>energisation by default, it does not demonstrate compliance with the<br>PROVISION.<br><br><b>Remediation:</b> Update the policy to explicitly require that electrical work on<br>energised equipment must not be carried out unless one of the<br>permitted conditions applies (health and safety necessity, necessary<br>for proper work, required testing under reg 155, or no reasonable<br>alternative). Add a documented decision/authorisation process to<br>justify and record which exception applies before energised work<br>proceeds, and clarify that testing may be included where allowed.", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.514<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY text identifies common electrical risks (shock,<br>fire/arcing/explosion, toxic gases) but does not set out the specific<br>preconditions required before commencing electrical work on energised<br>electrical equipment. The PROVISION requires, before such work starts:<br>(a) a competent-person risk assessment that is recorded; (b) the work<br>area is clear of obstructions for access/exit; (c) the<br>isolation/disconnection point is clearly marked, unobstructed, and<br>operable quickly (subject to a limited exception); and (d)<br>authorisation after consultation with the person with<br>management/control of the workplace. The POLICY does not mention<br>conducting/recording a risk assessment, ensuring clear access/egress,<br>marking/clearing/quick operation of isolation points, or formal<br>authorisation/consultation. Therefore, the POLICY does not demonstrate<br>compliance with the PROVISION\u2019s procedural requirements.<br><br><b>Remediation:</b> Update the policy/procedure for energised electrical work to<br>explicitly require: (1) a risk assessment conducted by a competent<br>person and recorded before work starts; reated as energised until isolated and verified<br>de-energised; and (3) for high-voltage work, earthing of exposed parts<br>after de-energising. Ensure these steps are embedded in SWIs/permit-<br>to-work/ARA templates and training/competency requirements.", "", "<b>Source ID:</b> 3<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.619<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY is functionally related because it addresses risk<br>management requirements for electrical work, including energised<br>electrical work, which is directly governed by the PROVISION<br>restricting when energised electrical work may be performed. However,<br>the POLICY does not state the core legal requirement that energised<br>electrical work must not be carried out unless one of the specified<br>necessity conditions applies (health and safety necessity, necessity<br>for proper work, testing under reg 155, or no reasonable alternative).<br>Instead, it focuses on completing an Activity Risk Assessment and Safe<br>Work Instruction, which are process controls but do not implement the<br>prohibition/permission threshold required by the PROVISION.<br><br><b>Remediation:</b> Amend the procedure to explicitly prohibit energised electrical work<br>except where one of the permitted conditions applies (as per<br>(1)(a)-(d)), and require documented justification that at least one<br>condition is met before authorisation. Include a decision/approval<br>step in the ARA/SWI for energised work that records which condition<br>applies (including reg 155 testing where relevant) and confirms there<br>is no reasonable alternative (e.g., isolation/de-energisation) where<br>applicable.", "<b>Source ID:</b> 3<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.696<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY requires an Activity Risk Assessment (ARA) before<br>electri ools/testing equipment/PPE.", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 4.1<br><b>Provision ID:</b> 95<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.521<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> Both texts address competency requirements tied to licensed work. The<br>POLICY requires electrical workers to be deemed competent and, where a<br>licence is not required, to demonstrate competency via a practical<br>competency assessment agreed by CSIRO. The PROVISION establishes that<br>a regulator may require a licence holder to undergo reassessment of<br>competency for high risk work if there is a reasonable belief of<br>incompetence. The POLICY does not address regulator-directed<br>reassessment for licence holders (i.e., ongoing/triggered reassessment<br>obligations) and instead focuses on initial licensing requirements and<br>CSIRO-agreed assessments where no licence is required. This creates a<br>gap: the POLICY does not ensure processes exist to comply with<br>potential regulator directions for reassessment of licensed workers\u2019<br>competency.<br><br><b>Remediation:</b> Update the POLICY to include a requirement and process for responding<br>to regulator directions for competency reassessment of licence holders<br>(including triggers, responsibilities, timeframes, recordkeeping, and<br>how reassessment outcomes affect authorization to perform work), in<br>addition to the existing licensing/initial competency assessment<br>requirements.", "", "", "<b>Source ID:</b> 4.1<br><b>Provision ID:</b> 146<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.607<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The texts are functionally related because both address who is<br>permitted/competent to perform \u201celectrical work\u201d and under what<br>conditions (licensing/competency and supervision). The provision<br>defines the scope of \u201celectrical work\u2 /passenger ropeways<br>that: (1) mandates maintenance/inspection/testing be performed by a<br>competent person; (2) requires compliance with designer/manufacturer<br>recommendations or an approved maintenance manual prepared by a<br>competent person; (3) requires that any detailed inspection including<br>an electrical installation be performed by a person qualified to<br>inspect electrical installations or performed with documented<br>assistance from such a qualified person; and (4) clarifies that<br>internal competency assessments do not substitute for legally required<br>electrical installation inspection qualifications/licences.", "", "", "", "", "", "", "", "<b>Source ID:</b> 4.4<br><b>Provision ID:</b> 146<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.567<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY establishes an internal process for verifying electrical<br>competency (licences/qualifications/training/experience, risk<br>understanding, manager/ESO review, documentation, and<br>conditions/limitations including controls for energised work). The<br>PROVISION defines what constitutes \u201celectrical work\u201d and enumerates<br>specific exclusions (tasks that are not electrical work) and<br>conditions under which certain excluded activities may occur (e.g.,<br>supervised work on ducts/conduits when wiring is not energised;<br>assisting a licensed worker under direct supervision with no contact<br>with energised equipment; eligibility work other than on energised<br>equipment). The POLICY does not define \u201celectrical work\u201d or explicitly<br>incorporate the PROVISION\u2019s scope and exclusions. As written, the<br>POLICY applies broadly to \u201celectrical work in CSIRO\u201d and could be<br>interpreted to require verification/approval for activities that the<br>PROVISION explicitly excludes from \u201celectrical work\u201d (e.g., plugging<br>in equipment, replacing a light bulb/fuse, non-electrical component<br>work with no electrical risk). Conversely, the POLICY also does not<br>explicitly address the PROVISION\u2019s conditional exclusions (direct<br>supervision/no contact with energised equipment for assistants;<br>supervision requirements for certain conduit/duct work; eligibility<br>work limitations), meaning the internal controls are not clearly<br>aligned to the regulatory boundary of what is and is not \u201celectrical<br>work\u201d and the conditions attached to excluded activities. Therefore,<br>while the POLICY supports safe practice, it is not compliant as a<br>mapping to the PROVISION because it fails to reflect the statutory<br>definition and exclusions that determine when the policy process must<br>apply and what supervision/energisation constraints apply to certain<br>activities.<br><br><b>Remediation:</b> Amend the POLICY to (1) adopt or reference the jurisdictional<br>definition of \u201celectrical work\u201d and explicitly list (or reference) the<br>exclusions in the PROVISION; (2) clarify when the<br>verification/approval process is required versus when tasks fall<br>outside \u201celectrical work\u201d (while still allowing separate risk-based<br>controls for non-electrical-work tasks if desired); (3) explicitly<br>incorporate the PROVISION\u2019s conditional requirements for excluded<br>activities (e.g., direct supervision and no contact with energised<br>equipment for assistants; supervision and de-energised wiring<br>conditions for ducts/conduits/troughs work; eligibility work limited<br>to non-energised equipment); and (4) ensure the energised-work<br>permission process is clearly limited to circumstances where energised<br>electrical work is legally permitted and performed by appropriately<br>licensed/authorised persons.", "<b>Source ID:</b> 4.4<br><b>Provision ID:</b> 147<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.529<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The PROVISION requires the PCBU to manage risks to health and safety<br>associated with electrical risks at the workplace (in accordance with<br>Part 3.1). The POLICY establishes a structured process to manage<br>electrical risks by verifying electrical worker competency<br>(licences/qualifications/training/experience and understanding of<br>task-specific risks and controls), requiring risk assessments and Safe<br>Work Instructions, requiring managerial and Electrical Safety Officer<br>review/approval, prohibiting work where supporting documentation is<br>missing, addressing validity/renewal of licences, and setting<br>conditions/limitations (including controls for energised work and<br>supervision). These measures are consistent with a risk management<br>approach for electrical risks across maintenance/testing and related<br>activities referenced in the PROVISION.", "", "", "", "", "", "<b>Source ID:</b> 4.4<br><b>Provision ID:</b> 155<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.593<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY is about verifying an electrical worker\u2019s competency<br>(licences, training, experience, risk understanding) and managerial<br>approval/conditions for electrical work, including requirements around<br>energised work permissions and provision of risk assessments/SWIs. The<br>PROVISION imposes a specific operational duty on the PCBU: before<br>electrical work is carried out on electrical equipment, the equipment<br>must be tested by a competent person to determine whether it is<br>energised; exposed parts must be treated as energised until isolated<br>and proven de-energised; and high-voltage exposed parts must be<br>earthed after de-energising. While the POLICY discusses planning for<br>de-energised vs energised work and risk assessments, it does not<br>explicitly require pre-work testing to confirm de-energised status,<br>does not mandate treating exposed parts as energised until isolation<br>and test confirms otherwise, and does not address earthing of high-<br>voltage exposed parts after de-energising. Therefore, the POLICY does<br>not fully implement the specific controls required by the PROVISION.<br><br><b>Remediation:</b> Update the POLICY (and associated verification form/SWI requirements)<br>to explicitly require: (1) testing by a competent person before<br>electrical work to determine whether equipment is energised; (2) a<br>rule that all exposed parts are treated as energised until isolated<br>and confirmed de-energised by test; and (3) for high-voltage work,<br>earthing of exposed parts after de-energising. Cross-reference the<br>required testing method/procedure (e.g., applicable internal procedure<br>aligned to regulatory testing requirements) and ensure these steps are<br>embedded in mandatory SWIs/ARAs and manager approval checks.", "", "<b>Source ID:</b> 4.4<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.524<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision prohibits energised electrical work unless one of the<br>specified necessity conditions applies (health/safety necessity, work<br>requires energisation to be done properly, testing required under reg<br>155, or no reasonable alternative). The policy establishes a<br>competency verification and approval process and requires an<br>application/permission process for energised work, but it does not<br>explicitly incorporate the provision\u2019s threshold test (i.e., requiring<br>documented justification that one of the legal necessity grounds<br>applies before energised work is permitted). It also frames energised<br>work permission primarily around holding an appropriate licence and<br>obtaining internal permission, which is not sufficient to meet the<br>regulatory precondition that energised work must be avoided unless<br>necessary under the listed criteria.<br><br><b>Remediation:</b> Amend the policy and associated forms/approval workflow to cess/egress, labelled/clear/quickly<br>operable isolation point) as mandatory pre-start conditions for<br>energised work. It also does not explicitly require authorisation to<br>occur after consultation with the person with management or control of<br>the workplace (it implies line manager involvement but does not state<br>the consultation requirement). Therefore, the POLICY does not fully<br>satisfy the PROVISION\u2019s specific preconditions for energised<br>electrical work.<br><br><b>Remediation:</b> Amend the policy/procedure (and verification/energised-work<br>application forms) to explicitly require, before energised work<br>starts: (1) a task-specific risk assessment conducted by a competent<br>person and recorded; (2) confirmation the work area is clear of<br>obstructions to allow easy access/exit; (3) confirmation the<br>isolation/disconnection point is clearly marked/labelled,<br>unobstructed, and capable of being operated quickly (and note the<br>exception where applicable); and (4) documented authorisation granted<br>only after consultation with the person with management or control of<br>the workplace. Add checklist fields and evidence/recordkeeping<br>requirements for these items.", "", "<b>Source ID:</b> 4.4<br><b>Provision ID:</b> 161<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.614<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY is functionally related because it governs<br>verification/approval of electrical competency and conditions for<br>energised electrical work, which is directly relevant to the<br>PROVISION\u2019s requirements for energised electrical work (competent<br>person, suitable/tested/maintained tools/PPE, SWMS content, and safety<br>observer requirements/exception). However, the POLICY does not fully<br>implement the PROVISION\u2019s specific mandatory controls for energised<br>work: (1) It requires competency verification and mentions PPE and an<br>application/permission process for tent with the<br>exclusions (e.g., supervised assistants, non-expert replacements) and<br>provide examples to prevent misclassification.", "", "", "<b>Source ID:</b> 5.1<br><b>Provision ID:</b> 149<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.635<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires the PCBU to ensure unsafe electrical equipment<br>is disconnected/isolated from supply and, once isolated, is not<br>reconnected until repaired or tested and found safe, or else<br>replaced/permanently removed. The policy focuses on prohibiting<br>energized work, requiring de-energised work where possible, 'test for<br>dead', treating exposed parts as energised until isolated and proven<br>de-energised, earthing high voltage parts after de-energising,<br>preventing inadvertent re-energisation during work, and verifying<br>installations are safe to energise after<br>construction/alteration/repair. However, it does not explicitly<br>address the specific obligation to manage 'unsafe electrical<br>equipment' by (1) disconnecting/isolating it upon being unsafe, and<br>(2) prohibiting reconnection until repaired or tested and found safe,<br>or replaced/removed. The policy\u2019s testing/verification language is<br>related but does not clearly cover the required controls for unsafe<br>equipment status and reconnection prohibition.<br><br><b>Remediation:</b> Add an explicit section on unsafe electrical equipment requiring: (1)<br>immediate disconnection/isolation when there are reasonable grounds to<br>believe equipment is unsafe; (2) tagging/lockout and controls to<br>prevent reconnection; (3) prohibition on reconnection until the<br>equipment is repaired or tested and confirmed safe by a competent<br>person; and (4) replacement or permanent removal from service if not<br>repaired/tested safe. Define 'unsafe' consistent with the regulation<br>(reasonable grounds) and include responsibilities, records, and<br>escalation steps.", "<b>Source ID:</b> 5.1<br><b>Provision ID:</b> 150<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.652<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY addresses safe methods for performing electrical work<br>(e.g., working de-energised, \u201ctest for dead,\u201d preventing inadvertent<br>re-energisation, and verification/testing of installations to AS 3000<br>after construction/alteration/repair). The PROVISION, however, imposes<br>a separate and specific duty on the PCBU to ensure certain plug-in<br>electrical equipment used in damaging environments is regularly<br>inspected and tested by a competent person, with exemptions for<br>new/unused equipment (inspection for obvious damage), and requires<br>keeping specified testing records until next test or disposal. The<br>POLICY does not establish a program for regular inspection/testing of<br>in-scope equipment, does not state the environmental trigger<br>conditions, does not include the new/unused equipment inspection<br>requirement, and does not require maintaining records with the<br>mandated fields (tester name, date, outcome, next test date) or<br>tagging. Therefore, it does not demonstrate compliance with the<br>PROVISION\u2019s inspection/testing and recordkeeping obligations.<br><br><b>Remediation:</b> Add a section requiring regular inspection and testing by a competent<br>person for plug-in electrical equipment used in environments likely to<br>cause damage (moisture, heat, vibration, mechanical damage, corrosive<br>chemicals, dust), define inspection/testing intervals or a risk-based<br>schedule, require pre-use inspection for obvious damage for new/unused<br>equipment, and implement recordkeeping that captures tester name, test<br>date, outcome, and next due date (e.g., via tags and/or a register)<br>retained until the next test or disposal/removal.", "", "<b>Source ID:</b> 5.1<br><b>Provision ID:</b> 154<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Y ive/testing conditions applies. The<br>POLICY also includes controls such as 'test for dead', treating<br>exposed parts as energised until proven otherwise, earthing high-<br>voltage parts after de-energising, and preventing inadvertent re-<br>energisation\u2014measures that support safe execution consistent with the<br>regulation\u2019s intent. While the POLICY does not restate each exception<br>in the same wording as (1)(a)-(d), it references the exemptions (s157)<br>and establishes a stricter default (de-energise wherever possible),<br>which does not conflict with the PROVISION.", "<b>Source ID:</b> 5.1<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.715<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY addresses working de-energised wherever possible, \u201ctest for<br>dead,\u201d treating exposed parts as energised until proven otherwise,<br>earthing high-voltage parts after de-energising, preventing<br>inadvertent re-energisation, and verifying installations are safe to<br>energise per AS 3000. The PROVISION, however, sets specific mandatory<br>prerequisites before energised electrical work commences: (1) a risk<br>assessment conducted, (2) the work area clear of obstructions for<br>access/exit, (3) the isolation/disconnection point clearly<br>marked/labelled, unobstructed, and quickly operable, and (4) formal<br>authorisation after consultation with the person with<br>management/control of the workplace; additionally, the risk assessment<br>must be conducted by a competent person and recorded. The POLICY does<br>not explicitly require a recorded risk assessment for energised work,<br>does not require the specific access/egress and isolation-point<br>marking/quick-operability controls, and does not require authorisation<br>after consultation. Therefore it does not fully meet the PROVISION\u2019s<br>prerequisites for energised electrical work.<br><br><b>Remediation:</b> Update the POLICY (and associated procedures/forms) to explicitly<br>require, before any energised electrical work starts: (1) a risk<br>assessment conducted by a competent person and recorded; (2) the work<br>area is cleared of obstructions to ensure easy access and exit; (3)<br>the isolation/disconnection point is clearly marked/labelled,<br>unobstructed, and capable of being operated quickly (and address the<br>stated exception where applicable); and (4) formal authorisation of<br>the energised work after consultation with the person with<br>management/control of the workplace. Implement an authorisation/permit<br>and risk-assessment recordkeeping process to evidence compliance.", "<b>Source ID:</b> 5.1<br><b>Provision ID:</b> 160<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.644<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision imposes a specific duty: if electrical work is carried<br>out on energised electrical equipment, the PCBU must ensure all<br>persons are prevented from creating an electrical risk by<br>inadvertently contacting exposed energised components. The policy<br>strongly emphasises de-energised work, \u201ctest for dead,\u201d treating<br>exposed parts as energised until isolated, earthing high voltage parts<br>after de-energising, and preventing inadvertent re-energisation.<br>However, it does not state the required control for the scenario where<br>energised work is actually performed\u2014i.e., preventing inadvertent<br>contact with exposed energised components (e.g., barriers, exclusion<br>zones, insulating covers, access control, supervision). Therefore, the<br>policy does not fully address the provision\u2019s obligation for energised<br>work conditions.<br><br><b>Remediation:</b> Add explicit requirements for energised electrical work controls,<br>including: establishing exclusion zones and access control; using<br>physical barriers/insulating shrouds and covers over exposed energised<br>parts; ensuring only authorised/competent persons are present;<br>implementing a documented energised work permit/JSA with specific<br>controls; using appropriate PPE and insulated tools; and<br>supervision/spotter arrangements where needed to prevent inadvertent<br>contact.", "<b>Source ID:</b> 5.1<br><b>Provision ID:</b> 161<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.679<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY addresses working de-energised wherever possible, \u201ctest for<br>dead\u201d, treating exposed parts as energised until proven otherwise,<br>earthing high voltage parts after de-energising, preventing<br>inadvertent re-energisation, and verifying installations are safe to<br>energise per AS 3000. These topics are functionally related to the<br>PROVISION, which sets mandatory conditions for when energised<br>electrical work is carried out (competent person with<br>suitable/tested/maintained tools/PPE, safe work method statement<br>(SWMS) content requirements, and a safety observer unless an exception<br>applies). However, the POLICY does not include several required<br>controls for energised work: it does not require that energised work<br>be carried out in accordance with a SWMS, does not specify SWMS<br>minimum content (identify work, hazards/risks, controls,<br>implementation/monitoring/review), does not require a safety observer<br>for energised work (nor define competence and annual<br>rescue/resuscitation assessment), and does not require ensuring (so<br>far as reasonably practicable) that tools/testing equipment/PPE are<br>used properly. Therefore, the POLICY is not compliant with the<br>PROVISION\u2019s explicit requirements for energised electrical work.<br><br><b>Remediation:</b> Update the POLICY (or add an energised electrical work procedure) to<br>explicitly require: (1) energised electrical work only by a competent<br>person using tools/testing equipment/PPE that are suitable, properly<br>tested, and maintai rement for insulating mats/barriers is related but<br>does not satisfy the PROVISION\u2019s testing/recordkeeping obligations for<br>electrical equipment.<br><br><b>Remediation:</b> Update the policy/procedure to: (1) mandate regular inspection and<br>electrical testing by a competent person for socket-outlet supplied<br>equipment used in environments likely to cause damage (moisture, heat,<br>vibration, mechanical damage, corrosive chemicals, dust); (2) require<br>new/unused equipment to be inspected for obvious damage before first<br>use; (3) require that unsafe equipment is not used and is removed from<br>service; (4) implement a testing record system retained until the next<br>test or disposal, capturing tester name, test date, outcome, and next<br>due date (e.g., tag plus central register).", "<b>Source ID:</b> 5.2<br><b>Provision ID:</b> 151<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.520<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires that electrical equipment that is required to<br>be tested under regulation 150 must not be used unless it has been<br>tested. The policy discusses maintaining tools/equipment in good<br>working order and mentions regular maintenance, inspection and<br>testing, and removing items from service where insulation adequacy is<br>in doubt or defects are found. However, it does not explicitly require<br>that equipment subject to mandatory testing under regulation 150 must<br>not be used if it has not been tested, nor does it reference the<br>regulatory testing requirement or establish a clear control to prevent<br>use pending required testing. Therefore, the policy does not fully<br>satisfy the specific prohibition in the provision.<br><br><b>Remediation:</b> Add an explicit requirement that any electrical equipment required to<br>be tested under regulation 150 must not be used unless it has been<br>tested (and is within the required test interval), including a<br>process/control for tagging, recording test status, and<br>removing/locking out untested equipment from service.", "", "<b>Source ID:</b> 5.2<br><b>Provision ID:</b> 155<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.572<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires that before electrical work is carried out on<br>electrical equipment, the equipment is tested by a competent person to<br>determine whether it is energised, and that exposed parts are treated<br>as energised until isolated and proven de-energised (and high-voltage<br>exposed parts earthed after de-energising). The policy focuses on<br>suitability and maintenance of electrical tools/equipment and<br>inspection/removal from service of insulating mats/barriers, but it<br>does not require pre-work energisation testing by a competent person,<br>does not state the 'treat as energised until isolated and proven de-<br>energised' rule, and does not address earthing of high-voltage exposed<br>parts after de-energising. Therefore it does not meet the provision\u2019s<br>specific obligations.<br><br><b>Remediation:</b> Update the policy/procedure to explicitly require: (1) before any<br>electrical work on electrical equipment, testing by a competent person<br>to confirm whether the equipment is energised (with reference to the<br>applicable testing method/procedure); (2) all exposed parts must be<br>treated as energised until isolated and verified de-energised; and (3)<br>each high-voltage exposed part must be earthed after being de-<br>energised. Include roles/competency requirements,<br>documentation/records of testing, and integration with existing<br>inspection/maintenance controls.", "", "", "", "<b>Source ID:</b> 5.2<br><b>Provision ID:</b> 160<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.508<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The provision requires the PCBU to ensure that, during energised<br>electrical work, persons are prevented from creating electrical risk<br>by inadvertent contact with exposed energised components. The policy<br>establishes controls that support this outcome by requiring electrical<br>tools/equipment to be suitable and maintained, removing<br>doubtful/defective insulated tools/equipment from service, and<br>specifying compliant insulating mats/barriers (AS/NZS2978), effective<br>separation from energised parts, and mandatory visual inspection<br>before/after use with removal from service if defects affect<br>performance. These measures functionally address preventing<br>inadvertent contact and associated electrical risk during energised<br>work.", "<b>Source ID:</b> 5.2<br><b>Provision ID:</b> 161<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.562<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY is functionally related to the PROVISION because it<br>addresses suitability, inspection/testing, and maintenance of<br>electrical tools/equipment and insulating barriers/mats used for<br>electrical purposes, which aligns with the PROVISION\u2019s requirement<br>that energised electrical work be carried out by a competent person<br>using tools/testing equipment/PPE that are suitable, properly tested,<br>and maintained. However, the POLICY does not cover several mandatory<br>elements of the PROVISION for energised electrical work: (1) it does<br>not require that energised electrical work be carried out by a<br>competent person; (2) it does not require work to be performed in<br>accordance with a safe work method statement (SWMS) nor specify SWMS<br>content; (3) it does not require a safety observer (or define the<br>exception conditions), nor the observer\u2019s competence and annual<br>rescue/resuscitation assessment; and (4) it does not explicitly<br>require, so far as reasonably practicable, that workers use<br>tools/testing equipment/PPE properly. While the POLICY includes<br>inspection/maintenance expectations rgised; and (3) require that<br>high-voltage exposed parts are earthed after de-energisation,<br>including specifying when/where this applies and the responsible role.", "<b>Source ID:</b> 6.1<br><b>Provision ID:</b> 156<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.578<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The provision requires ensuring de-energised electrical equipment is<br>not inadvertently re-energised during electrical work. The policy<br>directly addresses this obligation by requiring isolation at the<br>supply source, lockout and tagging, use of personal locks and danger<br>tags, and verification testing before commencing work\u2014controls that<br>are designed to prevent inadvertent re-energisation while work is<br>carried out.", "<b>Source ID:</b> 6.1<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.511<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision regulates when electrical work on energised equipment<br>may occur (it must not be carried out unless one of the listed<br>exceptions applies). The policy addresses de-energised work controls<br>(isolation, lockout/tagout, and test-for-dead) but does not state the<br>core prohibition on energised electrical work or the limited<br>circumstances under which energised work is permitted. Because the<br>policy is silent on restricting/authorising energised work to only the<br>provision\u2019s exceptions, it does not demonstrate compliance with the<br>requirement to ensure energised work is not carried out unless the<br>specified conditions are met.<br><br><b>Remediation:</b> Amend the policy to explicitly prohibit electrical work on energised<br>equipment except where one of the permitted conditions applies<br>(health/safety necessity, work requires energisation, required<br>testing, or no reasonable alternative). Include a requirement for<br>documented justification/approval for energised work against these<br>criteria and clarify that any energised testing is only allowed within<br>those permitted circumstances.", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 149<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.490<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires that unsafe electrical equipment is<br>isolated/disconnected and, once isolated, is not reconnected until<br>repaired/tested safe, or is replaced/removed. The policy addresses<br>isolation points having control mechanisms to prevent inadvertent re-<br>energisation (e.g., lockable switches/lockout devices), which supports<br>maintaining isolation, but it does not explicitly require (1) that<br>unsafe equipment must be isolated, nor (2) that it must not be<br>reconnected until repaired/tested safe, or replaced/removed. Therefore<br>the policy only partially addresses the regulatory obligation and is<br>not fully compliant.<br><br><b>Remediation:</b> Amend the policy to explicitly require that when electrical equipment<br>is identified as unsafe it must be immediately disconnected/isolated,<br>and must not be reconnected until it has been repaired or tested and<br>confirmed safe, or else replaced or permanently removed from service.<br>Include clear responsibilities, tagging/lockout steps, and<br>verification/authorization requirements before re-energisation.", "", "", "", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 155<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.495<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY requires isolation points to be fitted with control<br>mechanisms that prevent inadvertent re-energisation (e.g., lockable<br>switches/lockout devices) and that require deliberate action and<br>withstand conditions that could cause isolation failure. The PROVISION<br>requires testing
