ipment showing signs of damage/defects (or where<br>there is doubt) be isolated/taken out of service until repaired and<br>tested as safe. This aligns with the PROVISION\u2019s requirement to<br>disconnect/isolate unsafe electrical equipment and ensure it is not<br>reconnected until repaired or tested and found safe, or<br>replaced/removed. The POLICY\u2019s threshold of isolating equipment when<br>defects are present or even if there is doubt is consistent with the<br>PROVISION\u2019s definition of unsafe as having reasonable grounds for<br>believing it to be unsafe.", "<b>Source ID:</b> 8.4<br><b>Provision ID:</b> 150<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.747<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY is clearly intended to implement the PROVISION\u2019s<br>requirements for inspection/testing of socket-outlet supplied<br>equipment used in damaging environments, and it addresses new/unused<br>equipment. However, it does not include the PROVISION\u2019s mandatory<br>recordkeeping requirements for testing (keeping records until next<br>test or removal/disposal) nor the required record contents (tester<br>name, test date, outcome, next test due date) and that the record may<br>be a tag. Additionally, for new and unused equipment, the PROVISION<br>requires inspection for obvious damage before use; the POLICY only<br>states this is \u201cadvisable,\u201d which is weaker than the mandatory<br>requirement. The POLICY also introduces a 'new to service' tag<br>requirement, which is not required by the PROVISION, but that does not<br>cure the missing mandatory elements.<br><br><b>Remediation:</b> Add a mandatory requirement to inspect new and unused electrical<br>equipment for obvious damage before first use (replace \u201cadvisable\u201d<br>with \u201cmust\u201d). Add a mandatory recordkeeping section requiring records<br>of any testing to be kept until the equipment is next tested or<br>permanently removed/disposed. Specify required record fields: tester\u2019s<br>name, date of testing, outcome, and next test due date; state that the<br>record may be a tag attached to the equipment. Ensure<br>procedures/forms/tags used in practice capture and retain the required<br>information for the required duration.", "<b>Source ID:</b> 8.4<br><b>Provision ID:</b> 151<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.558<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The provision prohibits use of electrical equipment that is required<br>to be tested (under reg 150) but has not been tested. The policy<br>establishes a system requiring regular inspection and testing by a<br>competent person for socket-outlet supplied equipment used in<br>hostile/damaging environments, requires isolation/out-of-service where<br>defects are suspected, and mandates scheduled testing/tagging per<br>AS3760. It also clarifies that brand-new equipment need not be tested<br>before first use but must be tagged 'new to service' and then tested<br>at the next scheduled interval. This framework supports ensuring<br>equipment that requires testing is tested before continued use,<br>aligning with the provision\u2019s prohibition on using untested equipment<br>when testing is required.", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 8.4<br><b>Provision ID:</b> 165<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.546<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision imposes specific obligations regarding residual current<br>devices (RCDs): (1) ensure RCDs are tested regularly by a competent<br>person, and (2) keep records of all RCD testing (other than daily<br>testing) until the next test or removal from use. The policy text<br>addresses inspection/testing and tagging of electrical equipment<br>supplied via socket outlets in damaging environments, visual<br>inspections, and testing frequency per AS3760, but it does not<br>explicitly require regular testing of RCDs nor does it require<br>maintaining records of RCD testing as specified. Therefore, the policy<br>does not fully cover the provision\u2019s RCD testing and recordkeeping<br>requirements.<br><br><b>Remediation:</b> Amend the policy to explicitly require: (1) regular testing of all<br>workplace RCDs by a competent person to confirm effective operation<br>(including defining/aligning the testing interval with applicable<br>requirements/standards), and (2) retention of records for all non-<br>daily RCD tests until the RCD is next tested or permanently removed<br>from use. Include responsibility assignment (management/control),<br>record format/location, and retention/availability requirements.", "", "", "", "", "", "<b>Source ID:</b> 8.4<br><b>Provision ID:</b> 213<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.564<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY is functionally related to the PROVISION because both<br>impose duties on the person with management/control to ensure<br>inspection and (where needed) testing is performed by a competent<br>person. However, the POLICY is narrower and does not fully meet the<br>PROVISION\u2019s requirements for \u201cplant\u201d generally and for<br>maintenance/inspection/testing to be carried out in accordance with<br>(a) manufacturer recommendations, or (b) competent person<br>recommendations where manufacturer guidance is absent, or (c) at least<br>annual inspection where (a) or (b) are not reasonably practicable. The<br>POLICY focuses on electrical equipment supplied via socket outlets in<br>damaging environments, sets testing frequency by AS3760, and includes<br>visual checks each use and tagging rules for new equipment. It does<br>not explicitly require maintenance (beyond isolation/repair), does not<br>require following manufacturer recommendations (or competent-person<br>recommendations where none exist), and does not include the fallback<br>requirement of annual inspection when (a)/(b) are not reasonably<br>practicable. Therefore it does not fully satisfy the PROVISION.<br><br><b>Remediation:</b> Amend the POLICY to: (1) explicitly cover all relevant \u201cplant\u201d (or<br>clearly define scope and add a separate procedure for other plant) and<br>require maintenance, inspection and testing (where necessary) by a<br>competent person; (2) require maintenance/inspection/testing to follow<br>manufacturer recommendations where available; (3) where manufacturer<br>recommendations are absent, require following recommendations of a<br>competent person; (4) include a documented fallback that inspection is<br>performed at least annually where compliance with (2) or (3) is not<br>reasonably practicable; and (5) ensure AS3760-based intervals are<br>applied only where consistent with manufacturer/competent-person<br>recommendations or document how conflicts are resolved.", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 9.1<br><b>Provision ID:</b> 146<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.461<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision defines what constitutes \u201celectrical work\u201d and what is<br>excluded. The policy sets requirements for appointing Electrical<br>Safety Officers (ESOs) where \u201crecurring electrical work\u201d is carried<br>out, and provides an exclusion only for \u201cextra low voltage equipment<br>or installations.\u201d Because the policy\u2019s trigger (\u201crecurring electrical<br>work\u201d) depends on the legal/regulated definition of electrical work, a<br>compliance check is necessary. The policy is not compliant/aligned<br>because it does not incorporate or reference the provision\u2019s<br>exclusions from \u201celectrical work\u201d (e.g., plug-and-socket connection,<br>non-electrical component work without electrical risk, replacing<br>fuses/light bulbs, certain supervised assistance, etc.). As written,<br>the policy could require ESO appointments for activities that the<br>provision explicitly says are not electrical work, creating overbroad<br>obligations and potential confusion/inconsistency. Additionally, the<br>policy\u2019s only stated exemption (extra low voltage) is not mapped to<br>the provision\u2019s definition/exclusions and may omit other non-<br>electrical-work scenarios recognized by the provision.<br><br><b>Remediation:</b> Amend the policy to align the trigger for ESO appointment with the<br>provision\u2019s definition of \u201celectrical work,\u201d including explicitly<br>adopting or cross-referencing the listed exclusions. Clarify that ESO<br>appointment is required only where recurring activities meet the<br>defined scope of electrical work, and document how extra-low-voltage<br>work is treated relative to the jurisdictional definition/exclusions.", "<b>Source ID:</b> 9.1<br><b>Provision ID:</b> 147<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.468<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires the PCBU to manage electrical health and safety<br>risks at the workplace (a substantive duty to implement risk<br>management controls). The policy text primarily defines the purpose<br>and appointment requirements for Electrical Safety Officers (ESOs) and<br>explicitly states ESOs are not responsible for managing or approving<br>electrical work and safety activities. While appointing ESOs can<br>support risk management, the policy excerpt does not assign<br>responsibility or describe processes to ensure electrical risks are<br>managed in accordance with the required risk management framework<br>(e.g., identification, assessment, control, review per Part 3.1).<br>Therefore, based on the provided excerpt alone, the policy does not<br>demonstrate fulfillment of the duty to manage electrical risks.<br><br><b>Remediation:</b> Amend the policy (or reference a linked procedure) to explicitly<br>require the business unit/PCBU to manage electrical risks in<br>accordance with Part 3.1, including: hazard identification, risk<br>assessment (where required), implementation of controls (e.g.,<br>design/installation/maintenance/testing controls), verification and<br>review of control effectiveness, and clear assignment of accountable<br>roles (e.g., senior manager/site management) for managing and<br>approving electrical work and safety activities, with ESOs providing<br>advisory support.", "<b>Source ID:</b> 9.1<br><b>Provision ID:</b> 148<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.478<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The provision defines the scope of what counts as electrical<br>equipment/installation for a person conducting a business or<br>undertaking (PCBU): those under the person's management or control.<br>The policy establishes an internal governance role (ESO) to advise on<br>electrical work requirements and safe practices at sites where<br>recurring electrical work occurs, which is a mechanism relevant to<br>managing electrical work associated with equipment/installations under<br>CSIRO/business unit control. The policy does not contradict the<br>provision and is consistent with the concept that responsibilities<br>attach to what is under the organization's management or control.", "", "", "", "", "", "", "", "<b>Source ID:</b> 9.1<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.481<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision imposes specific preconditions that a PCBU must ensure<br>before energised electrical work starts (risk assessment by a<br>competent person and recorded; work area and isolation point<br>access/egress; isolation point marked/labelled and operable quickly;<br>and formal authorisation after consultation with the person with<br>management/control of the workplace). The policy text is about<br>appointing Electrical Safety Officers (Site ESO/BU ESO) and explicitly<br>states the ESO is not responsible for managing or approving electrical<br>work and safety activities. It does not set out any requirements or<br>process to ensure the provision\u2019s preconditions (risk<br>assessment/recording, access/labeling/isolation operability,<br>consultation, and authorisation) are met. Therefore, while related to<br>electrical safety governance, the policy does not demonstrate controls<br>to satisfy the provision\u2019s obligations for energised electrical work.<br><br><b>Remediation:</b> Add or reference a procedure for energised electrical work that<br>requires, before commencement: (1) a recorded risk assessment<br>conducted by a competent person; (2) verification that the work area<br>is clear for access/exit; (3) verification that the<br>isolation/disconnection point is clearly marked/labelled,<br>unobstructed, and operable quickly (including handling of the stated<br>exception); and (4) documented authorisation of the energised work<br>after consultation with the person with management/control of the<br>workplace. Clarify roles/responsibilities (e.g., who performs the risk<br>assessment, who verifies site conditions, and who authorises)<br>consistent with the policy\u2019s statement that ESOs do not approve/manage<br>work.", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 9.2<br><b>Provision ID:</b> 146<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.488<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision defines what constitutes \u201celectrical work\u201d and, by<br>implication, which activities typically require appropriately<br>licensed/qualified electrical workers versus activities excluded from<br>that definition. The policy sets a general expectation that BU/Site<br>ESOs have training/qualification/licensing commensurate with the<br>electrical work performed at their site, but rson and<br>that testing records are kept with specified details. The policy<br>addresses training/qualification/licensing requirements for<br>individuals appointed to BU or Site ESO roles, aligned to the type of<br>electrical work performed at a site. While this relates to ensuring<br>competency (and could support having a 'competent person'), it does<br>not establish the required inspection/testing program for in-scope<br>equipment, does not mandate regular inspection/testing, and does not<br>require retention and content of testing records (name, date, outcome,<br>next test date, tag/record retention). Therefore, the policy does not<br>fulfill the operational and recordkeeping obligations in the<br>provision.<br><br><b>Remediation:</b> Update the policy (or add a linked procedure) to: (1) define which<br>electrical equipment is in scope (socket-supplied equipment used in<br>damaging environments); (2) require regular inspection and testing at<br>defined intervals by a competent person; (3) require pre-use<br>inspection for new/unused equipment; (4) prohibit use of unsafe<br>equipment; and (5) require keeping testing records until next<br>test/removal, including mandatory fields (tester name, test date,<br>outcome, next test due date) and allowing tagging as the record.", "", "", "", "", "", "", "", "<b>Source ID:</b> 9.2<br><b>Provision ID:</b> 161<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.588<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY addresses training/qualification/licensing requirements for<br>individuals appointed as BU or Site ESO, ensuring their competency is<br>commensurate with the electrical work performed at their primary site.<br>The PROVISION imposes duties on the PCBU specifically for electrical<br>work on energised electrical equipment, requiring that such work be<br>carried out by a competent person with suitable/tested/maintained<br>tools/PPE, in accordance with a safe work method statement (SWMS), and<br>(subject to exceptions) with a competent safety observer assessed<br>within the last 12 months for rescue/resuscitation. While the POLICY<br>partially aligns with the 'competent person' concept (via<br>training/assessment/licensing), it does not address key mandatory<br>elements of the PROVISION: (1) ensuring suitable/tested/maintained<br>tools, testing equipment and PPE; (2) ensuring the work is performed<br>in accordance with a SWMS meeting specified content requirements; (3)<br>ensuring a safety observer is present when required and meets<br>competence and recent rescue/resuscitation assessment requirements;<br>and (4) ensuring, so far as reasonably practicable, proper use of<br>tools/PPE. Therefore, the POLICY is not sufficient to demonstrate<br>compliance with the PROVISION.<br><br><b>Remediation:</b> Update the POLICY (or add linked procedures) to explicitly require for<br>energised electrical work: (1) verification that the worker is<br>competent for energised work; (2) provision and verification of<br>suitable tools/testing equipment/PPE that are properly tested and<br>maintained; (3) preparation and use of a SWMS that identifies the<br>work, hazards/risks, controls, and implementation/monitoring/review;<br>(4) appointment of a safety observer when required, including<br>documented competence and rescue/resuscitation competency assessment<br>within the last 12 months; (5) a risk assessment process for the<br>testing-only exception; and (6) supervision/assurance measures to<br>ensure workers properly use tools/testing equipment/PPE.", "", "<b>Source ID:</b> 9.2<br><b>Provision ID:</b> 163<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.491<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires a PCBU carrying out construction work to comply<br>with AS/NZS 3012:2019 for electrical installations on<br>construction/demolition sites. The policy addresses<br>training/qualification/licensing requirements for BU/Site Electrical<br>Safety Officers (ESOs) based on the type of electrical work performed<br>at a site. While both concern electrical safety competence, the policy<br>does not state compliance with AS/NZS 3012:2019, does not scope itself<br>to construction/demolition sites, and does not cover the broader<br>AS/NZS 3012 obligations (e.g., installation, inspection/testing, RCDs,<br>tagging, site electrical management requirements). Therefore, the<br>policy is insufficient to demonstrate compliance with the provision.<br><br><b>Remediation:</b> Update the policy (or create a linked procedure/standard) to<br>explicitly require compliance with AS/NZS 3012:2019 for any<br>construction/demolition site work, define when the organization is<br>performing 'construction work', and map AS/NZS 3012 requirements to<br>internal controls (roles/responsibilities, competency requirements,<br>inspection/testing and verification, RCD and equipment controls,<br>documentation/records, auditing). Ensure ESO competency/licensing<br>requirements are aligned to AS/NZS 3012 role expectations and site<br>electrical management obligations.", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 9.2<br><b>Provision ID:</b> 240<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.499<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires that maintenance/inspection/testing of an<br>amusement device or passenger ropeway be carried out by a competent<br>person and, where a detailed inspection includes an electrical<br>installation, the inspector must be qualified (or assisted by someone<br>qualified) to inspect electrical installations. The policy addresses<br>training/qualification/licensing requirements for BU/Site Electrical<br>Safety Officer (ESO) roles based on the type of electrical work<br>performed at a site (e.g., competency assessment vs holding an<br>electrical licence). However, it does not explicitly ensure that<br>maintenance/inspection/testing of amusement devices/ropeways is<br>performed by a competent person in accordance with<br>manufacturer/designer recommendations or a competent-person-prepared<br>maintenance manual, nor does it explicitly require that detailed<br>inspections involving electrical installations be performed by (or<br>assisted by) a person qualified to inspect electrical installations.<br>Therefore, the policy only partially aligns and does not fully satisfy<br>the provision\u2019s specific obligations.<br><br><b>Remediation:</b> Update the policy to explicitly require that: (1) maintenance,<br>inspection and testing of amusement devices/passenger ropeways is<br>performed by a competent person and in accordance with<br>manufacturer/designer recommendations or an approved maintenance<br>manual; and (2) any detailed inspection that includes an electrical<br>installation is performed by a person qualified to inspect electrical<br>installations, or by a competent person assisted by such a qualified<br>person. Define/align 'competent person' and 'qualified to inspect<br>electrical installations' criteria and ensure site role requirements<br>cover these tasks where applicable.", "", "", "", "", "", "", "", "<b>Source ID:</b> 9.4<br><b>Provision ID:</b> 146<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.506<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision defines what constitutes \u201celectrical work\u201d and what is<br>excluded. The policy sets out BU ESO and Site ESO duties for managing<br>\u201celectrical work\u201d (e.g., competency verification, risk assessments,<br>SWIs, energised work applications). Because these duties depend on<br>correctly identifying which tasks are legally \u201celectrical work\u201d versus<br>excluded activities, the texts are functionally related and a<br>compliance check is necessary. However, the policy does not define<br>\u201celectrical work\u201d or incorporate/align with the provision\u2019s definition<br>and exclusions. Without this linkage, the policy may be applied too<br>broadly (capturing excluded tasks like replacing light bulbs/fuses or<br>plug-in connections) or too narrowly (missing tasks that are legally<br>electrical work), which can lead to inconsistent competency<br>verification, risk controls, and oversight. Therefore, it is not<br>compliant with the provision in the sense of not<br>reflecting/operationalizing the legal definition that underpins the<br>policy\u2019s scope.<br><br><b>Remediation:</b> Amend the Electrical Safety Procedure/policy section to explicitly<br>adopt the jurisdictional definition of \u201celectrical work\u201d (including<br>the listed inclusions and exclusions) or cross-reference the<br>applicable WHS/Electrical Safety legislation definition. Add<br>guidance/examples for BU/Site ESOs and line managers on classifying<br>tasks as electrical work vs excluded activities, and ensure related<br>processes (competency verification, SWIs, risk assessments, energised<br>work applications) are triggered only when the task meets the<br>definition (with clear handling for excluded tasks).", "<b>Source ID:</b> 9.4<br><b>Provision ID:</b> 147<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.543<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The provision requires the PCBU to manage risks to health and safety<br>associated with electrical risks at the workplace in accordance with<br>WHS risk management requirements (Part 3.1). The policy establishes<br>defined roles (BU ESO and Site ESO) that provide advice and support on<br>identifying electrical risks, recommending and reviewing controls<br>(risk assessments and SWIs), ensuring energized electrical work is<br>subject to an approved application process, supporting incident<br>investigations, and monitoring/raising non-implementation of licence<br>conditions/procedures. These mechanisms are functionally directed at<br>managing electrical risks and supporting compliance with WHS<br>obligations, aligning with the provision\u2019s requirement to manage<br>electrical risks.", "", "", "<b>Source ID:</b> 9.4<br><b>Provision ID:</b> 150<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.525<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision imposes a specific duty on the PCBU to ensure certain<br>electrical equipment is regularly inspected and tested by a competent<br>person, and that testing records are kept with specified details until<br>the next test or disposal. The policy text describes BU ESO and Site<br>ESO advisory/oversight duties for electrical work (competency<br>verification, energised electrical work applications, SWIs, risk<br>assessments, incident investigation, and maintaining lists of<br>electrical workers). It does not explicitly require (or assign<br>responsibility for) regular inspection and testing of in-scope plug-in<br>electrical equipment used in harsh/damaging environments, does not<br>specify inspection-before-use for new/unused equipment, and does not<br>require keeping testing records with the mandated fields (tester name,<br>date, outcome, next test date) or allow for tagging as the record.<br>Therefore, while the roles could support compliance generally, the<br>policy as written does not demonstrate coverage of the provision\u2019s<br>inspection/testing and recordkeeping obligations.<br><br><b>Remediation:</b> Amend the electrical safety procedure/role duties (or add a linked<br>procedure) to explicitly require: (1) identification of in-scope plug-<br>in electrical equipment used in damaging environments; (2) a schedule<br>for regular inspection and testing by a competent person; (3) pre-use<br>inspection for obvious damage for new/unused equipment; (4) retention<br>of testing records until next test or disposal; and (5) record content<br>requirements (tester name, test date, outcome, next test due date) and<br>acceptable formats (e.g., equipment tag plus central register). Assign<br>clear accountability (e.g., site management/asset owner) and define<br>ESO oversight/verification responsibilities for ensuring the program<br>and records are implemented.", "", "", "<b>Source ID:</b> 9.4<br><b>Provision ID:</b> 155<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.548<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision imposes a specific operational duty on the PCBU to<br>ensure (1) electrical equipment is tested by a competent person before<br>electrical work to determine whether it is energised, and (2) exposed<br>parts are treated as energised until isolated and proven de-energised,<br>and high-voltage exposed parts are earthed after de-energising. The<br>policy text describes BU ESO and Site ESO advisory/oversight duties<br>(e.g., advising managers, endorsing competency forms, ensuring<br>energised work applications are approved, reviewing risk<br>assessments/SWIs, and notifying managers of non-implementation).<br>However, it does not explicitly require or ensure pre-work testing for<br>de-energisation, does not state the 'treat as energised until isolated<br>and determined not energised' rule, and does not address earthing of<br>high-voltage exposed parts after de-energising. Because these specific<br>controls are not clearly mandated or assigned as enforceable<br>requirements within the policy duties, the policy does not<br>demonstrably fulfill the provision\u2019s requirements.<br><br><b>Remediation:</b> Amend the electrical safety procedure/SWIs and ESO duty statements to<br>explicitly require and verify that: (1) before any electrical work,<br>equipment is tested by a competent person to confirm de-energised<br>status (with reference to the applicable testing method requirements);<br>(2) all exposed parts are treated as energised until isolated and<br>proven de-energised; and (3) high-voltage exposed parts are earthed<br>after de-energising. Assign clear responsibility (e.g., line<br>manager/electrical worker/site ESO) for ensuring these steps occur,<br>require documented evidence (permits/checklists), and include periodic<br>audits/verification by Site ESO/BU ESO.", "", "", "<b>Source ID:</b> 9.4<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.555<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision imposes specific preconditions that must be ensured<br>before energised electrical work commences: (1)(a) a risk assessment<br>is conducted; (2) it is conducted by a competent person and recorded;<br>(1)(b) the work area is clear of obstructions for access/exit; (1)(c)<br>the isolation/disconnection point is clearly marked, unobstructed, and<br>operable quickly (subject to the exception in (3)); and (1)(d) the<br>work is authorised after consultation with the person with management<br>or control of the workplace. The POLICY text is functionally related<br>because it assigns BU ESO/Site ESO duties around energised electrical<br>work approvals (applications), reviewing risk assessments/SWIs, and<br>advising on risks/controls. However, it does not explicitly require<br>that (i) a risk assessment be recorded, (ii) the risk assessment be<br>conducted by a competent person, (iii) the work area be cleared of<br>obstructions, (iv) isolation points be labelled/kept clear/quickly<br>operable (or address the exception), or (v) authorisation occur after<br>consultation with the person with management/control of the workplace.<br>Because these specific regulatory preconditions are not clearly<br>captured as mandatory requirements in the POLICY duties, the POLICY<br>does not fully demonstrate coverage of the provision\u2019s obligations.<br><br><b>Remediation:</b> Update the electrical safety procedure / energised work application<br>process referenced in the POLICY (and/or add explicit ESO duties) to<br>require and verify, before energised work starts: (1) a risk<br>assessment is completed, conducted by a competent person, and<br>recorded; (2) the work area is confirmed clear of obstructions for<br>access/egress; (3) the isolation/disconnection point is confirmed<br>labelled/marked, unobstructed, and quickly operable (or document<br>applicability of the supply-side exception); and (4) formal<br>authorisation is granted only after documented consultation with the<br>person with management or control of the workplace. Add checklist<br>fields/evidence requirements in the 'Application to undertake<br>energised electrical work' and require Site ESO/BU ESO (or the<br>authoriser) to confirm these items.", "<b>Source ID:</b> 9.4<br><b>Provision ID:</b> 160<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.504<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision imposes a specific duty during energised electrical<br>work: the PCBU must ensure all persons are prevented from creating an<br>electrical risk by inadvertent contact with exposed energised<br>components. The policy text assigns ESOs duties around ensuring<br>energised work is covered by an approved application, reviewing<br>applications, risk assessments, and SWIs, and advising on controls.<br>However, it does not explicitly require implementing or verifying<br>specific physical/engineering or procedural controls to prevent<br>inadvertent contact (e.g., barriers, insulation, exclusion zones,<br>guarding, lockout/covering of exposed parts, supervision, access<br>control) while energised work is being carried out. It focuses on<br>approvals and reviews rather than an explicit 'ensure prevention'<br>control requirement aligned to the provision.<br><br><b>Remediation:</b> Amend the ESO duties and/or energised work application/SWI<br>requirements to explicitly require controls that prevent inadvertent<br>contact with exposed energised components during energised work (e.g.,<br>mandatory barriers/guards/insulation covers, exclusion zones and<br>access control, signage, dedicated safety observer, PPE requirements,<br>and verification checks). Include a requirement that the approved<br>energised work application and SWI document these controls and that<br>Site/BU ESOs verify their implementation during the work.", "<b>Source ID:</b> 9.4<br><b>Provision ID:</b> 161<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.585<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision imposes specific mandatory requirements on energised<br>electrical work: it must be performed by a competent person with<br>suitable/tested/maintained tools and PPE; in accordance with a safe<br>work method statement (SWMS) meeting detailed content requirements;<br>and with a competent safety observer assessed within the last 12<br>months for rescue/resuscitation (unless the testing-only + risk<br>assessment exception applies). The policy text assigns BU ESO and Site<br>ESO duties to ensure energised electrical work is covered by an<br>approved 'Application to undertake energised electrical work', to<br>review risk assessments and SWIs, and to support competency<br>verification processes. However, it does not explicitly require (or<br>ensure) that energised work is carried out in accordance with a SWMS<br>(as defined in the provision), does not specify the SWMS minimum<br>content elements, does not require a safety observer or the observer\u2019s<br>12-month rescue/resuscitation competency assessment, and does not<br>address ensuring tools/testing equipment/PPE are suitable, properly<br>tested, maintained, and properly used. Therefore, while the policy is<br>related and partially supportive (competency verification, risk/SWI<br>review, approval process), it does not fully cover the provision\u2019s<br>mandatory controls for energised electrical work.<br><br><b>Remediation:</b> Update the electrical safety procedure/energised work application<br>process to explicitly require: (1) energised work only by a competent<br>person using tools/testing equipment/PPE that are suitable, properly<br>tested, and maintained; (2) a SWMS for energised electrical work that<br>includes identification of the work, hazards/risks, control measures,<br>and how controls are implemented/monitored/reviewed; (3) a competent<br>safety observer present for energised work, with documented<br>rescue/resuscitation competency assessment within the previous 12<br>months, and a documented process for applying the testing-only<br>exception based on a regulation 158(1)(a) risk assessment; and (4) ESO<br>verification/oversight checkpoints to confirm these requirements are<br>met before approval and during execution.", "", "", "", "", "<b>Source ID:</b> 9.4<br><b>Provision ID:</b> 166<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.525<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision imposes a duty on the PCBU to ensure, so far as<br>reasonably practicable, that persons/plant/things do not come within<br>an unsafe distance of overhead/underground electric lines, and if that<br>is not reasonably practicable, to ensure a risk assessment is<br>conducted and controls implemented consistent with the assessment and<br>any electricity supply authority requirements. The policy text defines<br>BU ESO and Site ESO advisory/oversight duties for electrical work<br>generally (risk advice, reviewing risk assessments/SWIs for electrical<br>work, incident investigation support, competency verification, and<br>ensuring approved applications for energised electrical work).<br>However, it does not explicitly address working near<br>overhead/underground electric lines, does not set a requirement to<br>maintain safe approach distances, does not specify triggers/controls<br>when safe distance cannot be maintained, and does not require<br>alignment with electricity supply authority requirements for line-<br>related work. While the Site ESO duty to 'review risk assessments and<br>Safe Work Instructions for all electrical work' partially supports the<br>risk assessment/control concept, the specific legal obligation<br>regarding unsafe distances to electric lines is not clearly<br>implemented or assured by the policy as written.<br><br><b>Remediation:</b> Amend the electrical safety procedure/ESO duties (or add a specific<br>section/SWI) to explicitly cover work near overhead and underground<br>electric lines by: (1) requiring identification of<br>overhead/underground electric lines during planning and ensuring<br>exclusion zones/safe approach distances are maintained so far as<br>reasonably practicable; (2) defining when it is 'not reasonably<br>practicable' to maintain safe distance and mandating a documented risk<br>assessment for such work; (3) requiring implementation of controls<br>consistent with the risk assessment (e.g., isolation/de-energisation,<br>spotters, barriers, permits, signage, equipment limits) and<br>verification of effectiveness; (4) requiring consultation and<br>compliance with electricity supply authority requirements where<br>applicable; (5) assigning clear accountability (e.g., line<br>managers/PCBU with ESO verification/review) and recordkeeping/audit<br>requirements.", "", "", "", "", "", "", "", "", ""],
