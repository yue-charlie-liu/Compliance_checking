l work, persons are prevented from creating electrical risk<br>by inadvertent contact with exposed energised components. The policy<br>establishes controls that support this outcome by requiring electrical<br>tools/equipment to be suitable and maintained, removing<br>doubtful/defective insulated tools/equipment from service, and<br>specifying compliant insulating mats/barriers (AS/NZS2978), effective<br>separation from energised parts, and mandatory visual inspection<br>before/after use with removal from service if defects affect<br>performance. These measures functionally address preventing<br>inadvertent contact and associated electrical risk during energised<br>work.", "<b>Source ID:</b> 5.2<br><b>Provision ID:</b> 161<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.562<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY is functionally related to the PROVISION because it<br>addresses suitability, inspection/testing, and maintenance of<br>electrical tools/equipment and insulating barriers/mats used for<br>electrical purposes, which aligns with the PROVISION\u2019s requirement<br>that energised electrical work be carried out by a competent person<br>using tools/testing equipment/PPE that are suitable, properly tested,<br>and maintained. However, the POLICY does not cover several mandatory<br>elements of the PROVISION for energised electrical work: (1) it does<br>not require that energised electrical work be carried out by a<br>competent person; (2) it does not require work to be performed in<br>accordance with a safe work method statement (SWMS) nor specify SWMS<br>content; (3) it does not require a safety observer (or define the<br>exception conditions), nor the observer\u2019s competence and annual<br>rescue/resuscitation assessment; and (4) it does not explicitly<br>require, so far as reasonably practicable, that workers use<br>tools/testing equipment/PPE properly. While the POLICY includes<br>inspection/maintenance expectations (and an AS/NZS standard for<br>insulating mats), it is incomplete against the full set of obligations<br>in the PROVISION.<br><br><b>Remediation:</b> Update the POLICY (or add a linked procedure) for energised electrical<br>work to: (1) require energised electrical work be performed only by a<br>competent person; (2) mandate a SWMS for energised electrical work and<br>include the required SWMS elements (identify work, hazards/risks,<br>controls, and implementation/monitoring/review); (3) require a safety<br>observer for energised electrical work, define observer competence and<br>the requirement for rescue/resuscitation competency assessment within<br>the previous 12 months, and document the limited exception (testing-<br>only plus risk assessment showing no serious risk); and (4) require,<br>so far as reasonably practicable, that workers use tools/testing<br>equipment/PPE properly (with supervision/training/verification as<br>needed).", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 5.2<br><b>Provision ID:</b> 240<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.508<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires the person with management/control of an<br>amusement device or passenger ropeway to ensure maintenance,<br>inspection and (if necessary) testing is carried out by a competent<br>person and in accordance with the designer/manufacturer<br>recommendations or a competent-person-prepared maintenance manual. It<br>also requires that any detailed inspection involving an electrical<br>installation be performed by a qualified person (or assisted by one).<br>The policy addresses electrical tools/equipment and insulating<br>mats/barriers, requiring suitability, regular<br>maintenance/inspection/testing, and removal from service if insulation<br>adequacy is in doubt or defects are found. However, it does not<br>specify that maintenance/inspection/testing for amusement<br>devices/ropeways must be performed by a competent person, does not<br>require adherence to manufacturer/designer recommendations or a formal<br>maintenance manual, and does not address the qualification requirement<br>for inspections involving electrical installations. Therefore, it does<br>not fully meet the provision\u2019s obligations.<br><br><b>Remediation:</b> Update the policy/procedure for amusement devices and passenger<br>ropeways to: (1) mandate maintenance, inspection and testing (as<br>necessary) be performed by a competent person; (2) require work be<br>conducted in accordance with designer/manufacturer recommendations or<br>an approved maintenance manual prepared by a competent person; (3)<br>require that any detailed inspection involving an electrical<br>installation be performed by a qualified electrical inspector or by a<br>competent person assisted by a qualified person; and (4) document<br>competency/qualification verification and retain<br>maintenance/inspection/testing records.", "", "", "", "", "", "", "", "<b>Source ID:</b> 5.3<br><b>Provision ID:</b> 146<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.524<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision defines what constitutes \u201celectrical work\u201d (and<br>exclusions). The policy sets a procedural requirement for electrical<br>workers to notify the Site Electrical Safety Officer (ESO) when<br>conducting electrical work at a site other than their home site, and<br>to provide competency verification/risk assessment/SWI upon request.<br>This is functionally related because the policy is triggered by the<br>same activity category defined in the provision (\u201celectrical work\u201d).<br>However, the policy does not incorporate or reference the provision\u2019s<br>definition/exclusions, so it may be applied to tasks that are not<br>\u201celectrical work\u201d under the provision (e.g., plugging equipment into a<br>socket, replacing a light bulb/fuse, or other excluded activities).<br>This creates a mismatch between the scope of the policy trigger and<br>the legally/technically defined scope of \u201celectrical work,\u201d making the<br>policy not fully aligned with the provision.<br><br><b>Remediation:</b> Amend the policy to explicitly align its trigger with the provision\u2019s<br>definition of \u201celectrical work,\u201d including stating that notification<br>is required when performing \u201celectrical work\u201d as defined in the<br>applicable legislation/standard and clarifying that excluded<br>activities (e.g., plug-and-socket connection, replacing light<br>bulbs/fuses where safely performed by non-experts, non-electrical<br>component work without electrical risk) are not within scope unless<br>otherwise required by site rules. Optionally add examples<br>distinguishing included vs excluded tasks.", "<b>Source ID:</b> 5.3<br><b>Provision ID:</b> 147<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.502<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision imposes a broad duty on the PCBU to manage risks to<br>health and safety associated with electrical risks at the workplace<br>(in accordance with Part 3.1). The policy addresses a narrow<br>administrative control: notifying the Site Electrical Safety Officer<br>when working at a non-home site and providing competency<br>verification/risk assessment/SWI upon request. While this can support<br>risk management, it does not explicitly require or describe managing<br>electrical risks in accordance with Part 3.1 (e.g., hazard<br>identification, risk assessment, implementation of controls,<br>maintenance/testing controls, review of control effectiveness) nor<br>does it clearly assign the duty to the PCBU. Therefore, the policy<br>only partially aligns and is insufficient to demonstrate compliance<br>with the broader regulatory obligation.<br><br><b>Remediation:</b> Expand the policy (or reference a linked procedure) to explicitly<br>require electrical risk management in line with Part 3.1, including:<br>identifying electrical hazards at each site; assessing risks;<br>implementing and documenting controls using the hierarchy of controls<br>(e.g., isolation/LOTO, testing and tagging, RCDs, exclusion zones,<br>permits); ensuring safe design/installation/maintenance/testing<br>processes; defining PCBU responsibilities and oversight; requiring<br>pre-start/site-specific risk assessment and authorization before work;<br>and periodic review/audit of controls and incident reporting.", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 6.1<br><b>Provision ID:</b> 149<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.561<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The policy addresses isolation/lockout-tagout and verification of de-<br>energisation to prevent inadvertent re-energisation during work on de-<br>energised equipment. The provision requires that unsafe electrical<br>equipment be disconnected/isolated and, once isolated, not be<br>reconnected until it is repaired or tested and found safe, or else<br>replaced/permanently removed. While the policy covers<br>disconnection/isolation and preventing re-energisation, it does not<br>state the required conditions for reconnection (repair or test and<br>found safe) nor the alternative requirement to replace or permanently<br>remove unsafe equipment from use. It also does not explicitly scope<br>the requirement to 'unsafe electrical equipment' as defined by<br>reasonable grounds.<br><br><b>Remediation:</b> Amend the policy to explicitly require that any unsafe electrical<br>equipment is isolated/disconnected and must not be reconnected until<br>it has been repaired or tested and confirmed safe, or alternatively<br>replaced or permanently removed from use. Include a clear<br>criterion/process for determining when equipment is considered<br>'unsafe' (e.g., reasonable grounds) and document controls for<br>preventing reconnection until the required conditions are met.", "", "", "<b>Source ID:</b> 6.1<br><b>Provision ID:</b> 154<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.496<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The provision requires the PCBU to ensure electrical work is not<br>carried out while equipment is energised. The policy establishes<br>controls to achieve de-energised work: isolating at the supply source,<br>locking out and tagging to prevent re-energisation, and testing to<br>confirm de-energisation before commencing work. These measures<br>functionally ensure work is performed only when equipment is not<br>energised, aligning with the provision\u2019s requirement.", "<b>Source ID:</b> 6.1<br><b>Provision ID:</b> 155<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.606<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The policy is functionally related because it addresses controls<br>required before working on de-energised electrical equipment<br>(isolation/lockout/tagout and testing). It complies with Provision (1)<br>in substance by requiring testing to confirm equipment is de-energised<br>before commencing work, but it does not explicitly require that the<br>testing be performed by a \"competent person\". It also does not address<br>Provision (2)(a) that exposed parts must be treated as energised until<br>isolated and determined not energised, nor Provision (2)(b) that each<br>high-voltage exposed part is earthed after being de-energised.<br>Therefore, the policy does not fully meet the provision\u2019s<br>requirements.<br><br><b>Remediation:</b> Update the policy to: (1) explicitly require testing to be performed<br>by a competent person (and reference applicable testing procedure<br>requirements); (2) state that all exposed parts must be treated as<br>energised until isolated and proven de-energised; and (3) require that<br>high-voltage exposed parts are earthed after de-energisation,<br>including specifying when/where this applies and the responsible role.", "<b>Source ID:</b> 6.1<br><b>Provision ID:</b> 156<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.578<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The provision requires ensuring de-energised electrical equipment is<br>not inadvertently re-energised during electrical work. The policy<br>directly addresses this obligation by requiring isolation at the<br>supply source, lockout and tagging, use of personal locks and danger<br>tags, and verification testing before commencing work\u2014controls that<br>are designed to prevent inadvertent re-energisation while work is<br>carried out.", "<b>Source ID:</b> 6.1<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.511<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision regulates when electrical work on energised equipment<br>may occur (it must not be carried out unless one of the listed<br>exceptions applies). The policy addresses de-energised work controls<br>(isolation, lockout/tagout, and test-for-dead) but does not state the<br>core prohibition on energised electrical work or the limited<br>circumstances under which energised work is permitted. Because the<br>policy is silent on restricting/authorising energised work to only the<br>provision\u2019s exceptions, it does not demonstrate compliance with the<br>requirement to ensure energised work is not carried out unless the<br>specified conditions are met.<br><br><b>Remediation:</b> Amend the policy to explicitly prohibit electrical work on energised<br>equipment except where one of the permitted conditions applies<br>(health/safety necessity, work requires energisation, required<br>testing, or no reasonable alternative). Include a requirement for<br>documented justification/approval for energised work against these<br>criteria and clarify that any energised testing is only allowed within<br>those permitted circumstances.", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 149<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.490<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires that unsafe electrical equipment is<br>isolated/disconnected and, once isolated, is not reconnected until<br>repaired/tested safe, or is replaced/removed. The policy addresses<br>isolation points having control mechanisms to prevent inadvertent re-<br>energisation (e.g., lockable switches/lockout devices), which supports<br>maintaining isolation, but it does not explicitly require (1) that<br>unsafe equipment must be isolated, nor (2) that it must not be<br>reconnected until repaired/tested safe, or replaced/removed. Therefore<br>the policy only partially addresses the regulatory obligation and is<br>not fully compliant.<br><br><b>Remediation:</b> Amend the policy to explicitly require that when electrical equipment<br>is identified as unsafe it must be immediately disconnected/isolated,<br>and must not be reconnected until it has been repaired or tested and<br>confirmed safe, or else replaced or permanently removed from service.<br>Include clear responsibilities, tagging/lockout steps, and<br>verification/authorization requirements before re-energisation.", "", "", "", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 155<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.495<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY requires isolation points to be fitted with control<br>mechanisms that prevent inadvertent re-energisation (e.g., lockable<br>switches/lockout devices) and that require deliberate action and<br>withstand conditions that could cause isolation failure. The PROVISION<br>requires testing to confirm equipment is not energised before work,<br>treating exposed parts as energised until isolated and proven de-<br>energised, and earthing high-voltage exposed parts after de-<br>energisation. While both address electrical safety around de-<br>energisation/isolation, the PROVISION does not require (or describe)<br>lockable/deliberate-action control mechanisms at isolation points to<br>prevent inadvertent re-energisation. Therefore, the POLICY obligation<br>is not satisfied by the PROVISION text alone.<br><br><b>Remediation:</b> Add/ensure requirements and controls for lockout/tagout or equivalent<br>deliberate-action, lockable isolation mechanisms at isolation points<br>(e.g., lockable isolators, lockout devices for breakers/fuses, hasps),<br>including durability/withstand criteria to prevent isolation failure<br>and inadvertent re-energisation, in addition to the testing and<br>earthing steps.", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 156<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.495<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The provision requires ensuring de-energised electrical equipment is<br>not inadvertently re-energised while electrical work is being carried<br>out. The policy directly addresses this obligation by requiring<br>isolation points to be fitted with control mechanisms that prevent<br>inadvertent re-energisation, require deliberate action to operate, and<br>withstand conditions that could cause isolation failure, with examples<br>such as lockable switches and lockout devices. This is functionally<br>aligned with the provision\u2019s requirement and describes controls that<br>would achieve it.", "", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.509<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY addresses controls at isolation points to prevent<br>inadvertent re-energisation (e.g., lockable switches/lockout devices<br>requiring deliberate action and able to withstand conditions that<br>could cause isolation failure). The PROVISION requires, before<br>energised electrical work commences, that the isolation/disconnection<br>point is clearly marked/labelled, unobstructed for access/egress, and<br>capable of being operated quickly, along with risk assessment,<br>recording, and authorisation/consultation steps. While both concern<br>isolation points for electrical work, the POLICY does not cover<br>several mandatory preconditions in the PROVISION (risk assessment by a<br>competent person and recorded; ensuring the work area is clear;<br>ensuring the isolation point is clearly marked/labelled; ensuring it<br>is capable of being operated quickly; and formal authorisation after<br>consultation). Therefore, the POLICY is not sufficient to demonstrate<br>compliance with the PROVISION.<br><br><b>Remediation:</b> Update the policy/procedure to explicitly require: (1) a competent-<br>person risk assessment before energised electrical work, with the<br>assessment recorded; (2) the work area to be cleared of obstructions<br>to allow easy access/exit; (3) the isolation/disconnection point to be<br>clearly marked/labelled and kept unobstructed for access/exit; (4)<br>confirmation that the isolation/disconnection point can be operated<br>quickly; and (5) formal authorisation of the energised work after<br>consultation with the person with management/control of the workplace.<br>Include the exception conditions where subregulation (1)(c) does not<br>apply.", "", "", "", "", "", "", "", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 190<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.491<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The POLICY requires isolation points to have control mechanisms that<br>prevent inadvertent re-energisation, require deliberate action to<br>operate, and be robust against conditions that could cause isolation<br>failure (e.g., lockable switches/lockout devices). The PROVISION<br>requires operator controls to be located/guarded to prevent<br>unintentional activation and to be able to be locked into the \"off\"<br>position to enable disconnection of all motive power. These<br>requirements are functionally aligned: both address preventing<br>unintended activation/energisation and enabling lockout in the off<br>state. While the POLICY includes additional detail about deliberate<br>action and robustness, the PROVISION\u2019s requirements for guarding<br>against unintentional activation and lockability into off position<br>satisfy the core intent of preventing inadvertent re-energisation via<br>secure isolation/lockout-capable controls.", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 191<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.499<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The texts are functionally related because both address safety<br>controls intended to prevent unintended re-energisation/restart of<br>equipment after a stop/isolation action. The POLICY requires isolation<br>points to have control mechanisms that prevent inadvertent re-<br>energising, require deliberate action to engage/disengage, and<br>withstand conditions that could cause isolation failure (e.g.,<br>lockable switches/lockout devices). The PROVISION requires emergency<br>stop controls (where fitted, and especially where multiple are fitted)<br>to be of the stop-and-lock-off type so the plant cannot be restarted<br>unless the used emergency stop is reset, and that the stop control is<br>prominent/marked/accessible, red, and not adversely affected by<br>electrical/electronic malfunction. While the PROVISION aligns with the<br>POLICY on preventing inadvertent restart and robustness against<br>malfunction, it does not address isolation points or lockout<br>mechanisms at isolation points (e.g., lockable isolators, lockout<br>hasps) and does not explicitly require a deliberate action to<br>engage/disengage an isolation device. Therefore, the PROVISION alone<br>does not fully satisfy the POLICY requirements for isolation points.<br><br><b>Remediation:</b> Add/verify design and procedures for isolation points that include<br>lockable isolation devices or lockout provisions (e.g., built-in<br>lockable isolator switches, lockout for breakers/fuses, safety lockout<br>hasps) requiring deliberate action to operate, and ensure the<br>isolation mechanism is robust against foreseeable conditions that<br>could cause isolation failure. Document these features separately from<br>emergency stop controls.", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 210<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.512<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The POLICY requires isolation points to have control mechanisms that<br>prevent inadvertent re-energisation, require deliberate action to<br>engage/disengage, and be robust (e.g., lockable switches/lockout<br>devices). The PROVISION requires operator controls to be<br>located/guarded to prevent unintentional activation and to be able to<br>be locked into the \"off\" position to enable disconnection of motive<br>power. These requirements are functionally aligned: both aim to<br>prevent unintended energisation/activation and require lockable<br>controls for isolation. While the POLICY additionally mentions<br>robustness/withstanding conditions leading to isolation failure, the<br>PROVISION\u2019s lock-off and prevention of unintentional activation<br>satisfy the core functional intent of preventing inadvertent re-<br>energisation via deliberate, lockable isolation.", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 211<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.507<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The texts are functionally related because both address controls that<br>prevent inadvertent re-energisation/restart of electrical plant<br>through deliberate-action mechanisms and robustness against failure.<br>The PROVISION requires emergency stop controls (where fitted, and<br>especially where multiple are fitted) to be of the \u201cstop and lock-off\u201d<br>type so the plant cannot be restarted until the specific emergency<br>stop is reset, and that the stop control cannot be adversely affected<br>by electrical/electronic malfunction. The POLICY focuses on isolation<br>points needing control mechanisms (e.g., lockable switches/lockout<br>devices) to prevent inadvertent re-energisation and withstand<br>conditions that could cause isolation failure. However, the POLICY<br>does not explicitly require emergency stop controls to be stop-and-<br>lock-off (reset-required) nor does it address<br>prominence/marking/accessibility, red coloration, or immunity to<br>electrical/electronic circuit malfunction. Therefore, the POLICY does<br>not fully satisfy the PROVISION\u2019s specific emergency-stop<br>requirements.<br><br><b>Remediation:</b> Update the policy (or add a specific emergency-stop section) to<br>require: (1) where multiple emergency stops exist, they must be \u201cstop<br>and lock-off\u201d such that restart is impossible until the actuated<br>emergency stop is reset; (2) emergency stop controls are prominent,<br>clearly/durably marked, and immediately accessible to each operator;<br>(3) associated actuators (handle/bar/push button) are red; and (4)<br>emergency stop function is fail-safe/not adversely affected by<br>electrical or electronic circuit malfunction. Ensure procedures and<br>design standards reflect these requirements and verify through<br>inspection/testing.", "", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 222<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.446<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The texts are functionally related because both address preventing<br>hazardous unexpected energisation/start-up of plant and controlling<br>the risk to workers in the immediate vicinity. However, the POLICY<br>focuses on electrical isolation points having control mechanisms to<br>prevent inadvertent re-energisation (e.g., lockable switches/lockout<br>devices requiring deliberate action and robust against failure). The<br>PROVISION requires suitable control measures where plant could start<br>without warning, and specifically requires controlled access to the<br>area via isolating the area and/or interlocked guarding, presence-<br>sensing devices, and permit-to-work systems. The POLICY does not<br>address controlling access to the immediate vicinity, interlocked<br>guards, presence-sensing devices, or permit-to-work systems, and it is<br>limited to electrical isolation mechanisms rather than broader<br>controls for remotely/automatically energised plant. Therefore, the<br>POLICY does not fully meet the PROVISION\u2019s requirements.<br><br><b>Remediation:</b> Expand the POLICY to require, where plant can start without warning,<br>that access to the immediate vicinity is controlled at all times by:<br>(1) isolating the area and/or (2) providing interlocked guards; if<br>residual risk remains, add presence-sensing devices; if risk still<br>remains, implement permit-to-work systems. Also explicitly cover<br>remotely/automatically energised plant (e.g., industrial robots) and<br>prohibit directing/allowing work nearby unless these controls are in<br>place.", "", "", "", "", "<b>Source ID:</b> 7.1<br><b>Provision ID:</b> 40<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.553<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY is functionally related to the PROVISION because it sets<br>requirements for an Activity Risk Assessment and workplace conditions<br>(clear access/egress, unobstructed isolation points) that align with<br>the PROVISION\u2019s duties to ensure safe entry/exit, movement, and<br>adequate space/layout without risk to health and safety. However, the<br>POLICY only addresses obstruction-free access/egress in the electrical<br>work area and access to isolation/disconnection points, plus an<br>authorization/consultation step. It does not address several mandatory<br>workplace-condition elements in the PROVISION, including: (c) safe<br>floors/surfaces; (d) lighting for safe work/movement/evacuation; (e)<br>ventilation; (f) managing extremes of heat/cold; and (g) managing<br>risks when working near essential services (beyond electrical<br>isolation access). Therefore, it does not fully satisfy the<br>PROVISION\u2019s broader workplace layout and environmental condition<br>requirements.<br><br><b>Remediation:</b> Expand the Activity Risk Assessment and associated controls to<br>explicitly cover: (1) workspace adequacy (space to work safely) and<br>safe movement/egress under normal and emergency conditions; (2)<br>floor/surface condition checks (slip/trip, stability, maintenance);<br>(3) lighting adequacy for task performance, movement, and emergency<br>evacuation; (4) ventilation adequacy (including fumes/dust/heat load<br>where relevant); (5) controls for extremes of heat/cold (PPE, breaks,<br>hydration, warming/cooling, monitoring); and (6) risks from working<br>near essential services (identify services, exclusion zones, permits,<br>isolation/lockout where applicable). Document these checks and<br>controls as required steps prior to commencing work.", "", "", "", "", "", "", "<b>Source ID:</b> 7.1<br><b>Provision ID:</b> 149<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.561<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires the PCBU to ensure that unsafe electrical<br>equipment is disconnected/isolated from supply and, once isolated, is<br>not reconnected until repaired/tested safe or is replaced/permanently<br>removed. The policy focuses on pre-work Activity Risk Assessment items<br>(clear access/egress, isolation point labeling/accessibility/quick<br>operation, and authorization/consultation) but does not require that<br>unsafe electrical equipment be disconnected/isolated, nor does it<br>prohibit reconnection until repair/testing, nor require<br>replacement/removal. Therefore it does not satisfy the core control<br>obligations in the provision.<br><br><b>Remediation:</b> Amend the policy to explicitly require that any unsafe electrical<br>equipment be immediately disconnected/isolated from its electricity<br>supply, tagged/secured to prevent reconnection, and not reconnected<br>until repaired or tested and found safe, or alternatively replaced or<br>permanently removed from use. Define criteria/process for determining<br>'unsafe' (reasonable grounds), assign responsibility (PCBU/competent<br>person), and include verification/recordkeeping steps.", "", "", "", "", "", "<b>Source ID:</b> 7.1<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.556<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision prohibits energised electrical work unless one of the<br>listed necessity conditions applies (health/safety necessity, required<br>for proper work, required testing, or no reasonable alternative). The<br>policy text focuses on pre-work Activity Risk Assessment controls<br>(clear access/egress, clearly marked and accessible isolation point,<br>and authorisation after consultation). It does not state the core<br>legal threshold that energised work must not be carried out unless one<br>of the provision\u2019s necessity exceptions applies, nor does it require<br>documenting/justifying that exception. Therefore, while related (both<br>govern conditions around electrical work and isolation/authorisation),<br>the policy does not fully implement the provision\u2019s<br>prohibition/exception test for energised work.<br><br><b>Remediation:</b> Amend the policy/ARA requirements to explicitly: (1) prohibit<br>electrical work on energised equipment by default; (2) require<br>confirmation and documentation that at least one of the provision\u2019s<br>conditions (a)-(d) applies before any energised work proceeds; (3)<br>require consideration and documentation that de-energised work is not<br>reasonably practicable (where relevant); and (4) specify that any<br>energised testing/work permitted under the exceptions is limited to<br>what is necessary and is captured in the authorisation/consultation<br>process.", "", "<b>Source ID:</b> 7.1<br><b>Provision ID:</b> 160<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.547<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY sets pre-work Activity Risk Assessment requirements focused<br>on access/egress, isolation/disconnection point labeling and<br>accessibility, and authorization/consultation. The PROVISION requires<br>that during energised electrical work, the PCBU ensures all persons<br>are prevented from creating electrical risk by inadvertent contact<br>with exposed energised components. The POLICY does not address<br>controls for preventing inadvertent contact with exposed energised<br>parts (e.g., barriers, insulation, exclusion zones, supervision,<br>signage, access control, PPE, or procedures specific to energised<br>work). Therefore it does not fulfill the PROVISION\u2019s obligation.<br><br><b>Remediation:</b> Amend the policy to include specific requirements for energised<br>electrical work that prevent inadvertent contact with exposed<br>energised components, such as: establishing and enforcing exclusion<br>zones and access control; installing insulating<br>barriers/covers/screens; applying lockable physical guards where<br>practicable; using warning signage and spotters where needed;<br>specifying required PPE and insulated tools; ensuring only<br>authorised/competent persons are present; and documenting these<br>controls in the Activity Risk Assessment and work method statement for<br>energised work.", "", "", "", "", "", "<b>Source ID:</b> 7.1<br><b>Provision ID:</b> 166<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.572<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires the PCBU to ensure, so far as reasonably<br>practicable, that no person/plant/thing comes within an unsafe<br>distance of overhead or underground electric lines, and if that is not<br>reasonably practicable, to conduct a risk assessment for the proposed<br>work and implement control measures consistent with the risk<br>assessment and any electricity supply authority requirements. The<br>policy text focuses on activity risk assessment items for electrical<br>work such as keeping the work area and isolation/disconnection point<br>clear, ensuring the isolation point is labelled and operable quickly,<br>and requiring authorization after consultation. It does not address<br>maintaining safe distances from overhead/underground electric lines,<br>does not specify triggers/criteria for when safe distance is not<br>reasonably practicable, and does not require controls consistent with<br>the risk assessment and electricity supply authority requirements.<br>Therefore it does not adequately fulfill the provision\u2019s obligations.<br><br><b>Remediation:</b> Update the Activity Risk Assessment and associated procedure to<br>explicitly: (1) identify overhead and underground electric lines and<br>define/require maintaining prescribed safe approach distances; (2)<br>require a specific risk assessment when safe distances cannot be<br>maintained; (3) mandate implementation of control measures aligned to<br>the risk assessment (e.g., de-energisation, isolation,<br>barriers/exclusion zones, spotters, permits, signage, equipment<br>limits); and (4) require consultation/coordination with the<br>electricity supply authority and compliance with its requirements<br>(including any permits/approvals) where it is responsible for the<br>line.", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 7.2<br><b>Provision ID:</b> 146<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.569<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The texts are functionally related because the POLICY governs when and<br>how electrical workers may undertake energised electrical work, which<br>is a subset of \u201celectrical work\u201d as defined in the PROVISION. A<br>compliance check is necessary to ensure the POLICY aligns with the<br>regulatory scope and exclusions for what constitutes \u201celectrical<br>work.\u201d The POLICY does not define \u201celectrical work\u201d or acknowledge the<br>PROVISION\u2019s explicit exclusions (e.g., plug-and-socket connection,<br>non-electrical component work without electrical risk, replacing<br>fuses/light bulbs where safely performed by non-experts, certain<br>supervised conduit work when wiring is not energised, supervised<br>assistance without contact with energised equipment, and eligibility<br>work other than on energised equipment). Because the POLICY broadly<br>triggers an application process for \u201cenergised electrical work\u201d<br>without clarifying boundaries between regulated electrical work and<br>excluded activities, it risks over-applying the approval requirement<br>to tasks that are not \u201celectrical work\u201d under the PROVISION or are<br>explicitly excluded. This is a misalignment with the regulatory<br>definition/scope and could create unnecessary administrative burden<br>and confusion about when the procedure applies.<br><br><b>Remediation:</b> Amend the POLICY/procedure to (1) incorporate or reference the<br>regulatory definition of \u201celectrical work\u201d and its exclusions; (2)<br>clearly state that the energised electrical work application<br>requirement applies only to tasks that are \u201celectrical work\u201d and<br>involve energised electrical equipment (and are not excluded<br>activities); (3) add decision guidance/examples mapping common tasks<br>to whether they are excluded vs. in-scope; and (4) ensure internal<br>forms and training reflect these scope limits so approvals are not<br>required for excluded activities.", "<b>Source ID:</b> 7.2<br><b>Provision ID:</b> 147<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.558<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The provision imposes a general duty on the PCBU to manage risks to<br>health and safety associated with electrical risks at the workplace<br>(per WHS risk management requirements). The policy establishes a<br>governance and risk-control process specifically for energised<br>electrical work, requiring prior application, management endorsement<br>and senior approval, and requiring evidence of competency/licensing,<br>justification under WHS Regulation exemptions, and documented risk<br>assessments/SWIs. These measures are consistent with managing<br>electrical risks and therefore functionally relate to the provision.<br>While the provision is broader than energised work alone, the policy<br>content provided aligns with and supports compliance for the energised<br>electrical work scenario it covers.", "", "", "", "", "<b>Source ID:</b> 7.2<br><b>Provision ID:</b> 154<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.559<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision imposes a primary duty on the PCBU to ensure electrical<br>work is not carried out while equipment is energised (i.e., energised<br>work is prohibited unless an applicable exception under the Division<br>applies). The policy establishes an approval and visibility process<br>for undertaking energised electrical work and references WHS<br>Regulations s157 exemptions, but it does not explicitly state the<br>overarching requirement that energised electrical work must not be<br>performed and is only permitted where the legal exemption/exception<br>criteria are met and de-energisation is not reasonably practicable (or<br>other applicable exception). By framing energised work as something<br>that can be permitted via internal approval without clearly anchoring<br>it to the legal prohibition and exception threshold, the policy does<br>not fully ensure compliance with the provision\u2019s requirement to<br>prevent energised work.<br><br><b>Remediation:</b> Amend the policy to explicitly state that electrical work must be<br>performed de-energised and that energised electrical work is<br>prohibited except where the WHS legal exception criteria are<br>satisfied. Require documented justification that de-energisation is<br>not reasonably practicable (or other applicable exception), and make<br>approval contingent on verifying those criteria, including controls to<br>ensure energised work does not occur outside approved exceptions.", "<b>Source ID:</b> 7.2<br><b>Provision ID:</b> 155<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.614<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY governs the internal approval process for undertaking<br>energised electrical work (application, endorsements, competency<br>verification, and risk assessment attachments). The PROVISION imposes<br>operational safety duties on the PCBU that must occur before and<br>during electrical work: (1) ensure equipment is tested by a competent<br>person to determine whether it is energised before electrical work is<br>carried out; and (2) ensure exposed parts are treated as energised<br>until isolated and proven de-energised, and that high-voltage exposed<br>parts are earthed after de-energisation. The POLICY references WHS<br>Regulation 157 exemptions and discusses planning for de-energised vs<br>energised work, competency, and risk assessments, but it does not<br>explicitly require pre-work testing to determine energisation status,<br>does not mandate treating exposed parts as energised until isolation<br>and confirmation, and does not require earthing of high-voltage<br>exposed parts after de-energisation. Therefore, it does not fully<br>address the specific controls required by the PROVISION.<br><br><b>Remediation:</b> Update the policy/application requirements to explicitly mandate: (1)<br>testing of electrical equipment by a competent person before<br>electrical work to determine whether it is energised (and reference<br>the required testing method/process, e.g., per Reg 161); (2) a rule<br>that all exposed parts are treated as energised until isolated and<br>confirmed de-energised; and (3) for high-voltage work, earthing of<br>exposed parts after de-energisation. Ensure these items are captured<br>as mandatory checklist fields in the application form and/or SWIs/risk<br>assessments, with evidence/records required.", "", "<b>Source ID:</b> 7.2<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.632<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY establishes an internal approval and documentation process<br>for undertaking energised electrical work and references that the work<br>must be justified and meet the WHS Regulations s157 exemptions. The<br>PROVISION (WHS Regs r157) imposes a substantive legal requirement that<br>energised electrical work must not be carried out unless one of the<br>necessity/no-alternative conditions in (1)(a)-(d) applies. While the<br>POLICY indicates that energised work must be justified and meet the<br>exemptions, it does not explicitly require the application/approval<br>process to confirm and record which specific r157(1) condition applies<br>(a, b, c, or d), nor does it clearly prohibit energised work unless<br>one of those conditions is met. Therefore, the POLICY is only<br>partially aligned and does not fully operationalize the PROVISION\u2019s<br>threshold test as a mandatory gate.<br><br><b>Remediation:</b> Amend the application/approval requirements to explicitly: (1)<br>prohibit nt to manage electrical risks.", "", "", "", "", "", "<b>Source ID:</b> 7.3<br><b>Provision ID:</b> 155<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.680<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires the PCBU to ensure that before electrical work<br>is carried out on electrical equipment, the equipment is tested by a<br>competent person to determine whether it is energised, and that<br>exposed parts are treated as energised until isolated and determined<br>not energised (and high-voltage exposed parts earthed after de-<br>energising). The policy focuses on requirements for performing<br>energised electrical work (competent person, SWI, safety observer with<br>an exception for testing-only work). It does not explicitly require<br>pre-work testing to determine energisation status, does not state that<br>exposed parts must be treated as energised until isolation and<br>confirmation, and does not address earthing of high-voltage exposed<br>parts after de-energising. Therefore, it does not fully meet the<br>provision\u2019s obligations.<br><br><b>Remediation:</b> Amend the policy to explicitly require that, before electrical work on<br>electrical equipment begins, a competent person tests the equipment to<br>determine whether it is energised (with testing performed in<br>accordance with applicable procedures/regs). Add requirements that (1)<br>all exposed parts are treated as energised until isolated and<br>confirmed de-energised, and (2) any high-voltage exposed parts are<br>earthed after being de-energised. Ensure these steps are incorporated<br>into the Safe Work Instruction and training/competency expectations.", "", "", "<b>Source ID:</b> 7.3<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.692<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY governs how energised electrical work must be performed<br>(competent person with suitable tools/PPE, Safe Work Instruction, and<br>generally a competent safety observer unless testing-only with no<br>serious risk). The PROVISION imposes additional pre-commencement<br>duties on the PCBU for energised electrical work: a competent-person<br>risk assessment that is recorded, ensuring the work area and<br>isolation/disconnection point are clear of obstructions and suitably<br>marked/labelled and operable quickly, and formal authorisation after<br>consultation with the person with management/control of the workplace.<br>The POLICY does not explicitly require (1) a risk assessment (nor that<br>it be recorded), (2) clearing obstructions for access/egress, (3)<br>marking/labelling and ensuring accessibility/quick operability of the<br>isolation point, or (4) authorisation after consultation. Therefore,<br>while the POLICY addresses some safety controls, it does not cover<br>several mandatory pre-commencement requirements in the PROVISION and<br>is not compliant as a complete implementation of the provision.<br><br><b>Remediation:</b> Update the POLICY (or add a linked procedure/checklist) to require<br>before energised electrical work starts: (1) a risk assessment<br>conducted by a competent person and recorded; (2) the work area is<br>cleared of obstructions to allow easy access/exit; (3) the<br>isolation/disconnection point is clearly marked/labelled, unobstructed<br>for access/exit, and capable of being operated quickly (including<br>noting the stated exception for supply-side/main switch situations<br>where not reasonably accessible); and (4) formal authorisation of the<br>work after consultation with the person with management/control of the<br>workplace, with records retained.", "<b>Source ID:</b> 7.3<br><b>Provision ID:</b> 160<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.607<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires the PCBU to ensure that, during energised<br>electrical work, all persons are prevented from creating an electrical<br>risk by inadvertently contacting an exposed energised component. The<br>policy focuses on who may perform energised work (competent person<br>with suitable tools/PPE), use of a Safe Work Instruction, and<br>(generally) having a competent safety observer, with an exception for<br>testing where a risk assessment shows no serious risk. However, it<br>does not explicitly require controls to prevent all persons (including<br>bystanders/other workers) from inadvertent contact with exposed<br>energised components (e.g., barriers, exclusion zones,<br>insulation/covering, access control, signage, guarding). The presence<br>of a safety observer and PPE may reduce risk but does not, on its<br>face, ensure prevention of inadvertent contact by all persons as<br>required by the provision.<br><br><b>Remediation:</b> Amend the policy/SWI requirements to explicitly mandate controls that<br>prevent inadvertent contact with exposed energised components by any<br>person during energised work, such as: establishing and enforcing<br>exclusion zones; barricading/guarding and insulating or shrouding<br>exposed live parts; access control/permit-to-work and supervision;<br>warning signage; and verification that these controls are in place<br>before and during the task (including when the safety observer<br>exception applies).", "<b>Source ID:</b> 7.3<br><b>Provision ID:</b> 161<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.840<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY is clearly intended to implement the same obligations as<br>the PROVISION for energised electrical work (competent person with<br>suitable/tested/maintained tools/PPE; documented safe work document;<br>safety observer with specified competence; testing-only exception<br>based on risk assessment). However, it is not fully compliant because:<br>(1) The PROVISION requires the work be carried out in accordance with<br>a \"safe work method statement\" (SWMS) with specific required contents<br>(identify work; specify hazards/risks; describe control measures;<br>describe implementation/monitoring/review). The POLICY instead refers<br>to a \"Safe Work Instruction\" and does not state the mandatory SWMS<br>content requirements. (2) The PROVISION imposes an additional duty to<br>ensure, so far as reasonably practicable, that the worker uses<br>tools/testing equipment/PPE properly; the POLICY does not include this<br>obligation. (3) The testing-only exception in the PROVISION requires<br>that the PCBU has conducted a risk assessment under regulation<br>158(1)(a); the POLICY mentions a risk assessment but does not specify<br>that it must be conducted by/for the PCBU under the referenced<br>regulation (or an equivalent formal requirement), creating a potential<br>gap in accountability and process.<br><br><b>Remediation:</b> Update the POLICY to: (1) require a Safe Work Method Statement (SWMS)<br>for energised electrical work (or explicitly define the Safe Work<br>Instruction as meeting SWMS requirements) and include the minimum SWMS<br>elements: identification of the work, hazards/risks, control measures,<br>and how controls will be implemented/monitored/reviewed; (2) add an<br>explicit requirement that, so far as reasonably practicable, the<br>business ensures workers use tools/testing equipment/PPE properly; (3)<br>tighten the testing-only safety observer exception to require a<br>documented risk assessment conducted by the PCBU (and reference the<br>applicable regulation/process) demonstrating no serious risk.", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 7.4<br><b>Provision ID:</b> 146<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.534<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The texts are functionally related because the POLICY governs controls<br>for \u201cenergised electrical work\u201d and \u201celectrical work,\u201d while the<br>PROVISION defines what constitutes \u201celectrical work\u201d and what is<br>excluded. A compliance check is necessary to ensure the POLICY\u2019s scope<br>and requirements align with the regulatory definition. The POLICY does<br>not define \u201celectrical work\u201d or acknowledge the exclusions listed in<br>the PROVISION (e.g., plug-and-socket connection, non-electrical<br>component work without electrical risk, replacing fuses/light bulbs,<br>certain supervised assistance, etc.). As written, the POLICY could be<br>interpreted to require SWIs for activities that are not \u201celectrical<br>work\u201d under the PROVISION, creating over-application and potential<br>inconsistency in classification and governance. Additionally, the<br>POLICY focuses on SWI requirements for energised electrical work but<br>does not explicitly tie its scope to the regulatory definition of<br>electrical work, which is necessary for clear applicability.<br><br><b>Remediation:</b> Amend the POLICY/SWI framework to explicitly adopt or reference the<br>regulatory definition of \u201celectrical work\u201d and list (or reference) the<br>key exclusions, clarifying when an SWI is required versus when tasks<br>fall outside \u201celectrical work.\u201d Add a scope/applicability section that<br>distinguishes: (1) energised electrical work (always SWI), (2) other<br>electrical work (SWI if high-risk per CSIRO risk procedure), and (3)<br>excluded activities (no SWI unless a separate risk assessment deems it<br>necessary).", "<b>Source ID:</b> 7.4<br><b>Provision ID:</b> 147<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.584<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The provision requires the PCBU to manage risks to health and safety<br>associated with electrical risks at the workplace in accordance with<br>Part 3.1 (general risk management). The policy establishes a<br>structured risk-control mechanism for a subset of electrical risk<br>(energised electrical work) by requiring a Safe Work Instruction (SWI)<br>aligned to CSIRO risk management, including hazard identification,<br>safety requirements/controls, authorisation arrangements, emergency<br>steps, and periodic review when controls change. These elements are<br>consistent with managing electrical risks via identifying hazards,<br>implementing and maintaining controls, and reviewing controls, which<br>aligns with the intent of Part 3.1 risk management duties.", "", "", "", "", "", "<b>Source ID:</b> 7.4<br><b>Provision ID:</b> 155<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.539<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY establishes a requirement to use a Safe Work Instruction<br>(SWI) for energised electrical work and specifies SWI content<br>(authorisations, task description, hazards, safety requirements,<br>emergency steps, and review). The PROVISION imposes specific<br>operational duties before and during electrical work: (1) testing<br>electrical equipment by a competent person to determine whether it is<br>energised before work starts; (2) treating exposed parts as energised<br>until isolated and confirmed de-energised; and (3) earthing each high-<br>voltage exposed part after de-energising. The POLICY does not<br>explicitly require pre-work testing by a competent person, does not<br>state the 'treat as energised until isolated and proven de-energised'<br>rule, and does not require earthing of de-energised high-voltage<br>exposed parts. While these could be implicitly covered under 'hazards'<br>and 'health and safety considerations,' the absence of explicit<br>requirements means the POLICY does not clearly ensure the PROVISION\u2019s<br>obligations are met.<br><br><b>Remediation:</b> Update the SWI requirements (and/or a mandatory SWI template for<br>energised electrical work) to explicitly include: (1) a step requiring<br>testing of the equipment by a competent person before electrical work<br>to determine energisation status (with reference to applicable testing<br>method requirements); (2) a rule that all exposed parts must be<br>treated as energised until isolated and verified de-energised; and (3)<br>for high-voltage work, a step requiring exposed parts to be earthed<br>after de-energising. Ensure SWI review triggers include changes to<br>testing/isolation/earthing controls.", "", "<b>Source ID:</b> 7.4<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.553<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires the PCBU to ensure energised electrical work is<br>not carried out unless one of the listed necessity conditions applies<br>(health and safety necessity, necessity to perform the work properly,<br>testing under reg 155, or no reasonable alternative). The policy<br>focuses on requiring a Safe Work Instruction (SWI) for energised<br>electrical work and specifies SWI content and review requirements, but<br>it does not state or enforce the threshold prohibition/permission<br>criteria for when energised work may be performed (i.e., it does not<br>require de-energisation by default or require documenting/justifying<br>that one of the subregulation (1) conditions is met before<br>proceeding). Therefore, while related, the policy does not fully<br>implement the provision\u2019s core obligation.<br><br><b>Remediation:</b> Amend the policy/SWI requirements to explicitly prohibit energised<br>electrical work unless one of the WHS Reg conditions is satisfied, and<br>require the SWI (or an attached risk assessment/authorisation) to<br>document which condition applies (1)(a)-(d), including justification<br>that there is no reasonable alternative where relevant. Include an<br>approval/authorisation gate that verifies the applicable condition<br>before work starts, and ensure testing is aligned to reg 155 where<br>applicable.", "<b>Source ID:</b> 7.4<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.594<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY is intended to operationalise WHS requirements for<br>energised electrical work via CSIRO Safe Work Instructions (SWIs),<br>which are positioned as the equivalent of SWMS. The PROVISION,<br>however, imposes specific pre-commencement duties on the PCBU for<br>energised electrical work: (1)(a) conduct a risk assessment; (1)(b)<br>ensure the work area is clear of obstructions for access/exit; (1)(c)<br>ensure the isolation/disconnection point is clearly marked,<br>unobstructed, and operable quickly; and (1)(d) authorise the work<br>after consulting with the person with management/control of the<br>workplace. It also requires the risk assessment be conducted by a<br>competent person and recorded (2). The POLICY requires SWIs to<br>describe hazards identified in a risk assessment and<br>approval/authorisation arrangements, and to include safety<br>considerations and emergency steps, plus review/revision requirements.<br>However, it does not explicitly require: clearing obstructions in the<br>work area; marking/labeling and keeping clear the<br>isolation/disconnection point and ensuring it can be operated quickly;<br>consultation with the person with management/control of the workplace<br>prior to authorisation; nor that the risk assessment be conducted by a<br>competent person and recorded. Because these specific preconditions<br>are not clearly mandated in the POLICY, it does not fully cover the<br>PROVISION\u2019s requirements.<br><br><b>Remediation:</b> Update the SWI requirements (and/or associated procedure/checklist)<br>for energised electrical work to explicitly mandate, before work<br>starts: (1) a risk assessment conducted by a competent person and<br>recorded; (2) the work area is cleared of obstructions to allow easy<br>access/exit; (3) the isolation/disconnection point is clearly<br>marked/labelled, unobstructed, and capable of quick operation<br>(including addressing the exception scenario in subregulation (3)<br>where relevant); and (4) formal authorisation occurs only after<br>consultation with the person with management/control of the workplace,<br>with records of the consultation/authorisation retained.", "", "<b>Source ID:</b> 7.4<br><b>Provision ID:</b> 161<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.622<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY is functionally related to the PROVISION because it is<br>intended to implement the WHS requirement that energised electrical<br>work be carried out in accordance with a safe work method statement<br>(SWMS), using CSIRO\u2019s Safe Work Instruction (SWI) as the equivalent.<br>The POLICY is partially aligned with the SWMS content requirements in<br>subregulation (3): it requires describing the work (3(a)), specifying<br>hazards (part of 3(b)), and describing health and safety requirements<br>(partly aligns with 3(c)). It also requires emergency steps, which is<br>additional but not conflicting. However, the POLICY does not<br>explicitly require: (1) that the SWI specify risks associated with the<br>hazards (3(b)); (2) that it describe measures to control the risks<br>(3(c)) in a clear, explicit way; and (3) that it describe how risk<br>controls are implemented, monitored, and reviewed (3(d))\u2014it only<br>states SWIs must be reviewed/revised when controls change, which is<br>not equivalent to documenting implementation/monitoring/review<br>arrangements within the SWI. Additionally, the PROVISION imposes<br>requirements not addressed in the POLICY: work must be carried out by<br>a competent person with suitable/tested/maintained tools/testing<br>equipment/PPE (1)(a) and ensuring proper use (2), and generally<br>requires a safety observer with specified competence and recent<br>rescue/resuscitation assessment (1)(c), (4), with a limited exception<br>(5). The POLICY focuses on SWI content and review but does not<br>incorporate these operational requirements, so it does not fully<br>fulfill the regulatory obligations.<br><br><b>Remediation:</b> Update the POLICY/SWI requirements for energised electrical work to<br>explicitly include: (1) documenting hazards AND the risks associated<br>with those hazards; (2) documenting specific risk control measures;<br>(3) documenting how controls will be implemented, monitored, and<br>reviewed (not just that the SWI is periodically reviewed). Also add<br>explicit requirements that energised electrical work is performed only<br>by competent persons using suitable, tested, and maintained<br>tools/testing equipment/PPE, with processes to ensure proper use.<br>Include the safety observer requirement (and the testing-only/risk-<br>assessed exception) and specify observer competence and 12-month<br>rescue/resuscitation competency assessment.", "<b>Source ID:</b> 7.4<br><b>Provision ID:</b> 162<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.583<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY establishes that energised electrical work (high-risk work)<br>requires a Safe Work Instruction (SWI), which is presented as CSIRO\u2019s<br>equivalent to a Safe Work Method Statement (SWMS). The PROVISION<br>imposes recordkeeping and accessibility obligations for copies of a<br>risk assessment and/or SWMS: retention for specified periods, extended<br>retention after a notifiable incident, ready accessibility to workers,<br>and availability for inspection. The POLICY does not address any of<br>these requirements (how long to keep the SWI/SWMS or risk assessment,<br>ensuring worker access during the retention period, or making it<br>available for inspection). Therefore, while the POLICY is related in<br>subject matter (SWMS/SWI for energised electrical work), it does not<br>fulfill the PROVISION\u2019s recordkeeping/accessibility obligations.<br><br><b>Remediation:</b> Update the POLICY (or an associated procedure) to explicitly require:<br>(1) keeping a copy of the energised electrical work risk assessment<br>for at least 28 days after the work is completed; (2) keeping a copy<br>of the SWMS/SWI until the work is completed; (3) if a notifiable<br>incident occurs, retaining the relevant risk assessment and SWMS/SWI<br>for at least 2 years after the incident; (4) ensuring copies are<br>readily accessible to workers engaged in the electrical work for the<br>required retention period; and (5) ensuring copies are available for<br>inspection under the Act for the required retention period.", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 7.4<br><b>Provision ID:</b> 299<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.639<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY is functionally related to the PROVISION because it<br>establishes CSIRO\u2019s equivalent process (SWI) to meet the WHS<br>requirement for a SWMS for high-risk work (including energised<br>electrical work). However, the PROVISION applies specifically to \u201chigh<br>risk construction work\u201d and requires that, before such work commences,<br>a SWMS is prepared (or already prepared), and that it includes:<br>identification of the high-risk construction work, hazards/risks,<br>control measures, and how controls are implemented, monitored and<br>reviewed; plus preparation considering workplace circumstances and (if<br>applicable) the WHS management plan, and that it is<br>accessible/understandable. The POLICY/SWI requirements cover<br>describing the work, hazards, safety requirements, authorisation,<br>emergencies, and review/revision, but do not explicitly require (1)<br>preparation before commencement, (2) explicit identification that the<br>work is \u201chigh risk construction work\u201d, (3) description of control<br>measures and how they are implemented/monitored/reviewed, (4)<br>consideration of workplac licit stop-work and resume-only-when-compliant<br>requirement when deviations occur. Therefore, it does not fully<br>satisfy the PROVISION\u2019s operational enforcement requirements.<br><br><b>Remediation:</b> Amend the POLICY/SWI framework to explicitly require: (1) documented<br>arrangements to ensure high risk construction work is performed in<br>accordance with the applicable SWMS (or SWI as the equivalent),<br>including supervision/verification and worker<br>briefing/acknowledgement; and (2) a mandatory stop-work process when<br>work is not being performed in accordance with the SWMS/SWI, with<br>clear authority to stop work and a requirement that work only resumes<br>once brought back into compliance with the SWMS/SWI.", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 7.5<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.549<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires the PCBU to ensure energised electrical work is<br>not carried out unless one of the necessity conditions in (1)(a)-(d)<br>is met (including testing under (c)). The policy focuses on requiring<br>a safety observer for energised work (with a limited exception for<br>testing where a risk assessment shows an observer is not required),<br>but it does not state or require that energised work may only proceed<br>when one of the regulatory necessity criteria (health and safety<br>necessity, necessary to perform properly, testing required under reg<br>155, or no reasonable alternative) is satisfied. Because the policy<br>permits energised work subject to observer/risk-assessment controls<br>without explicitly restricting it to the regulation\u2019s allowed<br>circumstances, it does not fully implement the provision\u2019s threshold<br>prohibition/permission structure.<br><br><b>Remediation:</b> Amend the policy to explicitly prohibit energised electrical work<br>unless at least one of the c f quick operation (and document the<br>exception conditions where applicable); and (4) formal authorisation<br>of the energised work after consultation with the person with<br>management/control of the workplace, with records of the<br>authorisation/consultation.", "<b>Source ID:</b> 7.5<br><b>Provision ID:</b> 160<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.528<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision requires the PCBU to ensure that, during energised<br>electrical work, all persons are prevented from creating an electrical<br>risk by inadvertently contacting an exposed energised component. The<br>policy focuses on requiring a competent safety observer (with<br>rescue/CPR competence) during energised work, with an exception for<br>testing where risk is managed. While a safety observer may help<br>respond to incidents, the policy does not explicitly require controls<br>to prevent inadvertent contact (e.g., barriers, insulation, exclusion<br>zones, guarding, access control, supervision of non-workers).<br>Therefore, the policy does not fully address the prevention obligation<br>in the provision.<br><br><b>Remediation:</b> Amend the policy to explicitly require measures that prevent<br>inadvertent contact with exposed energised components during energised<br>work, such as establishing and enforcing exclusion zones, physical<br>barriers/guards, insulating covers/mats, lockable access control,<br>signage, restricting access to authorised persons only, and procedures<br>to ensure bystanders/other workers cannot approach or touch exposed<br>parts. Include a requirement to verify these controls are in place<br>before and throughout energised work.", "<b>Source ID:</b> 7.5<br><b>Provision ID:</b> 161<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.773<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The POLICY is clearly intended to implement the PROVISION\u2019s<br>requirements for energised electrical work, including when a safety<br>observer is required and the observer\u2019s competency/CPR recency. The<br>POLICY aligns with the exemption for testing based on risk assessment<br>and includes the 12\u2011month rescue/resuscitation assessment requirement.<br>However, it does not include several mandatory elements in the<br>PROVISION: (1) ensuring the work is carried out by a competent person<br>with suitable, properly tested and maintained tools/testing<br>equipment/PPE; (2) ensuring the work is carried out in accordance with<br>a safe work method statement (SWMS); (3) specifying the required SWMS<br>contents (identify work, hazards/risks, controls,<br>implementation/monitoring/review); and (4) ensuring, so far as<br>reasonably practicable, that the worker uses tools/testing<br>equipment/PPE properly. Because these obligations are absent from the<br>POLICY text, the POLICY is not fully compliant with the PROVISION.<br><br><b>Remediation:</b> Update the POLICY to explicitly require: (1) energised electrical work<br>be performed by a competent person using tools/testing equipment/PPE<br>that are suitable, properly tested, and maintained; (2) the work be<br>conducted in accordance with a SWMS prepared for the work; (3) the<br>SWMS include the required elements (work identification,<br>hazards/risks, control measures, and how controls are<br>implemented/monitored/reviewed); and (4) the PCBU ensure, so far as<br>reasonably practicable, that workers properly use the tools/testing<br>equipment/PPE.", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 7.6<br><b>Provision ID:</b> 147<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.686<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The provision imposes a broad duty on the PCBU to manage risks to<br>health and safety associated with electrical risks at the workplace in<br>accordance with Part 3.1. The policy text refer ed electrical equipment, including tools/test<br>equipment/PPE suitability and maintenance, competency, and use of<br>safety observers\u2014topics directly regulated by the PROVISION.  However,<br>the POLICY does not fully satisfy the PROVISION\u2019s mandatory elements:<br>1) Safe Work Method Statement (SWMS): The PROVISION requires energised<br>electrical work to be carried out in accordance with a SWMS prepared<br>for the work, and specifies minimum SWMS content (identify work,<br>hazards/risks, controls, and how controls are<br>implemented/monitored/reviewed). The POLICY discusses risk assessment<br>and procedures but does not explicitly require a SWMS for energised<br>electrical work nor include the required SWMS content requirements. 2)<br>Safety observer requirement: The PROVISION makes a safety observer<br>mandatory for energised electrical work, except where the work is only<br>testing and a specific risk assessment shows no serious risk. The<br>POLICY states \u201cUse a safety observer, if required by the risk<br>assessment,\u201d which is weaker than the default mandatory requirement<br>and does not clearly reflect the limited exception. 3) Safety observer<br>competence/rescue & resuscitation currency: The PROVISION requires the<br>safety observer to be competent and assessed within the previous 12<br>months as competent to rescue and resuscitate. The POLICY mentions a<br>safety observer may be required but does not specify these<br>competence/assessment requirements. 4) Ensuring proper use of<br>tools/PPE: The POLICY requires ensuring workers have suitable, tested,<br>maintained tools/PPE and provides training/instruction on PPE use, but<br>it does not clearly impose the PCBU duty to ensure (so far as<br>reasonably practicable) that tools/testing equipment/PPE are used<br>properly (beyond PPE training).<br><br><b>Remediation:</b> Amend the POLICY to explicitly require that all energised electrical<br>work is performed in accordance with a SWMS prepared f nsistent with applicable regulatory/industry requirements), and (2)<br>retention of records for all non-daily RCD tests until the RCD is next<br>tested or permanently removed from use. Implement a register/log for<br>RCD test results (device ID/location, date, tester competency,<br>method/results, corrective actions) and assign responsibility to the<br>workplace controller for scheduling and record retention.", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 8.1<br><b>Provision ID:</b> 15<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.541<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The POLICY requires electrical equipment to meet applicable Australian<br>Standards (e.g., AS/NZS 3820) or equivalent international standards<br>recognised in Australia before commissioning, and to inspect/engage an<br>electrician and remediate (return/modify/certify) if unsafe. The<br>PROVISION defines what references to \u201cAS\u201d and \u201cAS/NZS\u201d mean within the<br>Regulations and clarifies that compliance with a Standard is only<br>required where a regulation applies/adopts/incorporates/refers to it.<br>The POLICY\u2019s use of AS/NZS references aligns with the PROVISION\u2019s<br>definitional framework and does not contradict it; it is a stricter<br>internal control that supports meeting any regulatory obligations<br>where Standards are incorporated by regulation.", "", "", "<b>Source ID:</b> 8.1<br><b>Provision ID:</b> 144<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.566<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> The provision defines what constitutes \u201celectrical equipment\u201d (and<br>exclusions) for the purposes of the regulatory Part. The policy<br>governs procurement/commissioning controls for electrical equipment by<br>requiring compliance with applicable Australian Standards (or<br>recognised equivalents), inspection (especially for internationally<br>sourced equipment), and
