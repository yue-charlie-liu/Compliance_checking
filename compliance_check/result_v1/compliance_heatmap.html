    <script>
        const hoverTexts = ["", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 144<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.476<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE describes electrical risks (shock,<br>fire/explosion, toxic gases) associated with electrical equipment and<br>environments. The TARGET defines what counts as \u201celectrical equipment\u201d<br>for the purposes of a regulatory Part, including equipment above<br>extra-low voltage and equipment in fire/explosion-risk atmospheres.<br>Because the SOURCE is safety guidance about hazards arising from<br>electrical equipment and conditions that the TARGET scopes/defines, a<br>compliance alignment check is relevant (the SOURCE content would<br>typically be used to support obligations applying to \u201celectrical<br>equipment\u201d as defined).  STEP 2 (Compliance): The SOURCE does not<br>comply with the TARGET as a definitional provision. The TARGET\u2019s<br>requirement is to define \u201celectrical equipment\u201d with specific<br>inclusions (voltage threshold, hazardous atmosphere location, cathodic<br>protection system reference) and exclusions (certain motor<br>car/motorcycle propulsion-related equipment). The SOURCE provides<br>hazard examples but does not define \u201celectrical equipment,\u201d does not<br>reference extra-low voltage, hazardous atmosphere scoping as a<br>definitional criterion, AS 2832.1:2015 cathodic protection systems, or<br>the vehicle exclusion. Therefore it does not meet the TARGET\u2019s<br>definitional content.<br><br><b>Remediation:</b> Add a definition section for \u201celectrical equipment\u201d that mirrors the<br>TARGET: include the voltage > extra-low voltage criteria, inclusion<br>for equipment in fire/explosion-risk atmospheres, inclusion for active<br>impressed current cathodic protection systems per AS 2832.1:2015, and<br>explicitly state the exclusion for motor car/motorcycle propulsion-<br>related vehicle equipment. Keep the hazard list as supplementary<br>guidance, but separate it from the formal definition.", "", "", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 147<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.556<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The texts are functionally related. The TARGET<br>sets a duty for a PCBU to manage risks to health and safety associated<br>with electrical risks at the workplace (per Part 3.1). The SOURCE<br>describes what electrical risks are and gives examples of common<br>electrical hazards (shock, fire/arcing/explosion, toxic gases), which<br>is information that would support identifying hazards as part of risk<br>management.  STEP 2 (Compliance): The SOURCE does not demonstrate that<br>risks are being managed in accordance with Part 3.1; it only lists<br>potential electrical risks/hazards. It lacks required risk-management<br>elements such as identifying hazards in the specific workplace<br>context, assessing risks (if required), implementing and maintaining<br>control measures, and reviewing controls. Therefore it does not<br>fulfill the TARGET obligation on its own.<br><br><b>Remediation:</b> Add a Part 3.1-aligned risk management process for electrical risks:<br>(1) identify electrical hazards in the workplace (equipment,<br>installations, environments like moisture/dust/explosive atmospheres),<br>(2) assess risks where necessary, (3) implement controls using the<br>hierarchy of control (e.g., de-energise/isolate, lockout-tagout, RCDs,<br>guarding, maintenance/testing, competent persons, procedures/training,<br>PPE), (4) document responsibilities and procedures, and (5) monitor<br>and review control effectiveness (including after incidents/changes).", "", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 150<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.465<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE describes electrical hazards (shock,<br>fire/arcing/explosion, toxic gases) and mentions environmental<br>contributors like moisture and dust. The TARGET sets specific legal<br>duties for a PCBU to manage such electrical risks by requiring regular<br>inspection/testing of certain socket-supplied equipment used in<br>damaging environments (including moisture and dust), plus<br>recordkeeping. Because the SOURCE is about the risks that the TARGET<br>controls through mandated inspection/testing and records, a compliance<br>check is necessary.  STEP 2 (Compliance): The SOURCE does not state<br>any controls or processes required by the TARGET (no requirement that<br>equipment is regularly inspected/tested by a competent person; no<br>mention of applicability to socket-outlet supplied equipment; no<br>exemption/inspection-before-use for new equipment; no prohibition on<br>using unsafe equipment by reference; no testing records, retention<br>period, or required record contents/tagging). Therefore, the SOURCE<br>does not demonstrate compliance with the TARGET obligations.<br><br><b>Remediation:</b> Add and implement procedures requiring: (1) identification of in-scope<br>electrical equipment (socket-outlet supplied and used in environments<br>with moisture/heat/vibration/mechanical damage/corrosives/dust); (2)<br>regular inspection and testing by a competent person at appropriate<br>intervals; (3) pre-use inspection for obvious damage for new/unused<br>equipment; (4) ensuring unsafe equipment is not used; and (5)<br>maintaining testing records until next test or disposal, including<br>tester name, test date, outcome, and next test due date (e.g., via<br>tags).", "", "", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 155<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.484<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE describes electrical risks (shock,<br>fire/explosion, toxic gases) that arise from contact with energised<br>parts and related hazards. The TARGET imposes specific duties before<br>electrical work: test equipment to determine if it is energised, treat<br>exposed parts as energised until isolated and proven de-energised, and<br>earth high-voltage exposed parts after de-energising. These are<br>directly connected because they are controls intended to prevent the<br>shock/arc/fire hazards described in the SOURCE.  STEP 2 (Compliance):<br>The SOURCE is informational and does not state that equipment is<br>tested by a competent person before work, that exposed parts are<br>treated as energised until isolated and proven de-energised, or that<br>high-voltage exposed parts are earthed after de-energising. Therefore,<br>it does not demonstrate compliance with the TARGET requirements.<br><br><b>Remediation:</b> Add explicit procedural requirements consistent with the TARGET: (1)<br>require pre-work testing of electrical equipment by a competent person<br>to confirm whether it is energised (per applicable testing rules), (2)<br>require all exposed parts to be treated as energised until isolated<br>and verified de-energised, and (3) require high-voltage exposed parts<br>to be earthed after de-energising. Document responsibilities,<br>competency criteria, and testing/verification steps.", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 156<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.463<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1: The texts are functionally related because the SOURCE<br>describes electrical hazards (shock, fire/explosion, toxic gases) that<br>can arise from contact with energised equipment, while the TARGET<br>imposes a specific duty to prevent inadvertent re-energisation of de-<br>energised electrical equipment during electrical work\u2014an important<br>control to prevent electric shock and related incidents.  STEP 2: The<br>SOURCE does not address the TARGET obligation. It provides a general<br>description of risks but does not state any requirement or control to<br>ensure de-energised equipment is not inadvertently re-energised (e.g.,<br>lockout/tagout, isolation, verification, signage, access control).<br>Therefore, it does not demonstrate compliance with the TARGET duty.<br><br><b>Remediation:</b> Add explicit controls/procedures requiring isolation and prevention of<br>inadvertent re-energisation during electrical work (e.g.,<br>lockout/tagout, physical isolation, tagging, verification of de-<br>energisation, control of keys/switchgear access, and clear<br>responsibilities and checks before re-energising).", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.460<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The texts are functionally related. The SOURCE<br>describes electrical risks (shock, fire/explosion, toxic gases) that<br>arise from contact with electricity, including scenarios involving<br>energised equipment. The TARGET sets a legal/operational obligation on<br>a business to ensure electrical work on energised equipment is not<br>carried out unless specific necessity conditions apply. Risk<br>identification in the SOURCE is relevant to deciding whether energised<br>work should be avoided and controlled under the TARGET.  STEP 2<br>(Compliance): The SOURCE does not demonstrate compliance with the<br>TARGET obligation. It provides general hazard information but does not<br>state any requirement to prohibit energised electrical work except<br>under the listed exceptions, nor does it document decision criteria<br>(necessity/no reasonable alternative), authorization, or controls for<br>energised work. Therefore, it cannot be considered compliant with the<br>TARGET requirement.<br><br><b>Remediation:</b> Update the SOURCE content (or associated procedure) to explicitly<br>require that electrical work on energised equipment must not be<br>performed unless one of the permitted conditions applies<br>(health/safety necessity, work requires energisation, required<br>testing, or no reasonable alternative). Add a decision/approval<br>process to justify energised work, and include procedural controls for<br>when energised work is permitted (e.g., documented justification,<br>competent persons, isolation where possible, testing provisions).", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.514<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The texts are functionally related. The SOURCE<br>describes key electrical hazards (shock, fire/arcing/explosion, toxic<br>gases). The TARGET sets specific preconditions/controls required<br>before commencing electrical work on energised equipment, including<br>conducting and recording a risk assessment, ensuring clear<br>access/egress, identifying and ensuring access to<br>isolation/disconnection points, and authorisation after consultation.<br>The SOURCE content could be used as input to the TARGET\u2019s required<br>risk assessment, so a compliance check is necessary.  STEP 2<br>(Compliance): The SOURCE does not meet the TARGET requirements. It<br>provides a general hazard description but does not demonstrate that:<br>(a) a risk assessment for the proposed energised work was conducted;<br>(b) the work area and isolation point are clear of obstructions for<br>access/exit; (c) the isolation/disconnection point is clearly<br>marked/labelled, unobstructed, and operable quickly; (d) the work was<br>authorised after consultation with the person with management/control<br>of the workplace; (2) the risk assessment was conducted by a competent<br>person and recorded. Therefore, it is non-compliant with the TARGET<br>obligations as written.<br><br><b>Remediation:</b> Before commencing energised electrical work, complete and document a<br>task-specific risk assessment conducted by a competent person; verify<br>and document that the work area and isolation/disconnection point have<br>unobstructed access/egress; ensure the isolation/disconnection point<br>is clearly labelled/marked and can be operated quickly; obtain and<br>document authorisation after consultation with the workplace<br>management/control person. Maintain records of the assessment and<br>authorisation.", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 160<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.512<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The TARGET sets a specific safety obligation<br>during energized electrical work: prevent persons from inadvertently<br>contacting exposed energized components (i.e., prevent creation of<br>electrical risk via inadvertent contact). The SOURCE discusses<br>electrical risks generally (shock, fire/explosion, toxic gases) and<br>mentions shock from contact with energized parts, which is within the<br>same risk domain. Therefore, a compliance check is necessary.  STEP 2<br>(Compliance): The SOURCE does not state any required controls or<br>measures to ensure persons are prevented from inadvertently making<br>contact with exposed energized components while energized work is<br>carried out. It only describes potential risks. As such, it does not<br>demonstrate fulfillment of the TARGET obligation.<br><br><b>Remediation:</b> Add explicit requirements/controls for energized electrical work to<br>prevent inadvertent contact with exposed energized components (e.g.,<br>isolation where possible, barriers/insulation, exclusion zones,<br>lockout/tagout where applicable, use of insulating PPE and tools,<br>supervision and access control, signage, and procedures for working on<br>or near exposed energized parts).", "", "", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 164<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.456<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The texts are functionally related because both<br>concern electrical risks in workplaces. The TARGET imposes a specific<br>duty to minimise electrical risk in certain higher-risk circumstances<br>by using an appropriate residual current device (RCD), with specific<br>technical requirements and exceptions. The SOURCE discusses general<br>electrical hazards (shock, fire/explosion, toxic gases) but does not<br>describe any controls or measures that would satisfy the TARGET\u2019s<br>specific RCD requirement.  STEP 2 (Compliance): The SOURCE does not<br>demonstrate compliance with the TARGET because it does not state that<br>an RCD is used, does not address the listed triggering circumstances<br>(moisture/dust/heat/vibration/movement/amusement devices), does not<br>specify an RCD trip current (\u226430 mA for socket outlets \u226420 A), and<br>does not indicate whether any exceptions apply (\u226450 VAC, DC, isolating<br>transformer, or isolated generator). Therefore, based on the provided<br>SOURCE text alone, the obligation in the TARGET is not met.<br><br><b>Remediation:</b> Update the procedure/policy to require use of an appropriate RCD to<br>minimise electrical risk when equipment is used in the circumstances<br>listed in (1)(a)-(d). Specify that for socket outlets \u226420 A the RCD<br>must have a tripping current \u226430 mA. Document when exceptions apply<br>(\u226450 VAC, DC supply, isolating transformer, or isolated generator) and<br>how equivalent protection is ensured. Include implementation details<br>(selection, installation, testing/inspection, and recordkeeping) to<br>evidence compliance.", "", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 166<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.492<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): Both texts address electrical hazards in<br>workplaces. The TARGET imposes specific duties on a PCBU to prevent<br>persons/plant/things coming within unsafe distances of<br>overhead/underground electric lines and, if that is not reasonably<br>practicable, to conduct a risk assessment and implement controls<br>consistent with it and any electricity authority requirements. The<br>SOURCE discusses general electrical risks (shock, fire/explosion,<br>toxic gases) but does not address electric line approach distances,<br>risk assessment, or required control measures. Therefore a compliance<br>check is necessary.  STEP 2 (Compliance): The SOURCE does not<br>demonstrate the required controls or processes in the TARGET. It<br>provides hazard awareness only and lacks: (1) an assurance of<br>maintaining safe distances from overhead/underground lines; (2) a<br>statement that a risk assessment will be conducted when safe distance<br>is not reasonably practicable; (3) implementation of controls<br>consistent with the risk assessment; and (4) alignment with<br>electricity supply authority requirements. As written, it does not<br>meet the TARGET obligations.<br><br><b>Remediation:</b> Add explicit requirements/procedures to: (1) identify<br>overhead/underground electric lines and establish/maintain prescribed<br>safe approach distances; (2) where safe distance cannot be ensured,<br>conduct a documented risk assessment for the proposed work; (3)<br>implement and document control measures consistent with the assessment<br>(e.g., exclusion zones, spotters, isolation/de-energisation, barriers,<br>permits, signage, supervision); and (4) consult and comply with any<br>electricity supply authority requirements and applicable electricity<br>safety legislation.", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 2.2<br><b>Provision ID:</b> 145<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.636<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE defines \u201celectrical work\u201d as including<br>activities performed on \u201celectrical equipment\u201d or an \u201celectrical<br>installation.\u201d The TARGET defines what constitutes an \u201celectrical<br>installation\u201d (including what counts as permanently connected).<br>Because the SOURCE relies on the meaning of \u201celectrical installation\u201d<br>to determine the scope of \u201celectrical work,\u201d the texts are<br>functionally related and a compliance/consistency check is necessary.<br>STEP 2 (Compliance): The SOURCE definition of \u201celectrical work\u201d does<br>not conflict with the TARGET definition of \u201celectrical installation,\u201d<br>but it is incomplete for compliance purposes because it does not<br>incorporate or reflect the TARGET\u2019s criteria for what qualifies as an<br>\u201celectrical installation\u201d (e.g., plug-and-socket equipment not being<br>permanently connected, and the clarification about supply authority<br>works not being a consideration for electrical connection). If the<br>SOURCE is intended to be used operationally to classify work as<br>\u201celectrical work,\u201d it should align with and reference the TARGET<br>definition to avoid misclassification (e.g., treating plug-in<br>equipment as part of an electrical installation when it is not<br>permanently connected). Therefore, it is not compliant as a standalone<br>compliance-ready statement against the TARGET\u2019s definitional<br>requirements.<br><br><b>Remediation:</b> Amend the SOURCE guidance/definition usage to explicitly reference and<br>apply the TARGET definition of \u201celectrical installation,\u201d including<br>the exclusions/clarifications (e.g., plug-and-socket connections are<br>not permanently connected), or add a cross-reference stating that<br>\u201celectrical installation\u201d has the meaning given in the relevant<br>regulation section defining it.", "<b>Source ID:</b> 2.2<br><b>Provision ID:</b> 146<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.830<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> STEP 1 (Relevance): The texts are functionally related because both<br>define the term \u201celectrical work\u201d for WHS regulatory purposes. The<br>SOURCE provides the core definition, and the TARGET reproduces that<br>definition and adds explicit exclusions/clarifications.  STEP 2<br>(Compliance): The TARGET\u2019s definition in (1)(a)\u2013(b) matches the SOURCE<br>definition verbatim in substance (connecting/disconnecting supply<br>wiring; installing/removing/adding/testing/replacing/repairing/alterin<br>g/maintaining electrical equipment or an electrical installation). The<br>additional provisions in TARGET (2) list activities that are not<br>considered electrical work; these do not contradict or omit the SOURCE<br>definition and instead narrow/clarify scope. Therefore, the TARGET is<br>compliant with the SOURCE definition.", "<b>Source ID:</b> 2.2<br><b>Provision ID:</b> 147<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.621<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The texts are functionally related. The TARGET<br>imposes a duty on a PCBU to manage health and safety risks associated<br>with electrical risks at the workplace. The SOURCE defines what<br>constitutes \u201celectrical work\u201d (activities involving<br>connecting/disconnecting supply wiring and<br>installing/testing/maintaining electrical equipment/installations).<br>This definition helps determine the scope of activities that may give<br>rise to electrical risks that must be managed under the TARGET, so a<br>compliance check is necessary.  STEP 2 (Compliance): The SOURCE does<br>not address the TARGET obligation to manage risks in accordance with<br>Part 3.1. It only provides a definition of \u201celectrical work\u201d and<br>contains no requirements or controls for risk management (e.g., hazard<br>identification, risk assessment, implementation of controls,<br>maintenance/testing regimes, or review). Therefore ising is not<br>reasonably practicable where relevant. Add an approver checklist that<br>must confirm the applicable condition(s) are met before approval, and<br>ensure the risk assessment/SWI specifically addresses why energised<br>work is necessary and what alternatives were considered.", "<b>Source ID:</b> 7.2<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.648<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE describes an internal<br>approval/application process for undertaking energised electrical<br>work, including risk assessments, competency verification, and<br>management visibility/approval. The TARGET sets WHS regulatory<br>prerequisites that a PCBU must ensure before energised electrical work<br>commences (risk assessment by a competent person and recorded, site<br>access/egress clear, isolation/disconnection point<br>labelled/accessible/quick to operate, and authorisation after<br>consultation with the person with management/control of the<br>workplace). The SOURCE is therefore functionally related as a<br>mechanism intended to help meet these regulatory prerequisites.  STEP<br>2 (Compliance): The SOURCE partially aligns but does not fully<br>demonstrate compliance with the TARGET requirements. It requires risk<br>assessments/SWIs to be completed and attached, and focuses on<br>competency and senior management approval, which supports TARGET<br>(1)(a) and (2) (risk assessment conducted by a competent person and<br>recorded) and partially supports authorisation. However, the SOURCE<br>does not explicitly require ensuring (before work commences) that: (b)<br>the work area is clear of obstructions for easy access/exit; (c) the<br>isolation/disconnection point is clearly marked/labelled, unobstructed<br>for access/exit, and capable of being operated quickly; and (d)<br>authorisation occurs after consulting with the person with management<br>or control of the workplac ent persons and risk assessments/SWIs are in place.<br>However, it does not explicitly require or specify controls to prevent<br>inadvertent contact with exposed energised components while the work<br>is being performed (e.g., barriers/insulation, exclusion zones,<br>guarding, lockable covers, spotters, access control, signage, or other<br>measures). While risk assessments and SWIs could include such<br>controls, the SOURCE text does not state this requirement or ensure it<br>is implemented. Therefore, based on the text provided, it does not<br>demonstrably meet the TARGET duty.<br><br><b>Remediation:</b> Amend the application procedure/form and associated SWI/risk<br>assessment requirements to explicitly require controls that prevent<br>inadvertent contact with exposed energised components during energised<br>work (e.g., physical barriers/guards/insulating covers, exclusion<br>zones and access control, signage, supervision/spotter where needed,<br>and verification that exposed live parts are shielded). Include a<br>mandatory checklist/approval criterion confirming these controls are<br>in place before and during energised work.", "<b>Source ID:</b> 7.2<br><b>Provision ID:</b> 161<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.634<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE describes an internal<br>approval/application process for undertaking energised electrical<br>work, including ensuring competency, justification under WHS<br>exemptions, and attaching risk assessments/SWIs. The TARGET sets<br>specific WHS regulatory duties for a PCBU when energised electrical<br>work is carried out (competent person with suitable/tested/maintained<br>tools/PPE, SWMS content requirements, safety observer requirements and<br>exceptions, and ensuring proper use of equipment). The SOURCE is<br>therefore functionally related as a control intended to<br>manage/authorize energised electrical work that must meet the T ement that energised testing/fault-finding must<br>not proceed unless one of the permitted conditions in the regulation<br>is satisfied (health/safety necessity, necessary to perform the work<br>properly, required testing under reg 155, or no reasonable<br>alternative), supported by a documented risk assessment/justification<br>and authorisation before commencing energised work.", "<b>Source ID:</b> 7.7<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.609<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): Both texts address prerequisites and controls for<br>performing electrical work in an energised environment. The SOURCE<br>provides procedural guidance for testing/fault-finding when energised<br>(barriers, authorised access, instrument checks, PPE, safety observer,<br>coordination). The TARGET imposes specific preconditions that a PCBU<br>must ensure before energised electrical work commences (risk<br>assessment, clear access/egress, isolation/disconnection point<br>marked/accessible/quick to operate, and formal authorisation after<br>consultation). Therefore a compliance check is necessary.  STEP 2<br>(Compliance): The SOURCE partially aligns with the TARGET but does not<br>fully satisfy it. It implies risk assessment (e.g., safety observer<br>\u201cif required by the risk assessment\u201d) but does not explicitly require<br>that a risk assessment be conducted before work, nor that it be<br>conducted by a competent person and recorded (TARGET (1)(a), (2)). It<br>includes ensuring only authorised persons enter the immediate area,<br>but does not require PCBU authorisation of the work after consulting<br>with the person with management/control of the workplace (TARGET<br>(1)(d)). It discusses barriers and coordination procedures but does<br>not require the work area to be clear of obstructions for easy<br>access/exit (TARGET (1)(b)). It also does not address<br>marking/labelling and accessibility/quick operability of the<br>isolation/disconnection point (TARGET (1)(c)), nor the exception<br>conditions in (3). Because multiple mandatory preconditions in the<br>TARGET are missing or not explicit, the SOURCE is not compliant as a<br>complete implementation of the TARGET requirements.<br><br><b>Remediation:</b> Update the SOURCE procedure to explicitly require, before energised<br>testing/fault-finding begins: (1) a documented risk assessment<br>conducted by a competent person; (2) verification that the work area<br>and access/egress routes are clear of obstructions; (3) identification<br>of the isolation/disconnection point, ensuring it is clearly<br>marked/labelled, unobstructed, and can be operated quickly (or<br>document applicability of the supply-side exception); and (4) formal<br>authorisation by the PCBU after consultation with the person with<br>management/control of the workplace.", "<b>Source ID:</b> 7.7<br><b>Provision ID:</b> 160<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.564<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> STEP 1 (Relevance): The TARGET imposes a duty on the PCBU to prevent<br>persons from creating electrical risk by inadvertent contact with<br>exposed energised components during energised electrical work. The<br>SOURCE addresses testing/fault-finding in energised environments and<br>includes controls specifically aimed at preventing inadvertent contact<br>(e.g., identifying exposed conductive parts that could become<br>energised, installing temporary/fixed barriers, restricting access to<br>authorised persons). Therefore, the texts are functionally related and<br>a compliance check is necessary.  STEP 2 (Compliance): The SOURCE<br>describes measures that satisfy the TARGET\u2019s requirement to prevent<br>inadvertent contact with exposed energised components: (1)<br>identification of exposed conductive parts that could become<br>energised, (2) installation of barriers to prevent inadvertent<br>contact, and (3) ensuring only authorised persons enter the immediate<br>area. These controls directly align with the TARGET obligation to<br>prevent persons from creating electrical risk via inadvertent contact.<br>While the SOURCE is broader (tools/PPE/training/coordination), it<br>includes the key prevention mechanisms required by the TARGET. Hence<br>it is compliant.", "<b>Source ID:</b> 7.7<br><b>Provision ID:</b> 161<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.637<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE provides guidance and requirements for<br>conducting testing and fault-finding, including energised electrical<br>work, covering tools/test instruments/PPE suitability and maintenance,<br>competency/training, use of safety observers based on risk assessment,<br>and safe conduct of work. The TARGET is a legal duty on a PCBU to<br>ensure energised electrical work is carried out by a competent person<br>with suitable/tested/maintained tools/testing equipment/PPE, in<br>accordance with a safe work method statement (SWMS), and (subject to<br>an exception) with a safety observer meeting specified<br>competence/rescue/resuscitation requirements. Therefore, the SOURCE is<br>functionally related to the TARGET and can be checked for coverage of<br>those obligations.  STEP 2 (Compliance): The SOURCE aligns with parts<br>of the TARGET: it requires suitable, tested and maintained<br>tools/testing equipment/PPE; requires workers to be appropriately<br>trained and competent; requires PPE selection/maintenance and<br>training; and mentions using a safety observer if required by risk<br>assessment. However, it does not require that energised electrical<br>work be carried out \"in accordance with a safe work method statement\"<br>nor does it specify the SWMS content requirements (identify work,<br>hazards/risks, controls, implementation/monitoring/review). It also<br>does not include the TARGE e/calibrated instruments, PPE, procedures), which would apply<br>to conducting RCD testing, but it does not explicitly address the<br>TARGET\u2019s specific RCD testing frequency/regularity requirement or the<br>recordkeeping requirement.  STEP 2 (Compliance): The SOURCE does not<br>state that RCDs must be tested regularly, does not specify that such<br>testing must be performed by a competent person in the context of RCDs<br>(though it discusses competency generally), and does not require<br>keeping records of RCD testing until the next test or removal from<br>use. Therefore, it does not demonstrate compliance with TARGET clauses<br>(1) and (2).<br><br><b>Remediation:</b> Add explicit workplace procedures requiring: (1) RCDs to be tested at<br>defined regular intervals by a competent person (aligned to applicable<br>regulatory/standard intervals), and (2) retention of records for each<br>non-daily RCD test until the device is next tested or permanently<br>removed from use. Implement a recordkeeping system (logbook/register<br>or digital CMMS) capturing device ID/location, test date, tester<br>competency/identity, results, and corrective actions.", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 8.1<br><b>Provision ID:</b> 147<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.499<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The TARGET sets a general duty for a PCBU to<br>manage risks to health and safety from electrical risks at the<br>workplace (Part 3.1). The SOURCE provides specific controls for one<br>aspect of managing electrical risk\u2014procurement/commissioning of<br>electrical equipment (ensuring compliance with Australian Standards,<br>inspection, electrician verification, and returning/modifying unsafe<br>equipment). Therefore, the SOURCE is functionally related as a partial<br>method to meet the TARGET obligation.  STEP 2 (Compliance): The SOURCE<br>addresses only a subset of ipment<br>used in harsh/damaging environments and implement a schedule for<br>regular inspection and testing by a competent person; (2) inspect<br>new/unused equipment for obvious damage before first use; (3) maintain<br>testing records until the next test or until the equipment is<br>removed/disposed; and (4) ensure tags/records include tester name,<br>test date, outcome, and next due test date.", "", "", "<b>Source ID:</b> 8.2<br><b>Provision ID:</b> 155<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.641<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> Both texts concern safety controls around electrical work on<br>electrical equipment and the role of a competent person. The TARGET<br>requires that, before electrical work is carried out, the equipment is<br>tested by a competent person to determine whether it is energised, and<br>that exposed parts are treated as energised until isolated and proven<br>de-energised (and high-voltage exposed parts earthed after de-<br>energising). The SOURCE instead focuses on who may perform<br>modifications/repairs (competent person) and requires<br>testing/tagging/certification after completion, prior to<br>commissioning. It does not require pre-work testing to confirm de-<br>energised status, nor does it include the exposed-parts treated-as-<br>energised and HV earthing requirements. Therefore it does not meet the<br>TARGET obligations.<br><br><b>Remediation:</b> Update the procedure to require that before any electrical work on<br>equipment begins, a competent person tests the equipment to determine<br>whether it is energised, and mandate that exposed parts are treated as<br>energised until isolated and confirmed de-energised; for high-voltage<br>exposed parts, require earthing after de-energising. Keep the post-<br>work test/tag/certification requirement as an additional control.", "", "<b>Source ID:</b> 8.2<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes< <br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.588<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): Both texts concern controls around electrical work<br>and who may perform it. The SOURCE sets requirements for<br>modifications/repairs (competent person; post-work electrical<br>testing/tagging/certification). The TARGET sets mandatory<br>preconditions before electrical work on energised electrical equipment<br>commences (risk assessment by a competent person and recorded; site<br>access/egress; isolation point marking/access/quick operation;<br>authorisation after consultation). Therefore, they are functionally<br>related and a compliance check is necessary.  STEP 2 (Compliance): The<br>SOURCE partially aligns with the TARGET only on the concept of a<br>'competent person'. However, it does not address the TARGET\u2019s required<br>pre-work controls for energised electrical work: (1)(a) conducting a<br>risk assessment; (2) recording the risk assessment; (1)(b) clearing<br>obstructions for access/exit; (1)(c) marking/clearing/ensuring<br>operability of isolation/disconnection points; and (1)(d)<br>authorisation after consultation with workplace management/control.<br>Because these obligations are not covered in the SOURCE, it is not<br>compliant with the TARGET requirements for energised electrical work<br>commencement.<br><br><b>Remediation:</b> Update the SOURCE procedure to include, before commencing energised<br>electrical work: (1) a recorded risk assessment conducted by a<br>competent person; (2) ensuring the work area is clear for safe<br>access/exit; (3) ensuring the isolation/disconnection point is clearly<br>marked, unobstructed, and can be operated quickly (or document<br>applicability of any exception); and (4) formal authorisation of the<br>work after consultation with the person with management/control of the<br>workplace.", "", "<b>Source ID:</b> 8.2<br><b>Provision ID:</b> 161<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.617<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): Both texts address who may perform electrical work<br>and conditions for doing so. The SOURCE sets requirements for<br>modifications/repairs to electrical equipment (competent person;<br>test/tag/certify before commissioning). The TARGET imposes specific<br>duties on a PCBU for electrical work on energised electrical equipment<br>(competent person with suitable/tested/maintained tools/PPE, SWMS, and<br>generally a safety observer). Therefore, they are functionally related<br>and a compliance check is necessary where the SOURCE activity involves<br>energised electrical equipment.  STEP 2 (Compliance): The SOURCE<br>partially aligns with TARGET by requiring work be done by a competent<br>person. However, it does not address several mandatory TARGET elements<br>for energised electrical work: (a) ensuring tools/testing<br>equipment/PPE are suitable, properly tested, and maintained; (b)<br>performing the work in accordance with a safe work method statement<br>meeting specified content; (c) having a qualified safety observer<br>present unless an exception applies; and (d) ensuring, so far as<br>reasonably practicable, that the worker uses the tools/PPE properly.<br>The SOURCE\u2019s post-work testing/tagging/certification is not a<br>substitute for these energised-work controls. As written, the SOURCE<br>does not demonstrate compliance with the TARGET requirements.<br><br><b>Remediation:</b> Update the procedure to explicitly cover energised electrical work<br>requirements: require a SWMS that meets the regulation content;<br>mandate a safety observer with required competence/rescue-<br>resuscitation assessment (unless testing-only with documented risk<br>assessment showing no serious risk); require verification that<br>tools/testing equipment/PPE are suitable, in-date tested, and<br>maintained; and require supervision/controls to ensure proper use of<br>tools/PPE. Clarify applicability to energised vs de-energised work and<br>include PCBU responsibilities.", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 8.2<br><b>Provision ID:</b> 213<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.543<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): Both texts address obligations around who may<br>perform work on electrical equipment/plant and the need for<br>testing/inspection. The SOURCE sets requirements for<br>modifications/repairs to electrical equipment (competent person;<br>test/tag/certify before commissioning). The TARGET imposes a duty on<br>the person with management/control of plant to ensure<br>maintenance/inspection/testing is carried out by a competent person<br>and done per manufacturer/competent-person recommendations or annually<br>if not practicable. Therefore, a compliance check is necessary.  STEP<br>2 (Compliance): The SOURCE partially aligns with TARGET by requiring<br>modifications/repairs be done by a competent person and requiring<br>testing after completion. However, it does not cover key TARGET<br>requirements: (i) it does not assign the duty to the person with<br>management/control of plant; (ii) it does not require<br>maintenance/inspection/testing to follow manufacturer recommendations<br>(or competent-person recommendations where none exist); and (iii) it<br>does not include the fallback annual inspection requirement where<br>compliance with (a) or (b) is not reasonably practicable. Because<br>these elements are missing, the SOURCE does not fully satisfy the<br>TARGET obligation.<br><br><b>Remediation:</b> Update the SOURCE/control procedure to: (1) explicitly require the<br>person with management or control of the plant to ensure maintenance,<br>inspection and (if necessary) testing are performed; (2) require the<br>work be conducted in accordance with manufacturer recommendations, or<br>if none, recommendations of a competent person; and (3) include an<br>annual inspection requirement where it is not reasonably practicable<br>to follow (1) or (2). Retain the existing competent-person and post-<br>work electrical testing/tagging/certification requirements.", "", "<b>Source ID:</b> 8.2<br><b>Provision ID:</b> 240<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.570<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): Both texts address safety obligations around<br>maintenance/modification of equipment involving electrical components<br>and require work/testing to be performed by competent/qualified<br>persons. The SOURCE appears to describe a procedure intended to meet<br>obligations similar to those in the TARGET<br>(maintenance/inspection/testing by competent persons, with additional<br>qualification requirements for electrical installations).  STEP 2<br>(Compliance): The SOURCE partially aligns with the TARGET by requiring<br>modifications to be carried out by a competent person and requiring<br>electrical testing/tagging/certification before commissioning.<br>However, it does not cover key TARGET requirements: (1) it does not<br>assign responsibility to the person with management or control to<br>ensure maintenance/inspection/testing is carried out; (2) it does not<br>require maintenance/inspection/testing to be in accordance with<br>designer/manufacturer recommendations or a competent-person-prepared<br>maintenance manual; and (3) it does not address the specific<br>requirement that a person conducting a detailed inspection involving<br>an electrical installation must be qualified to inspect electrical<br>installations (or assisted by someone who is). Therefore, the SOURCE<br>is not fully compliant with the TARGET obligations.<br><br><b>Remediation:</b> Update the procedure/policy to: (1) explicitly require the person with<br>management or control to ensure maintenance, inspection and (if<br>necessary) testing is performed; (2) require work to follow<br>designer/manufacturer recommendations or an approved maintenance<br>manual prepared by a competent person; and (3) require that any<br>detailed inspection involving an electrical installation is performed<br>by a qualified electrical installation inspector or by a competent<br>person assisted by such a qualified person, with records evidencing<br>qualifications and inspections.", "", "", "", "", "", "<b>Source ID:</b> 8.3<br><b>Provision ID:</b> 147<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.488<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE provides practical guidance for making<br>electrical equipment safe prior to disposal (e.g., removing cords,<br>managing residual energy, chemicals/radiation, e-waste). The TARGET<br>imposes a general duty on a PCBU to manage risks to health and safety<br>associated with electrical risks at the workplace. Disposal/handling<br>of electrical equipment at a workplace is an activity that can create<br>electrical risks, so the SOURCE is functionally related to fulfilling<br>the TARGET\u2019s risk-management obligation.  STEP 2 (Compliance): The<br>SOURCE aligns with the intent of managing electrical risks by<br>identifying several disposal-related hazards and controls. However, it<br>does not demonstrate compliance with the TARGET requirement to manage<br>risks \u201cin accordance with Part 3.1\u201d (i.e., the formal risk management<br>process). It lacks explicit steps such as hazard identification, risk<br>assessment (as required/appropriate), implementation of controls using<br>the hierarchy of controls, and ongoing review/monitoring. It also does<br>not assign responsibilities, specify procedures/verification (e.g.,<br>isolation, test for dead, lockout/tagout), or reference required<br>processes for electrical work/competency where relevant. Therefore, it<br>is not sufficient on its own to evidence compliance with the TARGET<br>obligation.<br><br><b>Remediation:</b> Augment the SOURCE into a procedure that explicitly follows Part 3.1<br>risk management: (1) identify electrical hazards during<br>decommissioning/disposal (including stored energy, damaged insulation,<br>live parts, batteries/capacitors, contaminated/radiological<br>components); (2) assess risks where required; (3) implement controls<br>per hierarchy (e.g., de-energise/isolate, lockout-tagout, test for<br>dead, discharge capacitors, remove batteries, restrict access,<br>competent persons, PPE); (4) document responsibilities,<br>training/competency, and disposal pathways (e-waste, hazardous waste);<br>and (5) review controls after incidents/changes and periodically.<br>Include records/checklists to demonstrate the process.", "<b>Source ID:</b> 8.3<br><b>Provision ID:</b> 149<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.546<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): Both texts address controls for unsafe electrical<br>equipment. The SOURCE provides guidance on making electrical equipment<br>safe prior to disposal (e.g., cutting/removing cords, managing<br>residual energy), which overlaps with the TARGET\u2019s legal requirement<br>to ensure unsafe electrical equipment is disconnected/isolated and not<br>reconnected until repaired/tested safe, or replaced/permanently<br>removed from use.  STEP 2 (Compliance): The SOURCE does not explicitly<br>require that unsafe electrical equipment be disconnected/isolated from<br>the electricity supply, nor does it state that once disconnected it<br>must not be reconnected until repaired/tested safe, or<br>replaced/permanently removed from use. It focuses on disposal<br>preparation and hazard considerations (chemicals, radiation,<br>capacitors, e-waste) rather than the mandated isolation and<br>reconnection controls. Therefore it does not fully satisfy the TARGET<br>obligation.<br><br><b>Remediation:</b> Amend the SOURCE procedure to explicitly require: (1) identification<br>of unsafe electrical equipment; (2) immediate disconnection or<br>isolation from the electricity supply; (3) controls to prevent<br>reconnection (e.g., lockout/tagout, labeling) until the equipment is<br>repaired or tested and confirmed safe; and (4) if not repaired/tested,<br>replacement or permanent removal from use prior to disposal. Include<br>responsibilities, verification steps, and records.", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 8.4<br><b>Provision ID:</b> 147<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.524<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> STEP 1 (Relevance): The TARGET imposes a general duty on a PCBU to<br>manage risks to health and safety associated with electrical risks,<br>including risks arising from maintenance and testing of electrical<br>equipment. The SOURCE sets out specific controls (inspection,<br>testing/tagging, isolation of defective equipment, and handling of new<br>equipment) that are clearly intended to manage electrical risks at the<br>workplace. Therefore, a compliance check is necessary.  STEP 2<br>(Compliance): The SOURCE describes a risk-control regime consistent<br>with managing electrical risks: (1) requires regular inspection and<br>testing by a competent person for socket-outlet supplied equipment<br>used in damaging environments; (2) requires visual inspection each use<br>and removal from service if defects are suspected; (3) requires<br>scheduled testing/tagging aligned to AS/NZS 3760; and (4) addresses<br>new equipment controls (new-to-service tag, visual check, then testing<br>at next interval). These measures align with the TARGET\u2019s requirement<br>to manage electrical risks associated with maintenance and testing.<br>The TARGET is high-level and does not prescribe specific measures<br>beyond risk management; the SOURCE provides concrete measures that<br>satisfy that intent. No direct contradiction or omission relative to<br>the TARGET is evident.", "<b>Source ID:</b> 8.4<br><b>Provision ID:</b> 149<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.539<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The texts are functionally related. The SOURCE<br>sets out operational controls for identifying unsafe electrical<br>equipment (visual inspections each use; scheduled testing/tagging;<br>isolation/out-of-service when defects are found). The TARGET imposes a<br>legal duty on the PCBU to ensure unsafe electrical equipment is<br>disconnected/isolated and not reconnected until repaired or tested<br>safe, or else replaced/removed.  STEP 2 (Compliance): The SOURCE<br>partially aligns with the TARGET by requiring defective equipment to<br>be isolated/taken out of service until repaired and tested as safe.<br>However, it does not fully meet the TARGET obligation because it does<br>not explicitly require disconnection/isolating from the electricity<br>supply, does not clearly prohibit reconnection until repaired or<br>tested and found safe (it implies this but not as an explicit<br>control), and does not include the alternative compliance pathway of<br>replacement or permanent removal from use. The SOURCE also focuses on<br>equipment supplied via socket outlets and certain damaging<br>environments, whereas the TARGET duty applies to any unsafe electrical<br>equipment at the workplace.<br><br><b>Remediation:</b> Amend the SOURCE procedure to explicitly require that any electrical<br>equipment reasonably believed to be unsafe is disconnected/isolated<br>from the electricity supply immediately; prohibit reconnection until<br>it is repaired or tested and found safe; and include an option/process<br>to replace or permanently remove unsafe equipment from use. Ensure the<br>procedure applies to all unsafe electrical equipment at the workplace<br>(not only socket-outlet supplied equipment in harsh environments).", "<b>Source ID:</b> 8.4<br><b>Provision ID:</b> 150<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.747<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE sets out workplace requirements for<br>inspection/testing of electrical equipment, including conditions<br>triggering testing, visual inspections, and handling of new equipment.<br>The TARGET is a legal-style obligation on a PCBU to ensure regular<br>inspection/testing in specified conditions, plus requirements for<br>inspection of new/unused equipment and mandatory recordkeeping. The<br>SOURCE is clearly intended to operationalize the same obligation, so a<br>compliance check is necessary.  STEP 2 (Compliance): The SOURCE is<br>partially aligned but not fully compliant with the TARGET. It matches<br>the core trigger for inspection/testing (socket outlet supply +<br>harsh/damaging operating conditions) and references competent persons<br>and AS3760 frequency guidance, which supports subregulation (1). It<br>also addresses new equipment not needing testing before first use and<br>recommends inspection for damage, which aligns in substance with<br>subregulation (2)(a)-(b). However, the SOURCE introduces a requirement<br>for a \u201cnew to service\u201d tag before first use; while not prohibited, it<br>does not substitute for the TARGET\u2019s explicit requirements.  Key gaps<br>against the TARGET: 1) Recordkeeping: The TARGET requires keeping a<br>record of any testing until next test or removal/disposal, and<br>specifies mandatory record contents (tester name, test date, outcome,<br>next test date) and allows a tag as the record. The SOURCE discusses<br>testing/tagging generally but does not require keeping records, does<br>not specify retention period, and does not specify the required record<br>fields. 2) Mandatory pre-use inspection for new/unused equipment: The<br>TARGET makes inspection for obvious damage before use mandatory. The<br>SOURCE states it is \u201cadvisable\u201d to conduct a visual inspection, which<br>is weaker than a must/shall requirement. 3) Unsafe equipment not to be<br>used: The SOURCE says damaged/defective equipment must be isolated/out<br>of service until repaired and tested safe, which is consistent with<br>the note concept, but it does not explicitly reference the general<br>prohibition on using unsafe equipment; this is not necessarily a<br>noncompliance by itself, but the recordkeeping and mandatory<br>inspection language gaps are sufficient to render it noncompliant<br>overall.<br><br><b>Remediation:</b> Update the SOURCE policy/procedure to explicitly: (1) require keeping<br>a testing record for each item tested, retained until the next test or<br>until the equipment is removed/disposed; (2) require the record to<br>include tester name, test date, outcome, and next test due date, and<br>clarify that a tag may serve as the record; (3) change guidance for<br>new/unused equipment from \u201cadvisable\u201d to a mandatory requirement to<br>inspect for obvious damage before first use. Optionally add an<br>explicit statement that unsafe electrical equipment must not be used<br>(cross-referencing the applicable internal rule/regulation).", "<b>Source ID:</b> 8.4<br><b>Provision ID:</b> 151<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.558<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE sets out when electrical equipment must<br>be inspected/tested (including scheduled testing/tagging per AS3760)<br>and when it must be removed from service, which is functionally<br>related to the TARGET obligation that equipment required to be tested<br>under regulation 150 must not be used if it has not been tested.  STEP<br>2 (Compliance): The SOURCE does not fully satisfy the TARGET<br>requirement because it does not explicitly state the prohibition on<br>use where testing is required but has not been completed. It also<br>states that brand-new equipment does not have to be tested before<br>first use (only a 'new to service' tag), which could conflict with the<br>TARGET if regulation 150 requires testing before use in certain<br>circumstances. While the SOURCE promotes testing/tagging and isolation<br>when defects are found, it does not clearly ensure that equipment<br>required to be tested is not used until tested.<br><br><b>Remediation:</b> Add an explicit rule: any electrical equipment that is required to be<br>tested under regulation 150 must not be used until it has been tested<br>(and is within its test interval). Clarify how 'new equipment' is<br>handled where regulation 150 applies (i.e., confirm whether any<br>categories require testing before first use despite being new), and<br>require controls to prevent use (e.g., lockout/out-of-service tagging)<br>until testing is completed.", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 8.4<br><b>Provision ID:</b> 165<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.546<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): Both texts address workplace electrical safety<br>inspection/testing obligations performed by a competent person. The<br>SOURCE sets out requirements for inspection, testing and tagging of<br>electrical equipment (including frequency per AS3760) and record-like<br>tagging practices. The TARGET imposes a specific legal duty to<br>regularly test residual current devices (RCDs) and to keep records of<br>RCD testing (other than daily tests) until the next test or removal<br>from use. Because RCDs are a type of electrical safety device used at<br>workplaces and are commonly part of electrical safety testing regimes,<br>the SOURCE could be intended to support compliance with the TARGET, so<br>a compliance check is necessary.  STEP 2 (Compliance): The SOURCE does<br>not explicitly require regular testing of RCDs (it focuses on<br>electrical equipment supplied via socket outlets and testing/tagging<br>of that equipment). It also does not require keeping records of RCD<br>testing as specified in the TARGET (retaining records until next test<br>or removal). Therefore, the SOURCE does not fully satisfy the TARGET<br>obligations.<br><br><b>Remediation:</b> Add explicit procedures requiring: (1) regular testing of all<br>workplace RCDs by a competent person to confirm effective operation<br>(including defining the test method and interval consistent with<br>applicable standards/regulations), and (2) retention of records for<br>each non-daily RCD test until the RCD is next tested or permanently<br>removed from use. Ensure responsibilities, record format/location, and<br>auditability are documented.", "", "", "", "", "", "<b>Source ID:</b> 8.4<br><b>Provision ID:</b> 213<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.564<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE sets out requirements for<br>inspection/testing of workplace electrical equipment (a type of plant)<br>by a competent person, including visual inspections, scheduled<br>testing/tagging, and handling of new equipment. The TARGET imposes a<br>general duty on the person with management/control of plant to ensure<br>maintenance, inspection and (if necessary) testing is carried out by a<br>competent person, and specifies the required basis/frequency<br>(manufacturer recommendations; otherwise competent person<br>recommendations; otherwise annual inspection if not reasonably<br>practicable). Therefore, the SOURCE is functionally related to<br>fulfilling the TARGET obligation and a compliance check is necessary.<br>STEP 2 (Compliance): The SOURCE aligns with the TARGET in requiring<br>inspection/testing by a competent person and describing<br>inspection/testing practices. However, it does not fully satisfy the<br>TARGET\u2019s specific requirements for how the<br>maintenance/inspection/testing schedule is determined: (a) it does not< ate (e.g.,<br>via compliant tags/registry). Ensure ESO competency requirements<br>explicitly cover competence to perform/oversee these<br>inspection/testing and recordkeeping duties.", "", "", "", "", "", "", "", "<b>Source ID:</b> 9.2<br><b>Provision ID:</b> 161<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.588<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> Relevance: The SOURCE sets expectations for<br>training/qualification/licensing for BU or Site ESO roles based on the<br>type of electrical work performed at a site. The TARGET imposes duties<br>on a PCBU to ensure energised electrical work is carried out by a<br>competent person (with suitable/maintained tools/PPE), in accordance<br>with a SWMS, and (generally) with a competent safety observer with<br>current rescue/resuscitation assessment. Both texts concern ensuring<br>competence/qualification for electrical work, so a compliance check is<br>necessary.  Compliance: The SOURCE partially aligns with the TARGET<br>only on the general concept of competency/qualification (e.g.,<br>competency assessment or licence depending on work type). However, it<br>does not address key TARGET requirements for energised electrical<br>work: (1) ensuring the worker has suitable, tested, and maintained<br>tools/testing equipment/PPE; (2) requiring a safe work method<br>statement with specified contents; (3) requiring a safety observer<br>with specified competence and rescue/resuscitation assessment within<br>the last 12 months (or documenting the testing-only/risk-assessment<br>exception); and (4) ensuring, so far as reasonably practicable, proper<br>use of tools/PPE. Therefore, the SOURCE does not fully fulfill the<br>obligations in the TARGET.<br><br><b>Remediation:</b> Update the SOURCE/control framework to explicitly require for<br>energised electrical work: (a) verification of worker competency for<br>the specific energised task (not only ESO role competency), (b)<br>availability and ver ing the competent person has suitable tools/testing equipment/PPE<br>that are properly tested and maintained; (b) work is carried out in<br>accordance with a safe work method statement (SWMS) with specified<br>minimum content; (c) a safety observer with specified competence and<br>rescue/resuscitation assessment within the previous 12 months (unless<br>the testing-only/risk assessment exception applies); and (d) ensuring,<br>so far as reasonably practicable, proper use of tools/PPE. The SOURCE<br>does not explicitly require SWMS (as distinct from SWIs), does not<br>specify SWMS content requirements, does not mention safety observer<br>requirements or the 12-month rescue/resuscitation competency<br>assessment, and does not address ensuring tools/testing equipment/PPE<br>are suitable, tested, maintained, and properly used. Therefore, based<br>on the text provided, the SOURCE is not sufficient to demonstrate<br>compliance with the TARGET.<br><br><b>Remediation:</b> Update BU ESO/Site ESO duties and/or the energised work application<br>process to explicitly require: (1) a SWMS for energised electrical<br>work meeting the regulation\u2019s content requirements (identify work,<br>hazards/risks, controls, and implementation/monitoring/review); (2)<br>verification that tools, testing equipment and PPE are suitable,<br>properly tested, maintained, and used properly (include<br>checks/records); (3) a safety observer for energised work unless the<br>testing-only exception applies, including documented competence and<br>rescue/resuscitation assessment within the last 12 months; and (4)<br>clear assignment of responsibility for confirming these items before<br>approving/authorising energised work.", "", "", "", "", "", "", "", "", "", "", "", ""];

            text: ["", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 144<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.476<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE describes electrical risks (shock,<br>fire/explosion, toxic gases) associated with electrical equipment and<br>environments. The TARGET defines what counts as \u201celectrical equipment\u201d<br>for the purposes of a regulatory Part, including equipment above<br>extra-low voltage and equipment in fire/explosion-risk atmospheres.<br>Because the SOURCE is safety guidance about hazards arising from<br>electrical equipment and conditions that the TARGET scopes/defines, a<br>compliance alignment check is relevant (the SOURCE content would<br>typically be used to support obligations applying to \u201celectrical<br>equipment\u201d as defined).  STEP 2 (Compliance): The SOURCE does not<br>comply with the TARGET as a definitional provision. The TARGET\u2019s<br>requirement is to define \u201celectrical equipment\u201d with specific<br>inclusions (voltage threshold, hazardous atmosphere location, cathodic<br>protection system reference) and exclusions (certain motor<br>car/motorcycle propulsion-related equipment). The SOURCE provides<br>hazard examples but does not define \u201celectrical equipment,\u201d does not<br>reference extra-low voltage, hazardous atmosphere scoping as a<br>definitional criterion, AS 2832.1:2015 cathodic protection systems, or<br>the vehicle exclusion. Therefore it does not meet the TARGET\u2019s<br>definitional content.<br><br><b>Remediation:</b> Add a definition section for \u201celectrical equipment\u201d that mirrors the<br>TARGET: include the voltage > extra-low voltage criteria, inclusion<br>for equipment in fire/explosion-risk atmospheres, inclusion for active<br>impressed current cathodic protection systems per AS 2832.1:2015, and<br>explicitly state the exclusion for motor car/motorcycle propulsion-<br>related vehicle equipment. Keep the hazard list as supplementary<br>guidance, but separate it from the formal definition.", "", "", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 147<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.556<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The texts are functionally related. The TARGET<br>sets a duty for a PCBU to manage risks to health and safety associated<br>with electrical risks at the workplace (per Part 3.1). The SOURCE<br>describes what electrical risks are and gives examples of common<br>electrical hazards (shock, fire/arcing/explosion, toxic gases), which<br>is information that would support identifying hazards as part of risk<br>management.  STEP 2 (Compliance): The SOURCE does not demonstrate that<br>risks are being managed in accordance with Part 3.1; it only lists<br>potential electrical risks/hazards. It lacks required risk-management<br>elements such as identifying hazards in the specific workplace<br>context, assessing risks (if required), implementing and maintaining<br>control measures, and reviewing controls. Therefore it does not<br>fulfill the TARGET obligation on its own.<br><br><b>Remediation:</b> Add a Part 3.1-aligned risk management process for electrical risks:<br>(1) identify electrical hazards in the workplace (equipment,<br>installations, environments like moisture/dust/explosive atmospheres),<br>(2) assess risks where necessary, (3) implement controls using the<br>hierarchy of control (e.g., de-energise/isolate, lockout-tagout, RCDs,<br>guarding, maintenance/testing, competent persons, procedures/training,<br>PPE), (4) document responsibilities and procedures, and (5) monitor<br>and review control effectiveness (including after incidents/changes).", "", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 150<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.465<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE describes electrical hazards (shock,<br>fire/arcing/explosion, toxic gases) and mentions environmental<br>contributors like moisture and dust. The TARGET sets specific legal<br>duties for a PCBU to manage such electrical risks by requiring regular<br>inspection/testing of certain socket-supplied equipment used in<br>damaging environments (including moisture and dust), plus<br>recordkeeping. Because the SOURCE is about the risks that the TARGET<br>controls through mandated inspection/testing and records, a compliance<br>check is necessary.  STEP 2 (Compliance): The SOURCE does not state<br>any controls or processes required by the TARGET (no requirement that<br>equipment is regularly inspected/tested by a competent person; no<br>mention of applicability to socket-outlet supplied equipment; no<br>exemption/inspection-before-use for new equipment; no prohibition on<br>using unsafe equipment by reference; no testing records, retention<br>period, or required record contents/tagging). Therefore, the SOURCE<br>does not demonstrate compliance with the TARGET obligations.<br><br><b>Remediation:</b> Add and implement procedures requiring: (1) identification of in-scope<br>electrical equipment (socket-outlet supplied and used in environments<br>with moisture/heat/vibration/mechanical damage/corrosives/dust); (2)<br>regular inspection and testing by a competent person at appropriate<br>intervals; (3) pre-use inspection for obvious damage for new/unused<br>equipment; (4) ensuring unsafe equipment is not used; and (5)<br>maintaining testing records until next test or disposal, including<br>tester name, test date, outcome, and next test due date (e.g., via<br>tags).", "", "", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 155<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.484<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE describes electrical risks (shock,<br>fire/explosion, toxic gases) that arise from contact with energised<br>parts and related hazards. The TARGET imposes specific duties before<br>electrical work: test equipment to determine if it is energised, treat<br>exposed parts as energised until isolated and proven de-energised, and<br>earth high-voltage exposed parts after de-energising. These are<br>directly connected because they are controls intended to prevent the<br>shock/arc/fire hazards described in the SOURCE.  STEP 2 (Compliance):<br>The SOURCE is informational and does not state that equipment is<br>tested by a competent person before work, that exposed parts are<br>treated as energised until isolated and proven de-energised, or that<br>high-voltage exposed parts are earthed after de-energising. Therefore,<br>it does not demonstrate compliance with the TARGET requirements.<br><br><b>Remediation:</b> Add explicit procedural requirements consistent with the TARGET: (1)<br>require pre-work testing of electrical equipment by a competent person<br>to confirm whether it is energised (per applicable testing rules), (2)<br>require all exposed parts to be treated as energised until isolated<br>and verified de-energised, and (3) require high-voltage exposed parts<br>to be earthed after de-energising. Document responsibilities,<br>competency criteria, and testing/verification steps.", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 156<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.463<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1: The texts are functionally related because the SOURCE<br>describes electrical hazards (shock, fire/explosion, toxic gases) that<br>can arise from contact with energised equipment, while the TARGET<br>imposes a specific duty to prevent inadvertent re-energisation of de-<br>energised electrical equipment during electrical work\u2014an important<br>control to prevent electric shock and related incidents.  STEP 2: The<br>SOURCE does not address the TARGET obligation. It provides a general<br>description of risks but does not state any requirement or control to<br>ensure de-energised equipment is not inadvertently re-energised (e.g.,<br>lockout/tagout, isolation, verification, signage, access control).<br>Therefore, it does not demonstrate compliance with the TARGET duty.<br><br><b>Remediation:</b> Add explicit controls/procedures requiring isolation and prevention of<br>inadvertent re-energisation during electrical work (e.g.,<br>lockout/tagout, physical isolation, tagging, verification of de-<br>energisation, control of keys/switchgear access, and clear<br>responsibilities and checks before re-energising).", "<b>Source ID:</b> 2.1<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.460<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The texts are functionally related. The SOURCE<br>describes electrical risks (shock, fire/explosion, toxic gases) that<br>arise from contact with electricity, including scenarios involving<br>energised equipment. The TARGET sets a legal/operational obligation on<br>a business to ensure electrical work on energised equipment is not<br>carried out unless specific necessity conditions apply. Risk<br>identification in the SOURCE is relevant to deciding whether energised<br>work should be avoided and controlled under the TARGET.  STEP 2<br>(Compliance): The SOURCE does not demonstrate compliance with the<br>TARGET obligation. It provides general hazard information but does not<br>state any requirement to prohibit energised electrical work except<br>under the listed exceptions, nor does it document decision criteria<br>(necessity/no reasonable alternative), authorization, or controls for<br>energised work. Therefore, it cannot be considered compliant with the<br>TARGET requirement.<br><br><b>Remediation:</b> Update the SOURCE content (or associated procedure) to explicitly<br>require that electrical work on energised equipment must not r electrical risks (e.g.,<br>design, installation, protection, maintenance, testing) in accordance<br>with Part 3.1, which typically includes identifying hazards, assessing<br>risks, implementing and maintaining controls, and reviewing control<br>effectiveness. The SOURCE does not state that the PCBU must manage<br>electrical risks, does not reference Part 3.1 processes, and does not<br>cover the broader lifecycle activities listed in the TARGET example.<br><br><b>Remediation:</b> Expand the SOURCE requirement into a PCBU duty statement aligned to<br>Part 3.1 risk management: explicitly require identification of<br>electrical hazards, risk assessment (as required), implementation of<br>controls (including ensuring only competent/licensed persons perform<br>electrical work), maintenance/testing regimes, and periodic review of<br>controls for electrical equipment/installations across design,<br>installation, protection, maintenance and testing.", "", "<b>Source ID:</b> 4.2<br><b>Provision ID:</b> 150<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.537<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): Both texts concern electrical safety compliance<br>and the use of a \u201ccompetent person.\u201d The SOURCE sets a competency<br>requirement for carrying out electrical work, while the TARGET imposes<br>a duty on the PCBU to ensure certain electrical equipment is inspected<br>and tested by a competent person and that records are kept. Because<br>inspection/testing is an electrical safety activity that must be<br>performed by a competent person, the SOURCE is related but does not<br>fully address the TARGET\u2019s specific obligations.  STEP 2 (Compliance):<br>The SOURCE is not compliant with the TARGET because it does not: (1)<br>require regular inspection and testing of in-scope electrical<br>equipment (socket-outlet supplied and used in damaging environments);<br>(2) address the exemption/requirement for new and unused equipment<br>(inspect for obvious damage before use); (3) require keeping testing<br>records until next test or removal/disposal; or (4) specify required<br>record contents (tester name, test date, outcome, next test due date)<br>or allow tagging as a record. It only states that electrical work must<br>be done by a competent person and references training/qualifications,<br>which is insufficient to meet the TARGET\u2019s inspection/testing and<br>recordkeeping duties.<br><br><b>Remediation:</b> Add explicit requirements that the PCBU must: (1) ensure in-scope<br>electrical equipment is regularly inspected and tested by a competent<br>person; (2) for new/unused equipment, inspect for obvious damage<br>before first use and clarify the exemption from initial testing; (3)<br>maintain records of testing until the next test or until the equipment<br>is removed/disposed; and (4) ensure records include tester name, test<br>date, outcome, and next test due date (e.g., via a tag). Also<br>define/align \u201ccompetent person\u201d with the applicable WHS/electrical<br>safety regulatory definition for inspection/testing.", "", "<b>Source ID:</b> 4.2<br><b>Provision ID:</b> 154<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.557<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): Both texts regulate electrical work. The TARGET<br>imposes a specific duty on a PCBU to ensure electrical work is not<br>performed while equipment is energised (subject to exceptions). The<br>SOURCE addresses who may perform electrical work<br>(competency/qualifications) and does not address the energised-work<br>prohibition, so a compliance check is necessary. STEP 2 (Compliance):<br>The SOURCE does not include a requirement to ensure electrical work is<br>not carried out on energised equipment, nor does it reference the<br>TARGET\u2019s prohibition or its exceptions/controls. Therefore it does not<br>fulfill the TARGET obligation.<br><br><b>Remedia work is de-energised or energised and mentions<br>isolate/tag/de-energise in example limitations, but it does not<br>mandate pre-work testing as a required step. The SOURCE also does not<br>clearly state that exposed parts must be treated as energised until<br>isolated and determined not energised, nor does it address the<br>requirement to earth each high-voltage exposed part after de-<br>energising. Therefore, the SOURCE does not fully cover the TARGET\u2019s<br>specific procedural obligations and is not compliant as a control<br>document for those requirements.<br><br><b>Remediation:</b> Update the SOURCE procedure/forms/SWIs to explicitly require: (1)<br>mandatory pre-work testing of electrical equipment by a competent<br>person to confirm energised/de-energised status (with reference to the<br>applicable testing method/SWI); (2) a rule that all exposed parts are<br>treated as energised until isolated and proven de-energised; and (3)<br>for high-voltage work, mandatory earthing of exposed parts after de-<br>energising. Ensure these steps are embedded as approval prerequisites<br>(e.g., checklist items in the verification/approval sections) and<br>reflected in required risk assessments/SWIs.", "", "", "<b>Source ID:</b> 4.4<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.597<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE sets an internal process for verifying<br>electrical worker competency and approving/controlling electrical<br>work, including energised work. The TARGET sets mandatory<br>preconditions a PCBU must ensure before energised electrical work<br>commences (risk assessment, clear access/egress, isolation point<br>requirements, and authorisation after consultation). Because the<br>SOURCE procedure is intended to govern/permit energised electrical<br>work, it is functionally related and should be checked against the<br>TARGET obligations.  STEP 2 (Compliance): T
