ling electrical equipment use.  STEP 2 (Compliance):<br>The SOURCE does not explicitly require that equipment subject to<br>mandatory testing under regulation 150 must not be used unless it has<br>been tested. It refers to regular maintenance, inspection and testing,<br>and removal from service when insulation is doubtful or when<br>insulating mats/barriers are defective, but it does not establish the<br>specific prohibition tied to the regulatory testing requirement (reg<br>150) or the condition 'has not been tested'. Therefore it does not<br>fully satisfy the TARGET obligation.<br><br><b>Remediation:</b> Add an explicit requirement/procedure stating that any electrical<br>equipment that is required to be tested under regulation 150 must not<br>be used unless it has been tested (and is within the required test<br>interval), including controls such as tagging/records, pre-use<br>verification, and removal from service until testing is completed.", "", "", "", "", "", "<b>Source ID:</b> 5.2<br><b>Provision ID:</b> 160<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.508<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> The TARGET imposes a duty on a PCBU to ensure that during energised<br>electrical work, all persons are prevented from creating an electrical<br>risk by inadvertent contact with exposed energised components. The<br>SOURCE discusses suitability, maintenance, inspection/testing of<br>electrical tools/equipment, and the use/inspection/removal-from-<br>service of insulating barriers and mats. These controls are<br>functionally related because insulating barriers/mats and properly<br>maintained tools are common measures to prevent inadvertent contact<br>and resulting electrical risk during energised work. However, the<br>SOURCE does not explicitly require ensuring 'all persons' are<br>prevented from contact, does not address exposed energised components<br>specifically, and frames requirements as 'should' rather than 'must',<b nts a<br>compliance check.  STEP 2 (Compliance): The SOURCE does not address<br>the TARGET\u2019s core requirement: prohibiting energised electrical work<br>unless one of the listed exceptions applies (necessity for safety,<br>necessity for proper work, testing under reg 155, or no reasonable<br>alternative). The SOURCE also does not require documenting/justifying<br>why energised work is necessary, nor does it set conditions/controls<br>for when energised work is permitted. While the SOURCE promotes de-<br>energised work (which aligns with the intent of avoiding energised<br>work), it is incomplete relative to the TARGET obligation because it<br>lacks an explicit ban on energised work and the exception criteria.<br>Therefore it is not compliant with the TARGET as a standalone<br>procedure/policy statement.<br><br><b>Remediation:</b> Amend the SOURCE procedure to explicitly state that electrical work on<br>energised equipment must not be performed unless one of the permitted<br>exceptions applies (health and safety necessity, necessary for proper<br>work, testing required under reg 155, or no reasonable alternative).<br>Add a requirement to assess and document the justification for<br>energised work, and specify that testing on energised equipment is<br>only allowed within those permitted circumstances. Ensure the<br>procedure cross-references the relevant regulation(s) and includes<br>approval/authorization steps for any energised work.", "<b>Source ID:</b> 6.1<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.616<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> Relevance: Both texts address controls required before/when performing<br>electrical work, specifically around isolation/disconnection points<br>and preventing inadvertent energisation. The SOURCE describes<br>lockout/tagout and testing for de-energised work, which is<br>functionally related to the TARGET\u2019s requirements that must be ensured<br>before electrical work on energised equipment commences (including<br>risk assessment, access/egress, clearly marked and accessible<br>isolation point, and authorisation).  Compliance: The SOURCE does not<br>address several mandatory elements in the TARGET: (1)(a) conducting a<br>risk assessment, including that it be conducted by a competent person<br>and recorded (2); (1)(b) ensuring the work area is clear of<br>obstructions for access/exit; (1)(c)(i)-(iii) ensuring the<br>isolation/disconnection point is clearly marked/labelled, unobstructed<br>for access/exit, and capable of being operated quickly; and (1)(d)<br>authorisation after consultation with the person with<br>management/control of the workplace. While the SOURCE includes<br>isolation, lockout/tagging, and testing for de-energised status, it<br>does not demonstrate these additional prerequisites, so it is not<br>compliant with the TARGET as written.<br><br><b>Remediation:</b> Add procedures to: (1) conduct a documented risk assessment by a<br>competent person before commencing energised electrical work; (2)<br>ensure the work area and isolation point are free of obstructions to<br>allow easy access/exit; (3) ensure the isolation/disconnection point<br>is clearly marked/labelled and can be operated quickly; and (4)<br>require formal authorisation of the work after consultation with the<br>person with management/control of the workplace.", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 149<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.491<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): Both texts address control of electrical hazards<br>via isolation/disconnection to prevent unsafe energisation. The SOURCE<br>describes requirements for isolation points/control mechanisms to<br>prevent inadvertent re-energisation, which is a means of ensuring<br>isolated unsafe equipment is not reconnected. The TARGET imposes a<br>duty to ensure unsafe electrical equipment is disconnected/isolated<br>and not reconnected until repaired/tested safe (or removed).  STEP 2<br>(Compliance): The SOURCE partially supports the TARGET by addressing<br>prevention of inadvertent re-energisation through deliberate-action<br>control mechanisms (e.g., lockable switches/lockout devices). However,<br>it does not cover key TARGET requirements: (a) ensuring unsafe<br>equipment is disconnected/isolated (as a duty tied to 'unsafe'<br>status), (b) ensuring it is not reconnected until repaired or tested<br>and found safe, or (c) replaced/permanently removed. Because these<br>obligations are not stated/ensured in the SOURCE, it is not fully<br>compliant with the TARGET requirement set.<br><br><b>Remediation:</b> Add explicit requirements/procedures that: (1) unsafe electrical<br>equipment must be identified and disconnected/isolated from supply;<br>(2) once isolated it must not be reconnected until repaired or tested<br>and verified safe; and (3) if not repairable, it must be replaced or<br>permanently removed from use. Include responsibilities,<br>tagging/lockout steps, and verification/testing criteria.", "", "", "", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 155<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.496<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): Both texts address electrical safety controls to<br>prevent unintended energisation during electrical work. The SOURCE<br>describes requirements for isolation points and control mechanisms to<br>prevent inadvertent re-energising, which is functionally related to<br>the TARGET obligations to test for energisation, treat exposed parts<br>as energised until isolated and proven de-energised, and earth high-<br>voltage parts after de-energising.  STEP 2 (Compliance): The SOURCE<br>does not cover the TARGET\u2019s required pre-work testing by a competent<br>person to  provides<br>appropriate measures aligned with that duty and does not contradict<br>it.", "", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.509<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): Both texts address controls around electrical<br>isolation/disconnection points to manage safety during electrical<br>work. The SOURCE specifies design/fitment requirements for isolation<br>points (prevent inadvertent re-energisation via deliberate-action<br>control mechanisms and robustness, e.g., lockable switches/lockout<br>devices). The TARGET sets preconditions before energised electrical<br>work begins, including requirements about the isolation/disconnection<br>point being clearly marked, unobstructed, and operable quickly, plus<br>risk assessment, authorisation, and consultation. Because both concern<br>the isolation point used in electrical work controls, a compliance<br>comparison is necessary.  STEP 2 (Compliance): The SOURCE does not<br>cover several mandatory TARGET requirements: (a) conducting and<br>recording a risk assessment by a competent person; (b) ensuring the<br>work area is clear of obstructions for access/exit; (c) ensuring the<br>isolation/disconnection point is clearly marked/labelled,<br>unobstructed, and capable of being operated quickly; and (d)<br>authorisation after consultation with the person with<br>management/control of the workplace. While the SOURCE adds a related<br>safety control (preventing inadvertent re-energisation via<br>lockout/deliberate action), it does not demonstrate compliance with<br>the TARGET\u2019s procedural and labeling/accessibility/operability<br>requirements. Therefore, it is not compliant with the TARGET as<br>written.<br><br><b>Remediation:</b> Add procedures and requirements to ensure, before energised electrical<br>work starts: (1) a competent person conducts and records a risk<br>assessment; (2) the work area is cleared of obstructions for safe<br>access/egress; (3) the isolation/disconnection point is clearly<br>marked/labelled, unobstructed, and can be operated quickly; (4) formal<br>authorisation is obtained after consultation with the workplace<br>controller/manager. Retain the SOURCE lockout/deliberate-action<br>controls as an additional safeguard.", "", "", "", "", "", "", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 190<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.491<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE sets requirements for electrical<br>isolation points to prevent inadvertent re-energisation and to require<br>deliberate action (e.g., lockable switches/lockout devices). The<br>TARGET requires plant operator controls to be guarded/located to<br>prevent unintentional activation and to be able to be locked into the<br>\"off\" position to disconnect motive power. These address the same<br>functional safety objective (prevent unintended<br>energisation/activation and enable lockable isolation), so a<br>compliance check is necessary.  STEP 2 (Compliance): The SOURCE<br>requires (i) control mechanisms preventing inadvertent re-<br>energisation, (ii) deliberate action to engage/disengage, (iii)<br>robustness against conditions leading to isolation failure, and<br>provides examples including built-in locks and lockout for<br>switches/circuit breakers/fuses/hasps. This aligns with TARGET (1)(c)<br>preventing unintentional activation and (1)(d) lockable \"off\" position<br>for disconnection of motive power. The SOURCE does not explicitly<br>cover TARGET (1)(a) identification/labeling or (1)(b) convenient<br>location, nor the special maintenance-operation controls in TARGET<br>(2); however, those are broader design obligations beyond the SOURCE\u2019s<br>isolation-point focus. For the overlapping requirement area (lockable,<br>deliberate, preventing inadvertent re-energisation), the SOURCE is<br asures so the stop function is fail-safe/not<br>adversely affected by electrical/electronic circuit malfunction.", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 210<br><b>Status:</b> COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.512<br><b>Compliant:</b> Yes<br><br><b>Reasoning:</b> STEP 1 (Relevance): Both texts address preventing unintended<br>energisation/activation of plant/electrical equipment through<br>isolation/controls and lock-off mechanisms. The SOURCE describes<br>requirements for isolation points and control mechanisms to prevent<br>inadvertent re-energisation, which aligns with the TARGET requirement<br>that operator controls be guarded to prevent unintentional activation<br>and be lockable in the off position to disconnect motive power.  STEP<br>2 (Compliance): The SOURCE requires isolation points to have control<br>mechanisms that (i) prevent inadvertent re-energisation, (ii) require<br>deliberate action to engage/disengage, and (iii) include lockable<br>devices/lockout arrangements (e.g., built-in locks, lockout for<br>switches/circuit breakers/fuses/hasps). This satisfies the TARGET\u2019s<br>core obligations relevant here: preventing unintentional activation<br>(TARGET 1(c)) and being able to be locked into the off position to<br>enable disconnection of motive power (TARGET 1(d)). The TARGET also<br>includes additional requirements (identification, location, and<br>specific maintenance-operation authorization controls) that are not<br>addressed by the SOURCE, but those are broader than the SOURCE\u2019s scope<br>and do not contradict it; within the overlapping subject matter (lock-<br>off / prevention of inadvertent activation), the SOURCE is compliant.", "<b>Source ID:</b> 6.2<br><b>Provision ID:</b> 211<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.507<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): Both texts address safety controls that prevent<br>unintended re-energisation evance:</b> Yes<br><b>Match Score:</b> 0.598<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The TARGET sets a general duty for a PCBU to<br>manage health and safety risks associated with electrical risks at the<br>workplace (per Part 3.1). The SOURCE describes specific pre-work<br>controls to be addressed in an Activity Risk Assessment before<br>carrying out electrical work. These are functionally related because<br>the SOURCE appears to be one mechanism to manage electrical risks,<br>which is the obligation described in the TARGET.  STEP 2 (Compliance):<br>The SOURCE includes some risk controls (clear access/egress,<br>accessible and operable isolation/disconnection point, and<br>authorization after consultation). However, the TARGET requires<br>managing electrical risks broadly in accordance with Part 3.1,<br>covering the full risk management process (identify hazards, assess<br>risks if required, implement and maintain controls, review controls)<br>and applies to electrical risks across design, installation,<br>maintenance, testing, etc. The SOURCE is narrower (focused on<br>access/isolation/authorization prior to work) and does not explicitly<br>address the broader Part 3.1 risk management requirements or ongoing<br>review/maintenance of controls. Therefore, it does not fully<br>demonstrate compliance with the TARGET obligation.<br><br><b>Remediation:</b> Expand the Activity Risk Assessment/process to explicitly align with<br>Part 3.1 risk management requirements: identify electrical hazards,<br>assess risks (where required), implement controls using the hierarchy<br>of control (e.g., de-energise/isolate, lockout-tagout, test for dead,<br>PPE, procedures), ensure controls are maintained and reviewed, and<br>document responsibilities/consultation. Ensure coverage extends beyond<br>pre-work access/isolation to all relevant electrical risk activities<br>(design, installation, maintenance, testing) as applicable.", "<b>Source ID:</b> 7.1<br><b> osed parts as energised<br>until isolated and proven de-energised, and to earth high-voltage<br>exposed parts after de-energising. The SOURCE focuses on<br>access/egress, clear and operable isolation points, and<br>authorisation/consultation, but does not include any requirement for<br>competent-person testing to confirm de-energised status, treating<br>exposed parts as energised until proven otherwise, or earthing high-<br>voltage exposed parts. Therefore, the SOURCE does not satisfy the<br>TARGET obligations.<br><br><b>Remediation:</b> Update the Activity Risk Assessment and associated procedures to<br>explicitly require: (1) pre-work testing of the equipment by a<br>competent person to determine if it is energised (in accordance with<br>applicable testing requirements), (2) treating all exposed parts as<br>energised until isolated and confirmed de-energised, and (3) earthing<br>high-voltage exposed parts after de-energising. Include<br>roles/responsibilities (PCBU/competent person), documentation of test<br>results, and verification steps before work starts.", "", "<b>Source ID:</b> 7.1<br><b>Provision ID:</b> 157<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.556<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The texts are functionally related because both<br>concern controls/requirements around performing electrical work,<br>including conditions and preparatory measures before carrying out the<br>work. The SOURCE describes items to be addressed in an Activity Risk<br>Assessment prior to carrying out electrical work (access/egress,<br>isolation point marking/accessibility/operability, and<br>authorization/consultation). The TARGET sets a specific legal<br>prohibition/exception framework for carrying out electrical work on<br>energised electrical equipment, requiring that energised work is only<br>done under limited necessity-based circumstances.  STEP 2<br>(Compliance): The SOURCE does not demonstrate compliance with the<br>TARGET because it does not address the core requirement: ensuring<br>energised electrical work is not carried out unless one of the<br>permitted conditions applies (health/safety necessity, necessity for<br>proper work, testing under reg 155, or no reasonable alternative). The<br>SOURCE focuses on access and isolation arrangements and authorization,<br>which are relevant risk controls but do not establish that energised<br>work is avoided unless justified under the TARGET. There is also no<br>explicit requirement in the SOURCE to de-energise where reasonably<br>practicable, nor to document the justification for energised work<br>under the TARGET\u2019s criteria.<br><br><b>Remediation:</b> Update the Activity Risk Assessment and associated procedure to<br>explicitly require that electrical work is performed de-energised by<br>default, and that energised work is prohibited unless one of the<br>TARGET subregulation (1)(a)-(d) conditions is met. Add a mandatory<br>documented justification checklist covering (a)-(d), including<br>confirmation that there is no reasonable alternative, and (where<br>applicable) that testing is required under reg 155. Ensure the<br>authorization step includes verifying and recording which exception<br>applies and why.", "<b>Source ID:</b> 7.1<br><b>Provision ID:</b> 158<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.750<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE is describing what must be considered<br>in an Activity Risk Assessment before carrying out electrical work,<br>which corresponds directly to the TARGET regulation setting mandatory<br>preconditions before electrical work on energised electrical equipment<br>commences (risk assessment, clear access/egress, isolation point<br>requirements, and authorisation/consultation). Therefore a compliance<br>check is necessary.  STEP 2 (Compliance): The SOURCE substantially<br>covers TARGET subregulation ( ork to<br>explicitly incorporate all TARGET requirements: (1) require and<br>document that the task is performed by a competent person and that<br>tools/testing equipment/PPE are suitable, tested, and maintained, and<br>require verification of proper use; (2) require a safety observer<br>meeting the specified competence and current (within 12 months)<br>rescue/resuscitation assessment, and document the limited exemption<br>for testing-only work supported by a risk assessment showing no<br>serious risk; (3) expand SWI content to include risk control measures<br>and explicitly describe how controls will be implemented, monitored,<br>and reviewed (not just periodic document review).", "<b>Source ID:</b> 7.4<br><b>Provision ID:</b> 162<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.582<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE sets requirements for energised<br>electrical work to be conducted under an SWMS-equivalent document<br>(CSIRO SWI), including content and review expectations. The TARGET<br>imposes recordkeeping and accessibility obligations for electrical-<br>work risk assessments and SWMSs (retain for specified periods, make<br>readily accessible to workers, and available for inspection). Because<br>the SOURCE is describing the control document used in place of an SWMS<br>for this work, it is functionally related to the TARGET\u2019s obligations<br>around SWMS/risk assessment retention and access, so a compliance<br>check is necessary.  STEP 2 (Compliance): The SOURCE does not address<br>the TARGET\u2019s requirements to (a) keep copies of the risk assessment<br>for at least 28 days after completion, (b) keep copies of the SWMS/SWI<br>until work is completed, (c) retain for at least 2 years after a<br>notifiable incident, (d) ensure copies are readily accessible to<br>workers during the retention period, and (e) ensure copies are<br>available for inspection. The SOURCE focuses on SWI content and<br>review/revision, but omits retention, accessibility, and inspection<br>provisions. Therefore it does not demonstrate compliance with the<br>TARGET.<br><br><b>Remediation:</b> Update the SWI/SWI procedure for energised electrical work to<br>explicitly require: (1) retention of the associated risk assessment<br>for at least 28 days after the work is completed; (2) retention of the<br>SWI/SWMS until the work is completed; (3) retention of the relevant<br>documents for at least 2 years after any notifiable incident connected<br>to the work; (4) ensuring copies are readily accessible to workers<br>performing the electrical work during the required period; and (5)<br>ensuring copies are available for inspection under the Act. Define<br>where documents are stored, who is responsible, and how<br>access/inspection will be provided.", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 7.4<br><b>Provision ID:</b> 300<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.560<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The TARGET imposes a duty on a PCBU to ensure high<br>risk construction work is carried out in accordance with a Safe Work<br>Method Statement (SWMS), and to stop/resume work if it is not. The<br>SOURCE addresses a closely related control: ensuring energised<br>electrical work (a type of high-risk work) is conducted in accordance<br>with a documented method (SWI as CSIRO\u2019s equivalent to SWMS) and sets<br>content/review requirements. This is functionally related because it<br>is intended to operationalize the requirement to perform high-risk<br>work in accordance with an approved safe method document.  STEP 2<br>(Compliance): The SOURCE partially aligns with the TARGET by requiring<br>an SWI for energised electrical work and specifying what it must<br>contain and that it must be reviewed. However, it does not explicitly<br>establish the required 'arrangements for ensuring' the work is carried<br>out in accordance with the SWI/SWMS (e.g., supervision, verification,<br>training/briefing, sign-off, monitoring), and it does not include the<br>TARGET\u2019s mandatory stop-work and resume-only-in-accordance provisions<br>when work deviates from the SWI/SWMS. Therefore, against the specific<br>obligations in the TARGET, the SOURCE is not fully compliant.<br><br><b>Remediation:</b> Update the SWI/associated procedure to explicitly: (1) define<br>arrangements to ensure the work is performed in accordance with the<br>SWI/SWMS (e.g., pre-start briefing, competency/authorization checks,<br>supervision, compliance verification/audits, sign-off); and (2)<br>require that if work is not being carried out in accordance with the<br>SWI/SWMS, it must be stopped immediately (or as soon as safe) and only<br>resumed once it is back in accordance with the SWI/SWMS.", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 7.5<br><b>Provision ID:</b> 161<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.773<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE sets requirements for when a safety<br>observer must be present during energised electrical work and<br>specifies observer competency/fitness expectations. The TARGET is a<br>legal-style obligation on a PCBU to ensure energised electrical work<br>is performed with a competent worker, suitable/maintained tools/PPE, a<br>safe work method statement (SWMS), and (subject to an exception) a<br>competent safety observer assessed within 12 months for<br>rescue/resuscitation. The SOURCE is clearly intended to operationalize<br>part of the TARGET (especially subregs (1)(c), (4), and (5)), so a<br>compliance check is necessary.  STEP 2 (Compliance): The SOURCE is<br>partially aligned but not fully compliant with the TARGET because it<br>omits several mandatory elements required by the TARGET. Specifically:<br>(1) TARGET 1(a) requires ensuring the energis t requirement/procedure that any electrical equipment<br>reasonably believed to be unsafe must be immediately<br>disconnected/isolated from supply, tagged/secured to prevent<br>reconnection, and must not be reconnected until it is repaired or<br>tested and verified safe, or else replaced/permanently removed from<br>service. Include criteria for determining 'unsafe', responsibilities,<br>and verification/recordkeeping steps.", "<b>Source ID:</b> 7.7<br><b>Provision ID:</b> 150<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.613<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The texts are functionally related because both<br>concern electrical testing. The TARGET imposes a specific legal duty<br>on a PCBU to ensure certain plug-in electrical equipment used in<br>harsh/damaging environments is regularly inspected and tested by a<br>competent person, and to keep specified records. The SOURCE provides<br>guidance on how to conduct electrical testing/fault-finding safely<br>(especially in energised environments), including competence,<br>instrument standards, and PPE. This could be part of a broader program<br>intended to meet the TARGET\u2019s testing obligation, so a compliance<br>check is necessary.  STEP 2 (Compliance): The SOURCE does not<br>demonstrate compliance with the TARGET because it does not: (a)<br>specify the scope of equipment covered (plug-in equipment supplied via<br>socket outlets used in damaging environments); (b) require regular<br>inspection and testing intervals/frequency; (c) explicitly require<br>inspection/testing be performed by a competent person for the TARGET<br>scenario (it mentions training/competence generally, but not as a<br>mandated control for the specific duty); (d) include the recordkeeping<br>requirements (retain records until next test/removal; record must<br>include tester name, date, outcome, next test date; tag option); or<br>(e) address the exemption/requirement for new and unused equipment<br>(inspect for obvious damage before use). Therefore, based on the<br>provided SOURCE text alone, it is not compliant with the TARGET<br>requirements.<br><br><b>Remediation:</b> Add a formal inspection-and-testing program that: (1) identifies in-<br>scope equipment (socket-outlet supplied) and environments likely to<br>damage equipment; (2) mandates regular inspection/testing at defined<br>intervals based on risk/conditions; (3) requires testing by a<br>competent person; (4) requires pre-use inspection for obvious damage<br>for new/unused equipment; and (5) implements recordkeeping meeting<br>TARGET fields (tester name, test date, outcome, next due date) and<br>retention rules, including allowing tagging as the record.", "", "", "<b>Source ID:</b> 7.7<br><b>Provision ID:</b> 155<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.662<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): Both texts address safety requirements around<br>electrical testing and determining whether equipment is energised<br>prior to performing electrical work. The SOURCE provides procedural<br>guidance for testing/fault-finding (including in energised<br>environments) and use of test instruments/PPE, which is functionally<br>related to the TARGET\u2019s mandatory requirement to test equipment before<br>electrical work and to treat exposed parts as energised until proven<br>otherwise.  STEP 2 (Compliance): The SOURCE does not explicitly<br>require that, before electrical work is carried out on electrical<br>equipment, the equipment must be tested by a competent person to<br>determine whether it is energised (TARGET (1)). It discusses<br>testing/fault-finding and emphasizes safety during testing, but it<br>does not clearly mandate pre-work energisation testing for all<br>electrical work. The SOURCE also does not clearly state that each<br>exposed part must be treated as energised until isolated and<br>determined not energise or omission relative to<br>the TARGET is evident.", "<b>Source ID:</b> 8.4<br><b>Provision ID:</b> 149<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.539<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The texts are functionally related. The SOURCE<br>sets out operational controls for identifying unsafe electrical<br>equipment (visual inspections each use; scheduled testing/tagging;<br>isolation/out-of-service when defects are found). The TARGET imposes a<br>legal duty on the PCBU to ensure unsafe electrical equipment is<br>disconnected/isolated and not reconnected until repaired or tested<br>safe, or else replaced/removed.  STEP 2 (Compliance): The SOURCE<br>partially aligns with the TARGET by requiring defective equipment to<br>be isolated/taken out of service until repaired and tested as safe.<br>However, it does not fully meet the TARGET obligation because it does<br>not explicitly require disconnection/isolating from the electricity<br>supply, does not clearly prohibit reconnection until repaired or<br>tested and found safe (it implies this but not as an explicit<br>control), and does not include the alternative compliance pathway of<br>replacement or permanent removal from use. The SOURCE also focuses on<br>equipment supplied via socket outlets and certain damaging<br>environments, whereas the TARGET duty applies to any unsafe electrical<br>equipment at the workplace.<br><br><b>Remediation:</b> Amend the SOURCE procedure to explicitly require that any electrical<br>equipment reasonably believed to be unsafe is disconnected/isolated<br>from the electricity supply immediately; prohibit reconnection until<br>it is repaired or tested and found safe; and include an option/process<br>to replace or permanently remove unsafe equipment from use. Ensure the<br>procedure applies to all unsafe electrical equipment at the workplace<br>(not only socket-outlet supplied equipment in harsh environments).", "<b>Source ID:</b> 8.4<br><b>Provision ID:</b> 150<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.747<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE sets out workplace requirements for<br>inspection/testing of electrical equipment, including conditions<br>triggering testing, visual inspections, and handling of new equipment.<br>The TARGET is a legal-style obligation on a PCBU to ensure regular<br>inspection/testing in specified conditions, plus requirements for<br>inspection of new/unused equipment and mandatory recordkeeping. The<br>SOURCE is clearly intended to operationalize the same obligation, so a<br>compliance check is necessary.  STEP 2 (Compliance): The SOURCE is<br>partially aligned but not fully compliant with the TARGET. It matches<br>the core trigger for inspection/testing (socket outlet supply +<br>harsh/damaging operating conditions) and references competent persons<br>and AS3760 frequency guidance, which supports subregulation (1). It<br>also addresses new equipment not needing testing before first use and<br>recommends inspection for damage, which aligns in substance with<br>subregulation (2)(a)-(b). However, the SOURCE introduces a requirement<br>for a \u201cnew to service\u201d tag before first use; while not prohibited, it<br>does not substitute for the TARGET\u2019s explicit requirements.  Key gaps<br>against the TARGET: 1) Recordkeeping: The TARGET requires keeping a<br>record of any testing until next test or removal/disposal, and<br>specifies mandatory record contents (tester name, test date, outcome,<br>next test date) and allows a tag as the record. The SOURCE discusses<br>testing/tagging generally but does not require keeping records, does<br>not specify retention period, and does not specify the required record<br>fields. 2) Mandatory pre-use inspection for new/unused equipment: The<br>TARGET makes inspection for obvious damage before use mandatory. The<br>SOURCE states it is \u201cadvisable\u201d to conduct a visual inspection, which<br>is weaker than a must/shall requirement. 3) Unsafe equipment not to be<br>used: The SOURCE says damaged/defective equipment must be isolated/out<br>of service until repaired and tested safe, which is consistent with<br>the note concept, but it does not explicitly reference the general<br>prohibition on using unsafe equipment; this is not necessarily a<br>noncompliance by itself, but the recordkeeping and mandatory<br>inspection language gaps are sufficient to render it noncompliant<br>overall.<br><br><b>Remediation:</b> Update the SOURCE policy/procedure to explicitly: (1) require keeping<br>a testing record for each item tested, retained until the next test or<br>until the equipment is removed/disposed; (2) require the record to<br>include tester name, test date, outcome, and next test due date, and<br>clarify that a tag may serve as the record; (3) change guidance for<br>new/unused equipment from \u201cadvisable\u201d to a mandatory requirement to<br>inspect for obvious damage before first use. Optionally add an<br>explicit statement that unsafe electrical equipment must not be used<br>(cross-referencing the applicable internal rule/regulation).", "<b>Source ID:</b> 8.4<br><b>Provision ID:</b> 151<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.558<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE sets out when electrical equipment must<br>be inspected/tested (including scheduled testing/tagging per AS3760)<br>and when it must be removed from service, which is functionally<br>related to the TARGET obligation that equipment required to be tested<br>under regulation 150 must not be used if it has not been tested.  STEP<br>2 (Compliance): The SOURCE does not fully satisfy the TARGET<br>requirement because it does not explicitly state the prohibition on<br>use where testing is required but has not been completed. It also<br>states that brand-new equipment does not have to be tested before<br>first use (only a 'new to service' tag), which could conflict with the<br>TARGET if regulation 150 requires testing before use in certain<br>circumstances. While the SOURCE promotes testing/tagging and isolation<br>when defects are found, it does not clearly ensure that equipment<br>required to be tested is not used until tested.<br><br><b>Remediation:</b> Add an explicit rule: any electrical equipment that is required to be<br>tested under regulation 150 must not be used until it has been tested<br>(and is within its test interval). Clarify how 'new equipment' is<br>handled where regulation 150 applies (i.e., confirm whether any<br>categories require testing before first use despite being new), and<br>require controls to prevent use (e.g., lockout/out-of-service tagging)<br>until testing is completed.", "", "", "", "", "", "", "", "", "", "<b>Source ID:</b> 8.4<br><b>Provision ID:</b> 165<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.546<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): Both texts address workplace electrical safety<br>inspection/testing obligations performed by a competent person. The<br>SOURCE sets out requirements for inspection, testing and tagging of<br>electrical equipment (including frequency per AS3760) and record-like<br>tagging practices. The TARGET imposes a specific legal duty to<br>regularly test residual current devices (RCDs) and to keep records of<br>RCD testing (other than daily tests) until the next test or removal<br>from use. Because RCDs are a type of electrical safety device used at<br>workplaces and are commonly part of electrical safety testing regimes,<br>the SOURCE could be intended to support compliance with the TARGET, so<br>a compliance check is necessary.  STEP 2 (Compliance): The SOURCE does<br>not explicitly require regular testing of RCDs (it focuses on<br>electrical equipment supplied via socket outlets and testing/tagging<br>of that equipment). It also does not require keeping records of RCD<br>testing as specified in the TARGET (retaining records until next test<br>or removal). Therefore, the SOURCE does not fully satisfy the TARGET<br>obligations.<br><br><b>Remediation:</b> Add explicit procedures requiring: (1) regular testing of all<br>workplace RCDs by a competent person to confirm effective operation<br>(including defining the test method and interval consistent with<br>applicable standards/regulations), and (2) retention of records for<br>each non-daily RCD test until the RCD is next tested or permanently<br>removed from use. Ensure responsibilities, record format/location, and<br>auditability are documented.", "", "", "", "", "", "<b>Source ID:</b> 8.4<br><b>Provision ID:</b> 213<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.564<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE sets out requirements for<br>inspection/testing of workplace electrical equipment (a type of plant)<br>by a competent person, including visual inspections, scheduled<br>testing/tagging, and handling of new equipment. The TARGET imposes a<br>general duty on the person with management/control of plant to ensure<br>maintenance, inspection and (if necessary) testing is carried out by a<br>competent person, and specifies the required basis/frequency<br>(manufacturer recommendations; otherwise competent person<br>recommendations; otherwise annual inspection if not reasonably<br>practicable). Therefore, the SOURCE is functionally related to<br>fulfilling the TARGET obligation and a compliance check is necessary.<br>STEP 2 (Compliance): The SOURCE aligns with the TARGET in requiring<br>inspection/testing by a competent person and describing<br>inspection/testing practices. However, it does not fully satisfy the<br>TARGET\u2019s specific requirements for how the<br>maintenance/inspection/testing schedule is determined: (a) it does not<br>require compliance with manufacturer recommendations; (b) it does not<br>provide the fallback hierarchy (manufacturer recommendations \u2192<br>competent person recommendations \u2192 annual inspection if not reasonably<br>practicable); and (c) it mandates testing frequency per AS3760 without<br>stating this is contingent on manufacturer recommendations or<br>competent person recommendations where applicable. Additionally, the<br>TARGET includes 'maintenance' explicitly, while the SOURCE focuses<br>mainly on inspection/testing/tagging and isolation/repair, without a<br>clear maintenance program requirement. Because these elements are<br>missing or potentially inconsistent with the TARGET\u2019s prescribed basis<br>for frequency, the SOURCE is not fully compliant with the TARGET as<br>written.<br><br><b>Remediation:</b> Amend the SOURCE procedure to: (1) explicitly require maintenance,<br>inspection and (if necessary) testing to be performed by a competent<br>person; (2) state that inspection/testing intervals must follow the<br>manufacturer\u2019s recommendations where they exist; (3) where<br>manufacturer recommendations do not exist, require intervals based on<br>a competent person\u2019s recommendations (and document that basis); (4)<br>for inspection, include the annual inspection fallback where it is not<br>reasonably practicable to comply with (2) or (3); and (5) clarify how<br>AS3760 testing/tagging is applied in a way that does not override<br>manufacturer/competent-person recommendations (e.g., use AS3760 as the<br>method/standard and/or minimum baseline where consistent).", "", "<b>Source ID:</b> 8.4<br><b>Provision ID:</b> 240<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.521<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): Both texts impose duties on a person with<br>management/control to ensure inspection/testing is performed by a<br>competent person. Although the SOURCE is about workplace electrical<br> >system and retain records demonstrating implementation.", "", "<b>Source ID:</b> 9.2<br><b>Provision ID:</b> 150<br><b>Status:</b> NON-COMPLIANT<br><b>Relevance:</b> Yes<br><b>Match Score:</b> 0.514<br><b>Compliant:</b> No<br><br><b>Reasoning:</b> STEP 1 (Relevance): The SOURCE sets requirements for<br>training/qualification/licensing for BU/Site ESOs based on the type of<br>electrical work performed at a site. The TARGET requires that certain<br>electrical equipment be inspected and tested by a competent person and<br>that testing records be kept. These are functionally related because<br>the SOURCE is about ensuring personnel competency for electrical work,<br>which would include (or overlap with) competency to inspect/test<br>electrical equipment where required.  STEP 2 (Compliance): The SOURCE<br>does not explicitly require (a) regular inspection and testing of in-<br>scope electrical equipment used in damaging environments, (b) that the<br>inspection/testing be performed by a competent person for that<br>specific task, (c) inspection of new/unused equipment for obvious<br>damage before use, or (d) creation and retention of testing records<br>with the specified minimum contents (tester name, date, outcome, next<br>test date) and retention rules. It only addresses ESO<br>competency/credentialing (assessment vs licence) based on fixed vs<br>portable work at different sites. Therefore, it does not demonstrate<br>compliance with the TARGET obligations.<br><br><b>Remediation:</b> Add/implement a documented inspection and testing program for in-scope<br>electrical equipment (socket-supplied equipment used in harsh/damaging<br>environments), including: (1) defined inspection/testing intervals;<br>(2) requirement that testing is performed by a competent person; (3)<br>pre-use inspection for obvious damage for new/unused equipment; (4)<br>mandatory testing records retained until next test or disposal,<br>capturing tester name, test date, outcome, and next due date (e.g.
